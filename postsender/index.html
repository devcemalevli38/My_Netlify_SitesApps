<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kontrol Arayüzü</title>
    <style>
        /* Modern ve karanlık tema arayüz tasarımı */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background-color: #1e1e1e; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.8); 
            width: 100%; 
            max-width: 420px; 
        }
        h2 { 
            text-align: center; 
            margin-top: 0; 
            margin-bottom: 25px;
            color: #00d2ff; 
            font-weight: 500;
        }
        .form-group { 
            margin-bottom: 20px; 
        }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 14px; 
            color: #aaaaaa;
        }
        input[type="text"], select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #333; 
            border-radius: 6px; 
            background-color: #2a2a2a; 
            color: white; 
            box-sizing: border-box; 
            font-size: 15px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #00d2ff;
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, #3a7bd5, #00d2ff);
            border: none; 
            border-radius: 6px; 
            color: white; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            transition: opacity 0.3s; 
        }
        button:hover { 
            opacity: 0.9; 
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        #response-message { 
            margin-top: 20px; 
            text-align: center; 
            font-size: 14px; 
            display: none; 
            padding: 12px; 
            border-radius: 6px;
        }
        .success { 
            background-color: rgba(76, 175, 80, 0.15); 
            color: #4caf50; 
            border: 1px solid #4caf50; 
        }
        .error { 
            background-color: rgba(244, 67, 54, 0.15); 
            color: #f44336; 
            border: 1px solid #f44336; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Kontrol Paneli</h2>
    <form id="postForm">
        <div class="form-group">
            <label for="serverUrl">Sunucu URL'si:</label>
            <input type="text" id="serverUrl" name="serverUrl" placeholder="http://192.168.1.100:8080/api/command" required>
        </div>
        <div class="form-group">
            <label for="commandType">Gönderilecek Aksiyon:</label>
            <select id="commandType" name="commandType">
                <option value="play">Oynat</option>
                <option value="pause">Duraklat</option>
                <option value="next">Sonraki Medya</option>
                <option value="vol_up">Sesi Arttır</option>
            </select>
        </div>
        <div class="form-group">
            <label for="customPayload">Ek Parametre (İsteğe Bağlı):</label>
            <input type="text" id="customPayload" name="customPayload" placeholder="Örn: value=100">
        </div>
        <button type="submit">İsteği Gönder (POST)</button>
    </form>
    <div id="response-message"></div>
</div>

<script>
    document.getElementById('postForm').addEventListener('submit', function(event) {
        // Klasik form gönderimini (sayfa yenilemeyi) durduruyoruz.
        event.preventDefault(); 

        const serverUrl = document.getElementById('serverUrl').value;
        const commandType = document.getElementById('commandType').value;
        const customPayload = document.getElementById('customPayload').value;
        const responseDiv = document.getElementById('response-message');
        const submitBtn = event.target.querySelector('button');

        // JSON formatında arka plana gönderilecek veri gövdesi (body)
        const postData = {
            action: commandType,
            payload: customPayload,
            clientTime: new Date().toISOString()
        };

        // Kullanıcıya işlemin başladığını gösterme
        submitBtn.textContent = 'İletişim Kuruluyor...';
        submitBtn.disabled = true;
        responseDiv.style.display = 'none';

        // Fetch API kullanılarak asenkron POST isteği oluşturulması
        fetch(serverUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                // Gerekiyorsa buraya Authorization veya API key başlıkları eklenebilir
            },
            body: JSON.stringify(postData)
        })
        .then(response => {
            if (response.ok) {
                // Sunucudan dönen bir JSON varsa işle, yoksa boş nesne dön
                return response.text().then(text => text ? JSON.parse(text) : {}); 
            }
            throw new Error(`HTTP Hatası: ${response.status}`);
        })
        .then(data => {
            // Başarılı durum
            responseDiv.textContent = 'POST isteği başarıyla iletildi!';
            responseDiv.className = 'success';
            responseDiv.style.display = 'block';
        })
        .catch(error => {
            // Hata durumu (Örn: CORS engeli, sunucu kapalı veya yanlış URL)
            responseDiv.textContent = 'Hata: İstek sunucuya ulaştırılamadı. (' + error.message + ')';
            responseDiv.className = 'error';
            responseDiv.style.display = 'block';
        })
        .finally(() => {
            // İşlem bittiğinde butonu eski haline döndürme
            submitBtn.textContent = 'İsteği Gönder (POST)';
            submitBtn.disabled = false;
            
            // Bildirim mesajını 4 saniye sonra ekrandan kaldırma
            setTimeout(() => {
                responseDiv.style.display = 'none';
            }, 4000);
        });
    });
</script>

</body>
</html>
