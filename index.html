<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Sitelerim | Cemal Evli</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f1f5f9;
            --accent: #38bdf8;
            --hover: #1e293b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .light {
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.8);
            --border: rgba(0, 0, 0, 0.05);
            --text: #0f172a;
            --accent: #0284c7;
            --hover: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.1) 0px, transparent 50%);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        h1 { margin: 0; font-size: 1.8rem; letter-spacing: -1px; }

        .controls { display: flex; gap: 10px; }

        input {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 15px;
            border-radius: 10px;
            outline: none;
            backdrop-filter: blur(5px);
            width: 250px;
        }

        input:focus { border-color: var(--accent); }

        button {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            font-weight: 600;
        }

        button:hover { background: var(--hover); border-color: var(--accent); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .project-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            background: var(--hover);
        }

        .icon {
            font-size: 28px;
            background: rgba(56, 189, 248, 0.1);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        /* --- MODAL TASARIMI --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .newsletter-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: var(--shadow);
            backdrop-filter: blur(15px);
            border-bottom: 4px solid var(--accent);
            width: 90%;
            max-width: 500px;
            position: relative;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .newsletter-section {
            transform: scale(1);
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }

        .newsletter-section h2 { margin-top: 0; font-size: 1.4rem; color: var(--accent); }
        
        .newsletter-form {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-direction: column;
        }

        .newsletter-form input { width: 100%; }
        
        #subscribe-btn { background: var(--accent); color: #0f172a; border: none; }
        #subscribe-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        #status-msg { margin-top: 15px; font-weight: 600; font-size: 0.9rem; min-height: 20px; }

        .hidden { display: none; }

        footer {
            margin-top: auto;
            padding: 60px 0 20px;
            width: 100%;
            max-width: 900px;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        footer b { color: var(--accent); }

        @media (max-width: 600px) {
            header { flex-direction: column; }
            .controls { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<header>
    <h1>🚀 Web Sitelerim</h1>
    <div class="controls">
        <input id="search" placeholder="🔍 Proje ara...">
        <button id="openNewsletter" title="Abone Ol">📧</button>
        <button id="themeToggle">🌙 / ☀️</button>
    </div>
</header>

<div id="project-container" class="grid">
    <p id="loading">Yükleniyor...</p>
</div>

<div id="newsletterModal" class="modal-overlay">
    <div class="newsletter-section">
        <button class="close-modal" id="closeNewsletter">&times;</button>
        <h2>📬 GitHub Bültenine Abone Ol</h2>
        <p>Yeni projelerden ve günlük GitHub özetlerinden haberdar ol.</p>
        <form id="newsletter-form" class="newsletter-form">
            <input type="email" id="email-input" placeholder="E-posta adresini gir..." required>
            <button type="submit" id="subscribe-btn">Abone Ol</button>
        </form>
        <div id="status-msg"></div>
    </div>
</div>

<footer>
    <p>Tüm hakları saklıdır. &copy; 2026 <a href="https://github.com/cemal201138" target="_blank" style="text-decoration:none; color:inherit;"><b>Cemal Evli</b></a></p>
</footer>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7A6ch3QXCuIfThH8NN7eXZqMQl69H77LbrWdDFdCXHpGpQ6x2nfuqQxbID6vdHFfj/exec"; 
const API = "https://api.github.com/repos/cemal201138/My_Netlify_SitesApps/contents/";

// --- TEMA KONTROLÜ ---
if(localStorage.getItem("theme") === "light") document.body.classList.add("light");

themeToggle.onclick = () => {
    document.body.classList.toggle("light");
    localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
};

// --- MODAL KONTROLÜ ---
const modal = document.getElementById('newsletterModal');
const openModalBtn = document.getElementById('openNewsletter');
const closeModalBtn = document.getElementById('closeNewsletter');

const toggleModal = (show) => {
    if(show) {
        modal.classList.add('active');
        document.body.style.overflow = 'hidden'; // Arka plan kaymasın
    } else {
        modal.classList.remove('active');
        document.body.style.overflow = 'auto';
        document.getElementById('status-msg').innerText = "";
    }
};

openModalBtn.onclick = () => toggleModal(true);
closeModalBtn.onclick = () => toggleModal(false);
window.onclick = (e) => { if(e.target === modal) toggleModal(false); };

// --- ABONELİK KAYIT ---
document.getElementById('newsletter-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email-input').value;
    const btn = document.getElementById('subscribe-btn');
    const msg = document.getElementById('status-msg');

    btn.disabled = true;
    btn.innerText = "Kaydediliyor...";

    try {
        await fetch(`${GOOGLE_SCRIPT_URL}?email=${encodeURIComponent(email)}`, { mode: 'no-cors' });
        
        msg.style.color = "#4ade80";
        msg.innerText = "✅ Başarıyla abone oldun!";
        
        // 1.5 saniye sonra pencereyi kapat
        setTimeout(() => {
            toggleModal(false);
            document.getElementById('newsletter-form').reset();
            btn.disabled = false;
            btn.innerText = "Abone Ol";
        }, 1500);

    } catch (err) {
        msg.style.color = "#f87171";
        msg.innerText = "❌ Hata oluştu, tekrar dene.";
        btn.disabled = false;
        btn.innerText = "Abone Ol";
    }
});

// --- PROJE YÜKLEME ---
const norm = t => t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

async function init() {
    try {
        const res = await fetch(API);
        const items = await res.json();
        const container = document.getElementById("project-container");
        container.innerHTML = "";

        const projects = items.filter(i => i.type === "dir");

        projects.forEach(p => {
            const cleanName = p.name.replace(/_/g, " ");
            const card = document.createElement("a");
            card.className = "project-card";
            card.href = p.path; 
            card.target = "_blank";
            card.dataset.name = norm(p.name) + " " + norm(cleanName);
            card.innerHTML = `
                <div class="icon">📂</div>
                <div class="name">${cleanName}</div>
            `;
            container.appendChild(card);
        });
    } catch (e) {
        document.getElementById("project-container").innerHTML = "Veriler yüklenemedi.";
    }
}

search.addEventListener("input", () => {
    const q = norm(search.value);
    document.querySelectorAll(".project-card").forEach(card => {
        card.classList.toggle("hidden", !card.dataset.name.includes(q));
    });
});

init();
</script>

</body>
</html>
