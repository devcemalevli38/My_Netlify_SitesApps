<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemal Evli | My Website</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f1f5f9;
            --accent: #38bdf8;
            --game-accent: #f472b6;
            --hover: #1e293b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .light {
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.8);
            --border: rgba(0, 0, 0, 0.05);
            --text: #0f172a;
            --accent: #0284c7;
            --game-accent: #db2777;
            --hover: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.1) 0px, transparent 50%);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .info-banner {
            position: fixed; top: 0; left: 0; right: 0;
            background: var(--accent); color: #0f172a;
            padding: 12px 20px; display: flex; justify-content: center;
            align-items: center; gap: 15px; z-index: 2000;
            font-size: 0.9rem; font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transform: translateY(-100%);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .info-banner.show { transform: translateY(0); }
        .info-banner button {
            background: rgba(0, 0, 0, 0.15); border: 1px solid rgba(0, 0, 0, 0.2);
            padding: 5px 15px; border-radius: 8px; cursor: pointer;
            font-size: 0.8rem; font-weight: bold; color: #0f172a;
        }

        header {
            width: 100%; max-width: 900px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
        }

        h1 { margin: 0; font-size: 1.8rem; letter-spacing: -1px; }

        .section-header {
            width: 100%; max-width: 900px;
            display: flex; justify-content: space-between; align-items: center;
            margin: 30px 0 15px;
        }

        .section-title {
            font-size: 1.2rem; display: flex; align-items: center;
            gap: 10px; color: var(--accent); margin: 0;
        }
        .section-title.games { color: var(--game-accent); }

        .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

        input {
            background: var(--card); border: 1px solid var(--border);
            color: var(--text); padding: 10px 14px; border-radius: 10px;
            outline: none; backdrop-filter: blur(5px); width: 220px; font-size: 0.95rem;
        }

        button.tool-btn {
            background: var(--card); border: 1px solid var(--border);
            color: var(--text); padding: 10px 16px; border-radius: 10px;
            cursor: pointer; backdrop-filter: blur(5px);
            font-weight: 600; font-size: 0.9rem; white-space: nowrap;
        }

        .lang-switcher { position: relative; display: inline-block; }
        .lang-btn {
            background: var(--card); border: 1px solid var(--border);
            color: var(--text); padding: 10px 16px; border-radius: 10px;
            cursor: pointer; backdrop-filter: blur(5px);
            font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 6px;
        }
        .lang-dropdown {
            position: absolute; top: calc(100% + 6px); left: 50%;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; backdrop-filter: blur(10px);
            box-shadow: var(--shadow); overflow: hidden; min-width: 130px;
            opacity: 0; visibility: hidden; transform: translateX(-50%) translateY(-6px);
            z-index: 999;
        }
        .lang-switcher.open .lang-dropdown { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
        .lang-option {
            display: flex; align-items: center; gap: 8px; padding: 10px 16px;
            cursor: pointer; font-size: 0.9rem; font-weight: 600; color: var(--text);
            border: none; background: none; width: 100%; text-align: left;
        }
        .lang-option:hover { background: var(--hover); }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px; width: 100%; max-width: 900px;
        }

        .project-card {
            background: var(--card); border: 1px solid var(--border);
            padding: 18px; border-radius: 16px; text-decoration: none;
            color: var(--text); display: flex; align-items: center;
            gap: 14px; box-shadow: var(--shadow); backdrop-filter: blur(10px);
            cursor: pointer;
        }
        .project-card:hover { transform: translateY(-4px); border-color: var(--accent); background: var(--hover); }
        .project-card.game-card:hover { border-color: var(--game-accent); }

        .icon {
            font-size: 22px; background: rgba(56, 189, 248, 0.1);
            width: 44px; height: 44px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; border-radius: 12px;
        }
        .game-card .icon { background: rgba(244, 114, 182, 0.1); }

        .badge {
            margin-left: auto; font-size: 0.65rem; padding: 4px 10px;
            border-radius: 20px; font-weight: bold;
            background: var(--game-accent); color: white; flex-shrink: 0;
        }

        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); 
            display: flex; align-items: center; justify-content: center; 
            z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease;
            padding: 16px;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 20px; padding: 28px; width: 100%; max-width: 600px; 
            position: relative; box-shadow: var(--shadow);
        }

        .file-list {
            max-height: 45vh; overflow-y: auto; margin-top: 15px;
            border-radius: 12px; background: rgba(0,0,0,0.2);
        }

        .file-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px; border-bottom: 1px solid var(--border); gap: 12px;
        }

        /* Yeni Alternatif Linkler Alanı */
        .alt-links-section {
            margin-top: 15px;
            padding: 12px;
            background: rgba(56, 189, 248, 0.05);
            border: 1px dashed var(--accent);
            border-radius: 12px;
        }
        .alt-link-item {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 8px; font-size: 0.85rem;
        }

        .download-link {
            background: var(--game-accent); color: white;
            padding: 6px 14px; border-radius: 8px; text-decoration: none;
            font-size: 0.75rem; font-weight: bold; white-space: nowrap;
        }

        .alt-btn { background: var(--accent) !important; }

        .close-modal {
            position: absolute; top: 14px; right: 14px;
            background: none; border: none; color: var(--text);
            font-size: 1.5rem; cursor: pointer;
        }

        .hidden { display: none; }

        footer {
            margin-top: auto; padding: 60px 0 20px; width: 100%;
            text-align: center; font-size: 0.9rem; opacity: 0.7;
        }
        footer b { color: var(--accent); }

        @media (max-width: 600px) {
            header { flex-direction: column; align-items: flex-start; }
            input { width: 100%; }
        }
    </style>
</head>
<body>

<div id="infoBanner" class="info-banner">
    <span id="bannerText"></span>
    <button id="bannerBtn" onclick="closeBanner()">Tamam</button>
</div>

<header>
    <h1>🚀 Cemal Evli</h1>
    <div class="controls">
        <input id="search" placeholder="">
        <button id="openNewsletter" class="tool-btn">📧</button>
        <div class="lang-switcher" id="langSwitcher">
            <button class="lang-btn" id="langBtn">🌐 <span id="langLabel"></span> ▾</button>
            <div class="lang-dropdown">
                <button class="lang-option" data-lang="en">🇬🇧 English</button>
                <button class="lang-option" data-lang="tr">🇹🇷 Türkçe</button>
            </div>
        </div>
        <button id="themeToggle" class="tool-btn">🌙 / ☀️</button>
    </div>
</header>

<div class="section-header">
    <h2 class="section-title" id="projectsTitle"></h2>
</div>
<div id="project-container" class="grid"></div>

<div class="section-header">
    <h2 class="section-title games" id="gamesTitle"></h2>
</div>
<div id="game-container" class="grid"></div>

<div id="gameFilesModal" class="modal-overlay">
    <div class="modal-content">
        <button class="close-modal" onclick="toggleModal('gameFilesModal', false)">&times;</button>
        <h2 id="modalGameName" style="margin:0; font-size:1.4rem;"></h2>
        
        <div id="fileContainer" class="file-list"></div>

        <div id="altLinksContainer" class="alt-links-section hidden">
            <div style="font-weight: bold; font-size: 0.8rem; color: var(--accent); margin-bottom: 5px;" id="altTitle">🔗 ALTERNATİF LİNKLER</div>
            <div id="altLinksList"></div>
        </div>
    </div>
</div>

<div id="newsletterModal" class="modal-overlay">
    <div class="modal-content">
        <button class="close-modal" onclick="toggleModal('newsletterModal', false)">&times;</button>
        <h2 id="newsletterTitle"></h2>
        <form id="newsletter-form" style="display:flex; flex-direction:column; gap:10px; margin-top:15px;">
            <input type="email" id="email-input" required style="width:100%;">
            <button type="submit" id="subscribe-btn" class="tool-btn" style="background:var(--accent); color:#0f172a; border:none;"></button>
        </form>
        <div id="status-msg"></div>
    </div>
</div>

<footer>
    <p id="footerText"></p>
</footer>

<script>
const PROJECTS_DATA_URL = "projects.json"; 
const GAMES_DATA_URL = "games.json";
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7A6ch3QXCuIfThH8NN7eXZqMQl69H77LbrWdDFdCXHpGpQ6x2nfuqQxbID6vdHFfj/exec";

const TRANSLATIONS = {
    en: {
        searchPlaceholder: "🔍 Search projects or games...",
        newsletterBtnTitle: "Subscribe",
        projectsTitle: "📂 My Web Projects",
        gamesTitle: "🎮 Games",
        loading: "Loading...",
        error: "Data is not ready yet.",
        newsletterTitle: "📬 Subscribe to GitHub Newsletter",
        emailPlaceholder: "Enter your e-mail...",
        subscribeBtn: "Subscribe",
        subscribing: "Subscribing...",
        subscribeSuccess: "✅ Successfully subscribed!",
        subscribeError: "❌ An error occurred.",
        noFiles: "No files found.",
        openBadge: "OPEN",
        downloadBtn: "DOWNLOAD",
        altLinkBtn: "ALT LINK",
        altTitle: "🔗 ALTERNATIVE LINKS",
        footerText: 'All rights reserved. &copy; 2026 <a href="https://github.com/cemal201138" target="_blank" style="text-decoration:none; color:inherit;"><b>Cemal Evli</b></a>',
        langLabel: "English",
        updateNotice: "🔄 Note: Data on this site is updated every hour.",
        bannerConfirm: "Got it!"
    },
    tr: {
        searchPlaceholder: "🔍 Proje veya Oyun Ara...",
        newsletterBtnTitle: "Abone Ol",
        projectsTitle: "📂 Web Projelerim",
        gamesTitle: "🎮 Oyunlar",
        loading: "Yükleniyor...",
        error: "Veriler henüz hazır değil.",
        newsletterTitle: "📬 GitHub Bültenine Abone Ol",
        emailPlaceholder: "E-posta adresini gir...",
        subscribeBtn: "Abone Ol",
        subscribing: "Kaydediliyor...",
        subscribeSuccess: "✅ Başarıyla abone oldun!",
        subscribeError: "❌ Hata oluştu.",
        noFiles: "Dosya bulunamadı.",
        openBadge: "AÇ",
        downloadBtn: "İNDİR",
        altLinkBtn: "ALT LİNK",
        altTitle: "🔗 ALTERNATİF LİNKLER",
        footerText: 'Tüm hakları saklıdır. &copy; 2026 <a href="https://github.com/cemal201138" target="_blank" style="text-decoration:none; color:inherit;"><b>Cemal Evli</b></a>',
        langLabel: "Türkçe",
        updateNotice: "🔄 Bilgi: Sitedeki veriler her saat başı otomatik olarak güncellenmektedir.",
        bannerConfirm: "Tamam"
    }
};

let currentLang = localStorage.getItem("lang") || "en";

function tr(key) { return TRANSLATIONS[currentLang][key] || TRANSLATIONS["en"][key]; }

function applyLanguage() {
    document.documentElement.lang = currentLang;
    document.getElementById("search").placeholder = tr("searchPlaceholder");
    document.getElementById("projectsTitle").textContent = tr("projectsTitle");
    document.getElementById("gamesTitle").textContent = tr("gamesTitle");
    document.getElementById("newsletterTitle").textContent = tr("newsletterTitle");
    document.getElementById("email-input").placeholder = tr("emailPlaceholder");
    document.getElementById("subscribe-btn").textContent = tr("subscribeBtn");
    document.getElementById("footerText").innerHTML = tr("footerText");
    document.getElementById("langLabel").textContent = tr("langLabel");
    document.getElementById("bannerText").textContent = tr("updateNotice");
    document.getElementById("bannerBtn").textContent = tr("bannerConfirm");
    document.getElementById("altTitle").textContent = tr("altTitle");

    document.querySelectorAll(".lang-option").forEach(btn => btn.classList.toggle("active", btn.dataset.lang === currentLang));
}

// Banner & Dil Kontrolleri
function checkBanner() { if (!localStorage.getItem("bannerClosed")) setTimeout(() => document.getElementById("infoBanner").classList.add("show"), 800); }
function closeBanner() { document.getElementById("infoBanner").classList.remove("show"); localStorage.setItem("bannerClosed", "true"); }

const langSwitcher = document.getElementById("langSwitcher");
document.getElementById("langBtn").addEventListener("click", (e) => { e.stopPropagation(); langSwitcher.classList.toggle("open"); });
document.addEventListener("click", () => langSwitcher.classList.remove("open"));
document.querySelectorAll(".lang-option").forEach(btn => {
    btn.addEventListener("click", (e) => {
        currentLang = btn.dataset.lang;
        localStorage.setItem("lang", currentLang);
        applyLanguage();
    });
});

function getFileIcon(filename) {
    const ext = filename.split('.').pop().toLowerCase();
    const icons = { 'zip':'📦','rar':'📦','apk':'🤖','exe':'⚙️','pdf':'📕','mp4':'🎬','mp3':'🎵' };
    return icons[ext] || '📄';
}

function toggleModal(id, show) {
    const m = document.getElementById(id);
    m.classList.toggle('active', show);
    document.body.style.overflow = show ? 'hidden' : 'auto';
}

const norm = s => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

// Tema
if (localStorage.getItem("theme") === "light") document.body.classList.add("light");
document.getElementById('themeToggle').onclick = () => {
    document.body.classList.toggle("light");
    localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
};

// --- VERİ YÜKLEME ---
async function loadProjects() {
    const container = document.getElementById("project-container");
    try {
        const res = await fetch(PROJECTS_DATA_URL);
        const items = await res.json();
        container.innerHTML = "";
        items.filter(i => i.type === "dir" && i.name !== ".github").forEach(p => {
            const card = document.createElement("a");
            card.className = "project-card";
            card.href = p.path;
            card.target = "_blank";
            card.dataset.name = norm(p.name);
            card.innerHTML = `<div class="icon">🌐</div><div class="name"><b>${p.name.replace(/_/g, " ")}</b></div>`;
            container.appendChild(card);
        });
    } catch (e) { container.innerHTML = `<p>${tr("error")}</p>`; }
}

async function loadGames() {
    const container = document.getElementById("game-container");
    try {
        const res = await fetch(GAMES_DATA_URL);
        const releases = await res.json();
        container.innerHTML = "";
        releases.forEach(rel => {
            const card = document.createElement("div");
            card.className = "project-card game-card";
            card.dataset.name = norm(rel.name || rel.tag_name);
            card.innerHTML = `
                <div class="icon">🎮</div>
                <div class="info-group">
                    <div class="name"><b>${rel.name || rel.tag_name}</b></div>
                    <div style="font-size:0.75rem; opacity:0.6;">${rel.tag_name}</div>
                </div>
                <span class="badge">${tr("openBadge")}</span>
            `;
            card.onclick = () => {
                const fileContainer = document.getElementById("fileContainer");
                const altContainer = document.getElementById("altLinksContainer");
                const altList = document.getElementById("altLinksList");
                
                document.getElementById("modalGameName").textContent = rel.name || rel.tag_name;
                fileContainer.innerHTML = "";
                altList.innerHTML = "";
                altContainer.classList.add("hidden");

                // 1. Dosyaları (Assets) Yükle
                if (rel.assets && rel.assets.length > 0) {
                    rel.assets.forEach(asset => {
                        const div = document.createElement("div");
                        div.className = "file-item";
                        const size = (asset.size / (1024 * 1024)).toFixed(2);
                        div.innerHTML = `
                            <div class="file-info">
                                <div class="file-icon">${getFileIcon(asset.name)}</div>
                                <div style="min-width:0;">
                                    <div style="font-weight:bold; font-size:0.85rem; word-break:break-all;">${asset.name}</div>
                                    <div style="font-size:0.7rem; opacity:0.6;">${size} MB</div>
                                </div>
                            </div>
                            <a href="${asset.browser_download_url}" class="download-link" target="_blank">${tr("downloadBtn")}</a>
                        `;
                        fileContainer.appendChild(div);
                    });
                } else {
                    fileContainer.innerHTML = `<p style='padding:20px; opacity:0.6;'>${tr("noFiles")}</p>`;
                }

                // 2. Body içindeki Linkleri (Alternatif) Yakala
                if (rel.body) {
                    const urlRegex = /(https?:\/\/[^\s]+)/g;
                    const links = rel.body.match(urlRegex);
                    
                    if (links && links.length > 0) {
                        altContainer.classList.remove("hidden");
                        links.forEach((link, index) => {
                            // GitHub'ın kendi asset linklerini tekrar gösterme
                            if(link.includes("/releases/download/")) return;

                            const altDiv = document.createElement("div");
                            altDiv.className = "alt-link-item";
                            const cleanLink = link.replace(/[()]/g, ''); // Markdown parantezlerini temizle
                            altDiv.innerHTML = `
                                <span style="opacity:0.8; font-size:0.75rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:200px;">Link #${index+1}</span>
                                <a href="${cleanLink}" class="download-link alt-btn" target="_blank">${tr("altLinkBtn")}</a>
                            `;
                            altList.appendChild(altDiv);
                        });
                        // Eğer hiç dış link yoksa tekrar gizle
                        if(altList.innerHTML === "") altContainer.classList.add("hidden");
                    }
                }

                toggleModal('gameFilesModal', true);
            };
            container.appendChild(card);
        });
    } catch (e) { container.innerHTML = `<p>${tr("error")}</p>`; }
}

document.getElementById('search').addEventListener("input", function () {
    const q = norm(this.value);
    document.querySelectorAll(".project-card").forEach(card => card.classList.toggle("hidden", !card.dataset.name.includes(q)));
});

applyLanguage();
loadProjects();
loadGames();
checkBanner();
</script>
</body>
</html>
