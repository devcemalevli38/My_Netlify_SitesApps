<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemal Evli | My Website</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f1f5f9;
            --accent: #38bdf8;
            --game-accent: #f472b6;
            --hover: #1e293b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .light {
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.8);
            --border: rgba(0, 0, 0, 0.05);
            --text: #0f172a;
            --accent: #0284c7;
            --game-accent: #db2777;
            --hover: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.1) 0px, transparent 50%);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        h1 { margin: 0; font-size: 1.8rem; letter-spacing: -1px; }

        .section-header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0 15px;
        }

        .section-title {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent);
            margin: 0;
        }

        .section-title.games { color: var(--game-accent); }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        input {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 10px;
            outline: none;
            backdrop-filter: blur(5px);
            width: 220px;
            font-size: 0.95rem;
        }

        button.tool-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        /* ===== DİL MENÜSÜ ===== */
        .lang-wrapper {
            position: relative;
        }

        .lang-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(30, 41, 59, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text);
            padding: 9px 11px;
            border-radius: 12px;
            cursor: pointer;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            box-shadow: 0 2px 12px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.07);
            transition: border-color 0.2s, background 0.2s;
        }

        .light .lang-btn {
            background: rgba(255, 255, 255, 0.75);
            border-color: rgba(0,0,0,0.1);
            box-shadow: 0 2px 12px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.9);
        }

        .lang-btn:hover {
            border-color: rgba(255,255,255,0.3);
            background: rgba(40, 55, 80, 0.85);
        }

        .light .lang-btn:hover {
            border-color: rgba(0,0,0,0.2);
            background: rgba(240,245,255,0.9);
        }

        .lang-btn .lang-icon {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 22px;
            background: rgba(255,255,255,0.12);
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.12);
        }

        .light .lang-btn .lang-icon {
            background: rgba(0,0,0,0.06);
            border-color: rgba(0,0,0,0.08);
        }

        .lang-btn .lang-arrow {
            font-size: 0.6rem;
            opacity: 0.55;
            transition: transform 0.2s;
        }

        .lang-btn.open .lang-arrow {
            transform: rotate(180deg);
        }

        .lang-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: rgba(18, 28, 48, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.13);
            border-radius: 14px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.07);
            min-width: 160px;
            overflow: hidden;
            z-index: 500;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-6px) scale(0.97);
            transform-origin: top right;
            transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s;
        }

        .light .lang-dropdown {
            background: rgba(248, 250, 255, 0.96);
            border-color: rgba(0,0,0,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.9);
        }

        .lang-dropdown.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .lang-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 16px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--text);
            transition: background 0.15s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .light .lang-option {
            border-bottom-color: rgba(0,0,0,0.05);
        }

        .lang-option:last-child { border-bottom: none; }

        .lang-option:hover {
            background: rgba(56, 189, 248, 0.12);
        }

        .light .lang-option:hover {
            background: rgba(2, 132, 199, 0.08);
        }

        .lang-option.active {
            color: var(--accent);
            background: rgba(56, 189, 248, 0.08);
        }

        .lang-option .opt-icon {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            width: 26px;
            height: 22px;
            background: rgba(255,255,255,0.08);
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .light .lang-option .opt-icon {
            background: rgba(0,0,0,0.05);
            border-color: rgba(0,0,0,0.08);
        }

        .lang-option .opt-label {
            flex: 1;
        }

        .lang-option .opt-check {
            font-size: 0.7rem;
            opacity: 0;
            color: var(--accent);
        }

        .lang-option.active .opt-check {
            opacity: 1;
        }
        /* ===== /DİL MENÜSÜ ===== */

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            width: 100%;
            max-width: 900px;
        }

        .project-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .project-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            background: var(--hover);
        }

        .project-card.game-card:hover { border-color: var(--game-accent); }

        .icon {
            font-size: 22px;
            background: rgba(56, 189, 248, 0.1);
            width: 44px;
            height: 44px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .game-card .icon { background: rgba(244, 114, 182, 0.1); }

        .badge {
            margin-left: auto;
            font-size: 0.65rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            background: var(--game-accent);
            color: white;
            flex-shrink: 0;
        }

        /* --- MODAL --- */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); 
            display: flex; align-items: center; justify-content: center; 
            z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease;
            padding: 16px;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .modal-content { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 20px; padding: 28px; width: 100%; max-width: 600px; 
            position: relative; box-shadow: var(--shadow);
        }

        .file-list {
            max-height: 55vh;
            overflow-y: auto;
            margin-top: 20px;
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }

        .file-item:last-child { border-bottom: none; }

        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .file-icon {
            font-size: 1.4rem;
            width: 32px;
            flex-shrink: 0;
            text-align: center;
        }

        .download-link {
            background: var(--game-accent);
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: bold;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .close-modal {
            position: absolute; top: 14px; right: 14px;
            background: none; border: none; color: var(--text);
            font-size: 1.5rem; cursor: pointer; line-height: 1;
        }

        .hidden { display: none; }

        footer {
            margin-top: auto;
            padding: 60px 0 20px;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.7;
        }
        footer b { color: var(--accent); }

        /* ===================== RESPONSIVE ===================== */
        @media (max-width: 600px) {
            body { padding: 24px 14px; }
            header { flex-direction: column; align-items: flex-start; gap: 10px; }
            h1 { font-size: 1.4rem; }
            .controls { width: 100%; }
            input { flex: 1; width: auto; min-width: 0; font-size: 0.9rem; }
            button.tool-btn { padding: 10px 12px; font-size: 0.85rem; }
            .grid { grid-template-columns: 1fr; gap: 12px; }
            .section-header { margin: 20px 0 10px; }
            .modal-content { padding: 20px; }
            .file-list { max-height: 60vh; }
            .file-item { padding: 12px 10px; }
        }

        @media (max-width: 380px) {
            h1 { font-size: 1.2rem; }
            .project-card { padding: 14px; gap: 10px; }
            .icon { width: 38px; height: 38px; font-size: 18px; }
        }

        @media (min-width: 1200px) {
            .grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

<header>
    <h1>🚀 Cemal Evli</h1>
    <div class="controls">
        <input id="search" placeholder="🔍 Proje veya Oyun Ara...">
        <button id="openNewsletter" class="tool-btn" title="Abone Ol">📧</button>
        <button id="themeToggle" class="tool-btn">🌙 / ☀️</button>

        <!-- DİL MENÜSÜ -->
        <div class="lang-wrapper">
            <button class="lang-btn" id="langBtn" aria-label="Dil Seç">
                <span class="lang-icon" id="langIcon">TR</span>
                <span class="lang-arrow">▼</span>
            </button>
            <div class="lang-dropdown" id="langDropdown">
                <div class="lang-option active" data-lang="tr" data-icon="TR" data-label="Türkçe">
                    <span class="opt-icon">TR</span>
                    <span class="opt-label">Türkçe</span>
                    <span class="opt-check">✓</span>
                </div>
                <div class="lang-option" data-lang="en" data-icon="EN" data-label="English">
                    <span class="opt-icon">EN</span>
                    <span class="opt-label">English</span>
                    <span class="opt-check">✓</span>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="section-header">
    <h2 class="section-title" id="secProjects">📂 Web Projelerim</h2>
</div>
<div id="project-container" class="grid"><p>Yükleniyor...</p></div>

<div class="section-header">
    <h2 class="section-title games" id="secGames">🎮 Oyunlar</h2>
</div>
<div id="game-container" class="grid"><p>Yükleniyor...</p></div>

<div id="newsletterModal" class="modal-overlay">
    <div class="modal-content">
        <button class="close-modal" onclick="toggleModal('newsletterModal', false)">&times;</button>
        <h2 id="modalNewsletterTitle">📬 GitHub Bültenine Abone Ol</h2>
        <form id="newsletter-form" style="display:flex; flex-direction:column; gap:10px; margin-top:15px;">
            <input type="email" id="email-input" placeholder="E-posta adresini gir..." required style="width:100%;">
            <button type="submit" id="subscribe-btn" class="tool-btn" style="background:var(--accent); color:#0f172a; border:none;">Abone Ol</button>
        </form>
        <div id="status-msg"></div>
    </div>
</div>

<div id="gameFilesModal" class="modal-overlay">
    <div class="modal-content">
        <button class="close-modal" onclick="toggleModal('gameFilesModal', false)">&times;</button>
        <h2 id="modalGameName" style="margin:0; font-size:1.4rem;">🎮 Oyun Dosyaları</h2>
        <div id="fileContainer" class="file-list"></div>
    </div>
</div>

<footer>
    <p>Tüm hakları saklıdır. &copy; 2026 <a href="https://github.com/cemal201138" target="_blank" style="text-decoration:none; color:inherit;"><b>Cemal Evli</b></a></p>
</footer>

<script>
const USERNAME = "cemal201138";
const SITES_API = `https://api.github.com/repos/${USERNAME}/My_Netlify_SitesApps/contents/`;
const RELEASES_API = `https://api.github.com/repos/${USERNAME}/games/releases`;
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7A6ch3QXCuIfThH8NN7eXZqMQl69H77LbrWdDFdCXHpGpQ6x2nfuqQxbID6vdHFfj/exec";

/* ============ DİL SİSTEMİ ============ */
const translations = {
    tr: {
        searchPlaceholder: "🔍 Proje veya Oyun Ara...",
        secProjects: "📂 Web Projelerim",
        secGames: "🎮 Oyunlar",
        loading: "Yükleniyor...",
        error: "Hata oluştu.",
        noFiles: "Dosya bulunamadı.",
        gameFiles: "🎮 Oyun Dosyaları",
        newsletterTitle: "📬 GitHub Bültenine Abone Ol",
        emailPlaceholder: "E-posta adresini gir...",
        subscribing: "Kaydediliyor...",
        subscribeBtn: "Abone Ol",
        subscribeOk: "✅ Başarıyla abone oldun!",
        subscribeErr: "❌ Hata oluştu.",
        openBadge: "AÇ",
        download: "İNDİR",
    },
    en: {
        searchPlaceholder: "🔍 Search Project or Game...",
        secProjects: "📂 My Web Projects",
        secGames: "🎮 Games",
        loading: "Loading...",
        error: "An error occurred.",
        noFiles: "No files found.",
        gameFiles: "🎮 Game Files",
        newsletterTitle: "📬 Subscribe to GitHub Newsletter",
        emailPlaceholder: "Enter your e-mail...",
        subscribing: "Saving...",
        subscribeBtn: "Subscribe",
        subscribeOk: "✅ Successfully subscribed!",
        subscribeErr: "❌ An error occurred.",
        openBadge: "OPEN",
        download: "DOWNLOAD",
    },

};

let currentLang = localStorage.getItem("lang") || "tr";

function applyLang(lang) {
    const t = translations[lang];
    document.getElementById("search").placeholder = t.searchPlaceholder;
    document.getElementById("secProjects").textContent = t.secProjects;
    document.getElementById("secGames").textContent = t.secGames;
    document.getElementById("subscribe-btn").textContent = t.subscribeBtn;
    document.getElementById("email-input").placeholder = t.emailPlaceholder;
    document.getElementById("modalNewsletterTitle").textContent = t.newsletterTitle;
    document.querySelectorAll(".badge").forEach(b => b.textContent = t.openBadge);
    document.querySelectorAll(".download-link").forEach(a => a.textContent = t.download);
    document.documentElement.lang = lang;
}

// Dil buton toggle
const langBtn = document.getElementById("langBtn");
const langDropdown = document.getElementById("langDropdown");

langBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    const open = langDropdown.classList.toggle("open");
    langBtn.classList.toggle("open", open);
});

document.addEventListener("click", () => {
    langDropdown.classList.remove("open");
    langBtn.classList.remove("open");
});

langDropdown.addEventListener("click", (e) => e.stopPropagation());

document.querySelectorAll(".lang-option").forEach(opt => {
    opt.addEventListener("click", () => {
        const lang = opt.dataset.lang;
        currentLang = lang;
        localStorage.setItem("lang", lang);
        // buton güncelle
        document.getElementById("langIcon").textContent = opt.dataset.icon;
        // aktif işareti
        document.querySelectorAll(".lang-option").forEach(o => o.classList.remove("active"));
        opt.classList.add("active");
        // dropdown kapat
        langDropdown.classList.remove("open");
        langBtn.classList.remove("open");
        applyLang(lang);
    });
});

// Başlangıçta kayıtlı dili uygula
(function initLang() {
    const saved = localStorage.getItem("lang") || "tr";
    const opt = document.querySelector(`.lang-option[data-lang="${saved}"]`);
    if (opt) {
        document.getElementById("langIcon").textContent = opt.dataset.icon;
        document.querySelectorAll(".lang-option").forEach(o => o.classList.remove("active"));
        opt.classList.add("active");
    }
    applyLang(saved);
})();
/* ============ /DİL SİSTEMİ ============ */

function getFileIcon(filename) {
    const ext = filename.split('.').pop().toLowerCase();
    const icons = {
        'zip': '📦', 'rar': '📦', '7z': '📦',
        'exe': '⚙️', 'msi': '⚙️',
        'apk': '🤖',
        'pdf': '📕',
        'jpg': '🖼️', 'png': '🖼️', 'gif': '🖼️',
        'txt': '📄', 'md': '📝',
        'mp4': '🎬', 'mp3': '🎵'
    };
    return icons[ext] || '📄';
}

function toggleModal(id, show) {
    const m = document.getElementById(id);
    if(show) { m.classList.add('active'); document.body.style.overflow = 'hidden'; }
    else { m.classList.remove('active'); document.body.style.overflow = 'auto'; }
}

// Tema
if(localStorage.getItem("theme") === "light") document.body.classList.add("light");
document.getElementById('themeToggle').onclick = () => {
    document.body.classList.toggle("light");
    localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
};

document.getElementById('openNewsletter').onclick = () => toggleModal('newsletterModal', true);

document.getElementById('newsletter-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('subscribe-btn');
    const msg = document.getElementById('status-msg');
    const t = translations[currentLang];
    btn.disabled = true; btn.innerText = t.subscribing;
    try {
        await fetch(`${GOOGLE_SCRIPT_URL}?email=${encodeURIComponent(document.getElementById('email-input').value)}`, { mode: 'no-cors' });
        msg.innerHTML = `<span style='color:#4ade80'>${t.subscribeOk}</span>`;
        setTimeout(() => { toggleModal('newsletterModal', false); btn.disabled = false; btn.innerText = t.subscribeBtn; }, 1500);
    } catch (err) {
        msg.innerHTML = `<span style='color:#f87171'>${t.subscribeErr}</span>`;
        btn.disabled = false;
    }
});

const norm = t => t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

async function loadProjects() {
    const container = document.getElementById("project-container");
    const t = translations[currentLang];
    try {
        const res = await fetch(SITES_API);
        const items = await res.json();
        container.innerHTML = "";
        items.filter(i => i.type === "dir").forEach(p => {
            const card = document.createElement("a");
            card.className = "project-card";
            card.href = p.path; card.target = "_blank";
            card.dataset.name = norm(p.name);
            card.innerHTML = `<div class="icon">🌐</div><div class="name"><b>${p.name.replace(/_/g, " ")}</b></div>`;
            container.appendChild(card);
        });
    } catch (e) { container.innerHTML = `<p>${t.error}</p>`; }
}

async function loadGames() {
    const container = document.getElementById("game-container");
    const t = translations[currentLang];
    try {
        const res = await fetch(RELEASES_API);
        const releases = await res.json();
        container.innerHTML = "";

        releases.forEach(rel => {
            const card = document.createElement("div");
            card.className = "project-card game-card";
            card.dataset.name = norm(rel.name || rel.tag_name);
            card.innerHTML = `
                <div class="icon">🎮</div>
                <div class="info-group">
                    <div class="name"><b>${rel.name || rel.tag_name}</b></div>
                    <div style="font-size:0.75rem; opacity:0.6;">${rel.tag_name}</div>
                </div>
                <span class="badge">${t.openBadge}</span>
            `;
            
            card.onclick = () => {
                const fileContainer = document.getElementById("fileContainer");
                document.getElementById("modalGameName").innerText = rel.name || rel.tag_name;
                fileContainer.innerHTML = "";

                if(rel.assets.length === 0) {
                    fileContainer.innerHTML = `<p style='padding:20px; opacity:0.6;'>${t.noFiles}</p>`;
                } else {
                    rel.assets.forEach(asset => {
                        const div = document.createElement("div");
                        div.className = "file-item";
                        const size = (asset.size / (1024 * 1024)).toFixed(2);
                        const icon = getFileIcon(asset.name);
                        div.innerHTML = `
                            <div class="file-info">
                                <div class="file-icon">${icon}</div>
                                <div style="min-width:0;">
                                    <div style="font-weight:bold; font-size:0.85rem; word-break:break-all;">${asset.name}</div>
                                    <div style="font-size:0.7rem; opacity:0.6;">${size} MB</div>
                                </div>
                            </div>
                            <a href="${asset.browser_download_url}" class="download-link">${t.download}</a>
                        `;
                        fileContainer.appendChild(div);
                    });
                }
                toggleModal('gameFilesModal', true);
            };
            container.appendChild(card);
        });
    } catch (e) { container.innerHTML = `<p>${t.error}</p>`; }
}

document.getElementById('search').addEventListener("input", function() {
    const q = norm(this.value);
    document.querySelectorAll(".project-card").forEach(card => card.classList.toggle("hidden", !card.dataset.name.includes(q)));
});

loadProjects();
loadGames();
</script>
</body>
</html>
