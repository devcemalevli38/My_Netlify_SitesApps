<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemal Evli | Portfolio & Games</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f1f5f9;
            --accent: #38bdf8;
            --game-accent: #f472b6;
            --hover: #1e293b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .light {
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.8);
            --border: rgba(0, 0, 0, 0.05);
            --text: #0f172a;
            --accent: #0284c7;
            --game-accent: #db2777;
            --hover: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.1) 0px, transparent 50%);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 20px;
        }

        h1 { margin: 0; font-size: 1.8rem; letter-spacing: -1px; }

        .section-header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0 15px;
        }

        .section-title {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent);
            margin: 0;
        }

        .section-title.games { color: var(--game-accent); }

        .controls { display: flex; gap: 10px; }

        input {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 15px;
            border-radius: 10px;
            outline: none;
            backdrop-filter: blur(5px);
            width: 250px;
        }

        button.tool-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .project-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            background: var(--hover);
        }

        .project-card.game-card:hover { border-color: var(--game-accent); }

        .icon {
            font-size: 24px;
            background: rgba(56, 189, 248, 0.1);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .game-card .icon { background: rgba(244, 114, 182, 0.1); }

        .badge {
            margin-left: auto;
            font-size: 0.65rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            background: var(--game-accent);
            color: white;
        }

        /* --- MODAL VE DOSYA LİSTESİ --- */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); 
            display: flex; align-items: center; justify-content: center; 
            z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .modal-content { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 20px; padding: 30px; width: 95%; max-width: 600px; 
            position: relative; box-shadow: var(--shadow);
        }

        .file-list {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid var(--border);
            gap: 15px;
        }

        .file-item:last-child { border-bottom: none; }

        .file-info { display: flex; align-items: center; gap: 12px; }

        .file-icon {
            font-size: 1.4rem;
            width: 35px;
            text-align: center;
        }

        .download-link {
            background: var(--game-accent);
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: bold;
            white-space: nowrap;
        }

        .close-modal { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; }
        .hidden { display: none; }

        footer { margin-top: auto; padding: 60px 0 20px; width: 100%; text-align: center; font-size: 0.9rem; opacity: 0.7; }
        footer b { color: var(--accent); }
    </style>
</head>
<body>

<header>
    <h1>🚀 Cemal Evli</h1>
    <div class="controls">
        <input id="search" placeholder="🔍 Proje veya Oyun Ara...">
        <button id="openNewsletter" class="tool-btn" title="Abone Ol">📧</button>
        <button id="themeToggle" class="tool-btn">🌙 / ☀️</button>
    </div>
</header>

<div class="section-header">
    <h2 class="section-title">📂 Web Projelerim</h2>
</div>
<div id="project-container" class="grid"><p>Yükleniyor...</p></div>

<div class="section-header">
    <h2 class="section-title games">🎮 Oyunlar</h2>
</div>
<div id="game-container" class="grid"><p>Yükleniyor...</p></div>

<div id="newsletterModal" class="modal-overlay">
    <div class="modal-content">
        <button class="close-modal" onclick="toggleModal('newsletterModal', false)">&times;</button>
        <h2>📬 GitHub Bültenine Abone Ol</h2>
        <form id="newsletter-form" style="display:flex; flex-direction:column; gap:10px; margin-top:15px;">
            <input type="email" id="email-input" placeholder="E-posta adresini gir..." required style="width:100%;">
            <button type="submit" id="subscribe-btn" class="tool-btn" style="background:var(--accent); color:#0f172a; border:none;">Abone Ol</button>
        </form>
        <div id="status-msg"></div>
    </div>
</div>

<div id="gameFilesModal" class="modal-overlay">
    <div class="modal-content">
        <button class="close-modal" onclick="toggleModal('gameFilesModal', false)">&times;</button>
        <h2 id="modalGameName" style="margin:0; font-size:1.4rem;">🎮 Oyun Dosyaları</h2>
        <div id="fileContainer" class="file-list"></div>
    </div>
</div>

<footer>
    <p>Tüm hakları saklıdır. &copy; 2026 <a href="https://github.com/cemal201138" target="_blank" style="text-decoration:none; color:inherit;"><b>Cemal Evli</b></a></p>
</footer>

<script>
const USERNAME = "cemal201138";
const SITES_API = `https://api.github.com/repos/${USERNAME}/My_Netlify_SitesApps/contents/`;
const RELEASES_API = `https://api.github.com/repos/${USERNAME}/games/releases`;
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7A6ch3QXCuIfThH8NN7eXZqMQl69H77LbrWdDFdCXHpGpQ6x2nfuqQxbID6vdHFfj/exec"; 

// --- DOSYA İKONU BELİRLEYİCİ ---
function getFileIcon(filename) {
    const ext = filename.split('.').pop().toLowerCase();
    const icons = {
        'zip': '📦', 'rar': '📦', '7z': '📦',
        'exe': '⚙️', 'msi': '⚙️',
        'apk': '🤖',
        'pdf': '📕',
        'jpg': '🖼️', 'png': '🖼️', 'gif': '🖼️',
        'txt': '📄', 'md': '📝',
        'mp4': '🎬', 'mp3': '🎵'
    };
    return icons[ext] || '📄';
}

function toggleModal(id, show) {
    const m = document.getElementById(id);
    if(show) { m.classList.add('active'); document.body.style.overflow = 'hidden'; }
    else { m.classList.remove('active'); document.body.style.overflow = 'auto'; }
}

// Tema
if(localStorage.getItem("theme") === "light") document.body.classList.add("light");
themeToggle.onclick = () => {
    document.body.classList.toggle("light");
    localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
};

openNewsletter.onclick = () => toggleModal('newsletterModal', true);

// Abonelik
document.getElementById('newsletter-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('subscribe-btn');
    const msg = document.getElementById('status-msg');
    btn.disabled = true; btn.innerText = "Kaydediliyor...";
    try {
        await fetch(`${GOOGLE_SCRIPT_URL}?email=${encodeURIComponent(document.getElementById('email-input').value)}`, { mode: 'no-cors' });
        msg.innerHTML = "<span style='color:#4ade80'>✅ Başarıyla abone oldun!</span>";
        setTimeout(() => { toggleModal('newsletterModal', false); btn.disabled = false; btn.innerText = "Abone Ol"; }, 1500);
    } catch (err) { msg.innerHTML = "<span style='color:#f87171'>❌ Hata oluştu.</span>"; btn.disabled = false; }
});

const norm = t => t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

// --- WEB PROJELERİ ---
async function loadProjects() {
    try {
        const res = await fetch(SITES_API);
        const items = await res.json();
        const container = document.getElementById("project-container");
        container.innerHTML = "";
        items.filter(i => i.name !== "Cikma_Teklifi" && i.type === "dir").forEach(p => {
            const card = document.createElement("a");
            card.className = "project-card";
            card.href = p.path; card.target = "_blank";
            card.dataset.name = norm(p.name);
            card.innerHTML = `<div class="icon">🌐</div><div class="name"><b>${p.name.replace(/_/g, " ")}</b></div>`;
            container.appendChild(card);
        });
    } catch (e) { container.innerHTML = "Hata oluştu."; }
}

// --- OYUNLAR VE İKONLU DOSYA LİSTESİ ---
async function loadGames() {
    try {
        const res = await fetch(RELEASES_API);
        const releases = await res.json();
        const container = document.getElementById("game-container");
        container.innerHTML = "";

        releases.forEach(rel => {
            const card = document.createElement("div");
            card.className = "project-card game-card";
            card.dataset.name = norm(rel.name || rel.tag_name);
            card.innerHTML = `
                <div class="icon">🎮</div>
                <div class="info-group">
                    <div class="name"><b>${rel.name || rel.tag_name}</b></div>
                    <div style="font-size:0.75rem; opacity:0.6;">${rel.tag_name}</div>
                </div>
                <span class="badge">AÇ</span>
            `;
            
            card.onclick = () => {
                const fileContainer = document.getElementById("fileContainer");
                document.getElementById("modalGameName").innerText = rel.name || rel.tag_name;
                fileContainer.innerHTML = "";

                if(rel.assets.length === 0) {
                    fileContainer.innerHTML = "<p style='padding:20px; opacity:0.6;'>Dosya bulunamadı.</p>";
                } else {
                    rel.assets.forEach(asset => {
                        const div = document.createElement("div");
                        div.className = "file-item";
                        const size = (asset.size / (1024 * 1024)).toFixed(2);
                        const icon = getFileIcon(asset.name); // İkon burada belirleniyor
                        
                        div.innerHTML = `
                            <div class="file-info">
                                <div class="file-icon">${icon}</div>
                                <div>
                                    <div style="font-weight:bold; font-size:0.85rem; word-break:break-all;">${asset.name}</div>
                                    <div style="font-size:0.7rem; opacity:0.6;">${size} MB</div>
                                </div>
                            </div>
                            <a href="${asset.browser_download_url}" class="download-link">İNDİR</a>
                        `;
                        fileContainer.appendChild(div);
                    });
                }
                toggleModal('gameFilesModal', true);
            };
            container.appendChild(card);
        });
    } catch (e) { container.innerHTML = "Hata oluştu."; }
}

search.addEventListener("input", () => {
    const q = norm(search.value);
    document.querySelectorAll(".project-card").forEach(card => card.classList.toggle("hidden", !card.dataset.name.includes(q)));
});

loadProjects();
loadGames();
</script>
</body>
</html>
