<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemal Evli | Portfolio & Games</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f1f5f9;
            --accent: #38bdf8;
            --game-accent: #f472b6;
            --hover: #1e293b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .light {
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.8);
            --border: rgba(0, 0, 0, 0.05);
            --text: #0f172a;
            --accent: #0284c7;
            --game-accent: #db2777;
            --hover: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.1) 0px, transparent 50%);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 20px;
        }

        h1 { margin: 0; font-size: 1.8rem; letter-spacing: -1px; }

        .section-header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0 15px;
        }

        .section-title {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent);
            margin: 0;
        }

        .section-title.games { color: var(--game-accent); }

        .controls { display: flex; gap: 10px; }

        input {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 15px;
            border-radius: 10px;
            outline: none;
            backdrop-filter: blur(5px);
            width: 250px;
        }

        button.tool-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .project-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            background: var(--hover);
        }

        .project-card.game-card:hover { border-color: var(--game-accent); }

        .icon {
            font-size: 24px;
            background: rgba(56, 189, 248, 0.1);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .game-card .icon { background: rgba(244, 114, 182, 0.1); }

        .badge {
            margin-left: auto;
            font-size: 0.65rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            background: var(--game-accent);
            color: white;
        }

        .version-info {
            font-size: 0.75rem;
            opacity: 0.6;
            margin-top: 4px;
        }

        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); 
            display: flex; align-items: center; justify-content: center; 
            z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .newsletter-section { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 20px; padding: 30px; text-align: center; 
            width: 90%; max-width: 500px; position: relative;
            box-shadow: var(--shadow); border-bottom: 4px solid var(--accent);
        }
        
        .close-modal { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; }
        .hidden { display: none; }
        
        #status-msg { margin-top: 15px; font-weight: 600; font-size: 0.9rem; min-height: 20px; }

        footer { margin-top: auto; padding: 60px 0 20px; width: 100%; text-align: center; font-size: 0.9rem; opacity: 0.7; }
        footer b { color: var(--accent); }
    </style>
</head>
<body>

<header>
    <h1>🚀 Cemal Evli</h1>
    <div class="controls">
        <input id="search" placeholder="🔍 Proje veya Oyun Ara...">
        <button id="openNewsletter" class="tool-btn" title="Abone Ol">📧</button>
        <button id="themeToggle" class="tool-btn">🌙 / ☀️</button>
    </div>
</header>

<div class="section-header">
    <h2 class="section-title">📂 Web Projelerim</h2>
</div>
<div id="project-container" class="grid"><p>Yükleniyor...</p></div>

<div class="section-header">
    <h2 class="section-title games">🎮 Oyunlar</h2>
</div>
<div id="game-container" class="grid"><p>Yükleniyor...</p></div>

<div id="newsletterModal" class="modal-overlay">
    <div class="newsletter-section">
        <button class="close-modal" id="closeNewsletter">&times;</button>
        <h2>📬 GitHub Bültenine Abone Ol</h2>
        <p style="font-size: 0.9rem; opacity: 0.8; margin-bottom: 15px;">Yeni projelerden ve günlük GitHub özetlerinden haberdar ol.</p>
        <form id="newsletter-form" style="display:flex; flex-direction:column; gap:10px;">
            <input type="email" id="email-input" placeholder="E-posta adresini gir..." required style="width:100%;">
            <button type="submit" id="subscribe-btn" class="tool-btn" style="background:var(--accent); color:#0f172a; border:none;">Abone Ol</button>
        </form>
        <div id="status-msg"></div>
    </div>
</div>

<footer>
    <p>Tüm hakları saklıdır. &copy; 2026 <a href="https://github.com/cemal201138" target="_blank" style="text-decoration:none; color:inherit;"><b>Cemal Evli</b></a></p>
</footer>

<script>
const USERNAME = "cemal201138";
const SITES_API = `https://api.github.com/repos/${USERNAME}/My_Netlify_SitesApps/contents/`;
const RELEASES_API = `https://api.github.com/repos/${USERNAME}/games/releases`;
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7A6ch3QXCuIfThH8NN7eXZqMQl69H77LbrWdDFdCXHpGpQ6x2nfuqQxbID6vdHFfj/exec"; 

// --- TEMA VE MODAL İŞLEMLERİ ---
if(localStorage.getItem("theme") === "light") document.body.classList.add("light");

themeToggle.onclick = () => {
    document.body.classList.toggle("light");
    localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
};

const modal = document.getElementById('newsletterModal');
const toggleModal = (show) => {
    if(show) {
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
    } else {
        modal.classList.remove('active');
        document.body.style.overflow = 'auto';
        document.getElementById('status-msg').innerText = "";
    }
};

openNewsletter.onclick = () => toggleModal(true);
closeNewsletter.onclick = () => toggleModal(false);
window.onclick = (e) => { if(e.target === modal) toggleModal(false); };

// --- ABONELİK SİSTEMİ (GOOGLE SCRIPTS) ---
document.getElementById('newsletter-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email-input').value;
    const btn = document.getElementById('subscribe-btn');
    const msg = document.getElementById('status-msg');

    btn.disabled = true;
    btn.innerText = "Kaydediliyor...";

    try {
        // mode: 'no-cors' Google Scripts yönlendirmeleri için gereklidir
        await fetch(`${GOOGLE_SCRIPT_URL}?email=${encodeURIComponent(email)}`, { mode: 'no-cors' });
        
        msg.style.color = "#4ade80";
        msg.innerText = "✅ Başarıyla abone oldun!";
        
        setTimeout(() => {
            toggleModal(false);
            document.getElementById('newsletter-form').reset();
            btn.disabled = false;
            btn.innerText = "Abone Ol";
        }, 1500);

    } catch (err) {
        msg.style.color = "#f87171";
        msg.innerText = "❌ Hata oluştu, tekrar dene.";
        btn.disabled = false;
        btn.innerText = "Abone Ol";
    }
});

const norm = t => t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

// --- WEB PROJELERİNİ YÜKLE ---
async function loadProjects() {
    try {
        const res = await fetch(SITES_API);
        const items = await res.json();
        const container = document.getElementById("project-container");
        container.innerHTML = "";
        items.filter(i => i.name !== "Cikma_Teklifi" && i.type === "dir").forEach(p => {
            const card = document.createElement("a");
            card.className = "project-card";
            card.href = p.path;
            card.target = "_blank";
            card.dataset.name = norm(p.name);
            card.innerHTML = `
                <div class="icon">🌐</div>
                <div class="name"><b>${p.name.replace(/_/g, " ")}</b></div>
            `;
            container.appendChild(card);
        });
    } catch (e) { document.getElementById("project-container").innerHTML = "Projeler yüklenemedi."; }
}

// --- OYUN RELEASES YÜKLE ---
async function loadGames() {
    try {
        const res = await fetch(RELEASES_API);
        const releases = await res.json();
        const container = document.getElementById("game-container");
        container.innerHTML = "";

        if (releases.length === 0) {
            container.innerHTML = "<p>Henüz yayınlanmış bir sürüm bulunamadı.</p>";
            return;
        }

        releases.forEach(rel => {
            const downloadUrl = rel.assets.length > 0 ? rel.assets[0].browser_download_url : rel.html_url;
            
            const card = document.createElement("a");
            card.className = "project-card game-card";
            card.href = downloadUrl;
            card.target = "_blank";
            card.dataset.name = norm(rel.name || rel.tag_name);
            
            card.innerHTML = `
                <div class="icon">🎮</div>
                <div class="info-group">
                    <div class="name"><b>${rel.name || rel.tag_name}</b></div>
                    <div class="version-info">${rel.tag_name}</div>
                </div>
                <span class="badge">İNDİR</span>
            `;
            container.appendChild(card);
        });
    } catch (e) { document.getElementById("game-container").innerHTML = "Sürümler yüklenemedi."; }
}

// --- ARAMA FONKSİYONU ---
search.addEventListener("input", () => {
    const q = norm(search.value);
    document.querySelectorAll(".project-card").forEach(card => {
        card.classList.toggle("hidden", !card.dataset.name.includes(q));
    });
});

// Başlat
loadProjects();
loadGames();
</script>

</body>
</html>
