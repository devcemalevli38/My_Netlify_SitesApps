<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemal Evli | My Website</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f1f5f9;
            --accent: #38bdf8;
            --game-accent: #f472b6;
            --hover: #1e293b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            --dropdown-bg: #1e293b;
            --dropdown-hover: #38bdf8;
        }

        .light {
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.8);
            --border: rgba(0, 0, 0, 0.05);
            --text: #0f172a;
            --accent: #0284c7;
            --game-accent: #db2777;
            --hover: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            --dropdown-bg: #ffffff;
            --dropdown-hover: #0284c7;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.1) 0px, transparent 50%);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        h1 { margin: 0; font-size: 1.8rem; letter-spacing: -1px; }

        .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

        /* --- DİL MENÜSÜ TASARIMI --- */
        .custom-dropdown { position: relative; display: inline-block; user-select: none; }

        .dropdown-trigger {
            background: var(--card);
            border: 1px solid var(--accent);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(5px);
        }

        .dropdown-menu {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--dropdown-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            min-width: 150px;
            overflow: hidden;
            box-shadow: var(--shadow);
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
        }

        .dropdown-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            padding: 12px 16px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text);
        }

        /* Görseldeki Mavi Seçim Efekti */
        .dropdown-item:hover, .dropdown-item.active-lang {
            background: var(--dropdown-hover);
            color: white;
        }

        /* Proje Kartları */
        input {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 10px;
            outline: none;
            width: 220px;
        }

        .section-header { width: 100%; max-width: 900px; margin: 30px 0 15px; }
        .section-title { font-size: 1.2rem; display: flex; align-items: center; gap: 10px; color: var(--accent); }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            width: 100%;
            max-width: 900px;
        }

        .project-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow);
        }

        .project-card:hover { border-color: var(--accent); transform: translateY(-2px); }

        .icon {
            width: 40px; height: 40px;
            background: rgba(56, 189, 248, 0.1);
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-size: 1.2rem;
        }

        .badge { margin-left: auto; font-size: 0.7rem; padding: 4px 10px; border-radius: 8px; background: var(--game-accent); color: white; font-weight: bold; }

        footer { margin-top: auto; padding: 40px 0; opacity: 0.7; font-size: 0.9rem; }

        @media (max-width: 600px) {
            header { flex-direction: column; align-items: stretch; }
            input { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <h1>🚀 Cemal Evli</h1>
    <div class="controls">
        <input id="search" placeholder="🔍 Ara...">
        <button id="openNewsletter" class="tool-btn" style="background:var(--card); border:1px solid var(--border); border-radius:10px; padding:8px 12px; cursor:pointer;">📧</button>
        
        <div class="custom-dropdown" id="langDropdown">
            <div class="dropdown-trigger">
                <span><img src="https://flagcdn.com/w20/tr.png" id="langIcon" style="width:18px;"></span> 
                <span id="currentLangDisplay">Türkçe</span>
            </div>
            <div class="dropdown-menu" id="langMenu">
                <div class="dropdown-item" data-lang="tr">Türkçe</div>
                <div class="dropdown-item" data-lang="en">English</div>
            </div>
        </div>

        <button id="themeToggle" style="background:var(--card); border:1px solid var(--border); border-radius:10px; padding:8px 12px; cursor:pointer;">🌙 / ☀️</button>
    </div>
</header>

<div class="section-header">
    <h2 class="section-title" id="title-web">📂 Web Projelerim</h2>
</div>
<div id="project-container" class="grid"></div>

<div class="section-header">
    <h2 class="section-title" id="title-games" style="color:var(--game-accent)">🎮 Oyunlar</h2>
</div>
<div id="game-container" class="grid"></div>

<footer>
    <p id="footer-text">Tüm hakları saklıdır. &copy; 2026 <b>Cemal Evli</b></p>
</footer>

<script>
// Veri önbelleği (API limitini aşmamak için)
let cachedProjects = [];
let cachedGames = [];

const translations = {
    tr: {
        search: "🔍 Proje veya Oyun Ara...",
        web: "📂 Web Projelerim",
        games: "🎮 Oyunlar",
        badge: "AÇ",
        footer: "Tüm hakları saklıdır.",
        loading: "Yükleniyor..."
    },
    en: {
        search: "🔍 Search Project or Game...",
        web: "📂 My Web Projects",
        games: "🎮 Games",
        badge: "OPEN",
        footer: "All rights reserved.",
        loading: "Loading..."
    }
};

// Dil ve UI Güncelleme
function updateUI() {
    const lang = localStorage.getItem("preferredLang") || "tr";
    const t = translations[lang];
    
    document.getElementById('search').placeholder = t.search;
    document.getElementById('title-web').innerText = t.web;
    document.getElementById('title-games').innerText = t.games;
    document.getElementById('footer-text').innerHTML = `${t.footer} &copy; 2026 <b>Cemal Evli</b>`;
    document.getElementById('currentLangDisplay').innerText = lang === 'tr' ? 'Türkçe' : 'English';
    document.getElementById('langIcon').src = lang === 'tr' ? 'https://flagcdn.com/w20/tr.png' : 'https://flagcdn.com/w20/us.png';

    // Menüdeki aktif dili işaretle
    document.querySelectorAll('.dropdown-item').forEach(item => {
        item.classList.toggle('active-lang', item.dataset.lang === lang);
    });

    renderData();
}

// Verileri Ekrana Basma (API çağırmadan sadece render)
function renderData() {
    const lang = localStorage.getItem("preferredLang") || "tr";
    
    // Web Projeleri
    const pContainer = document.getElementById("project-container");
    pContainer.innerHTML = cachedProjects.length ? "" : `<p>${translations[lang].loading}</p>`;
    cachedProjects.forEach(p => {
        const card = document.createElement("a");
        card.className = "project-card";
        card.href = `https://${USERNAME}.github.io/My_Netlify_SitesApps/${p.name}`;
        card.target = "_blank";
        card.innerHTML = `<div class="icon">🌐</div><div><b>${p.name.replace(/_/g, " ")}</b></div>`;
        pContainer.appendChild(card);
    });

    // Oyunlar
    const gContainer = document.getElementById("game-container");
    gContainer.innerHTML = cachedGames.length ? "" : `<p>${translations[lang].loading}</p>`;
    cachedGames.forEach(rel => {
        const card = document.createElement("div");
        card.className = "project-card";
        card.innerHTML = `<div class="icon">🎮</div><div><b>${rel.name || rel.tag_name}</b></div><span class="badge">${translations[lang].badge}</span>`;
        gContainer.appendChild(card);
    });
}

// Verileri Sadece Bir Kez Çek
async function fetchData() {
    const USERNAME = "cemal201138";
    try {
        const [pRes, gRes] = await Promise.all([
            fetch(`https://api.github.com/repos/${USERNAME}/My_Netlify_SitesApps/contents/`),
            fetch(`https://api.github.com/repos/${USERNAME}/games/releases`)
        ]);
        
        if (pRes.ok) cachedProjects = (await pRes.json()).filter(i => i.type === "dir");
        if (gRes.ok) cachedGames = await gRes.json();
        
        renderData();
    } catch (e) {
        console.error("API Error");
    }
}

// Event Listeners
document.getElementById('langDropdown').onclick = (e) => {
    e.stopPropagation();
    document.getElementById('langMenu').classList.toggle('active');
};

document.querySelectorAll('.dropdown-item').forEach(item => {
    item.onclick = (e) => {
        localStorage.setItem("preferredLang", e.target.dataset.lang);
        updateUI();
    };
});

window.onclick = () => document.getElementById('langMenu').classList.remove('active');

document.getElementById('themeToggle').onclick = () => {
    document.body.classList.toggle("light");
    localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
};

// Arama
document.getElementById('search').oninput = function() {
    const q = this.value.toLowerCase();
    document.querySelectorAll(".project-card").forEach(c => {
        c.style.display = c.innerText.toLowerCase().includes(q) ? "flex" : "none";
    });
};

// Başlat
if(localStorage.getItem("theme") === "light") document.body.classList.add("light");
updateUI();
fetchData(); // Sadece bir kez çalışır
</script>
</body>
</html>
