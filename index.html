<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemal Evli | My Website</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f1f5f9;
            --accent: #38bdf8;
            --game-accent: #f472b6;
            --hover: #1e293b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .light {
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.8);
            --border: rgba(0, 0, 0, 0.05);
            --text: #0f172a;
            --accent: #0284c7;
            --game-accent: #db2777;
            --hover: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.1) 0px, transparent 50%);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        h1 { margin: 0; font-size: 1.8rem; letter-spacing: -1px; }

        .section-header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0 15px;
        }

        .section-title {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent);
            margin: 0;
        }

        .section-title.games { color: var(--game-accent); }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        input {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 10px;
            outline: none;
            backdrop-filter: blur(5px);
            width: 220px;
            font-size: 0.95rem;
        }

        /* --- TEMA UYUMLU DİL VE ARAÇ BUTONLARI --- */
        button.tool-btn, select.tool-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            outline: none;
        }

        button.tool-btn:hover, select.tool-btn:hover {
            background: var(--hover);
            border-color: var(--accent);
        }

        /* Select özel ayarları */
        select.tool-btn {
            padding: 10px 12px;
            appearance: none;
            -webkit-appearance: none;
            text-align: center;
            cursor: pointer;
        }

        /* Dropdown menüsünün içindeki seçeneklerin teması */
        select.tool-btn option {
            background-color: var(--bg); /* Menü açıldığında arka plan rengi */
            color: var(--text);
            padding: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            width: 100%;
            max-width: 900px;
        }

        .project-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .project-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            background: var(--hover);
        }

        .project-card.game-card:hover { border-color: var(--game-accent); }

        .icon {
            font-size: 22px;
            background: rgba(56, 189, 248, 0.1);
            width: 44px;
            height: 44px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .game-card .icon { background: rgba(244, 114, 182, 0.1); }

        .badge {
            margin-left: auto;
            font-size: 0.65rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            background: var(--game-accent);
            color: white;
            flex-shrink: 0;
        }

        /* --- MODAL --- */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); 
            display: flex; align-items: center; justify-content: center; 
            z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease;
            padding: 16px;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .modal-content { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 20px; padding: 28px; width: 100%; max-width: 600px; 
            position: relative; box-shadow: var(--shadow);
        }

        .file-list {
            max-height: 55vh;
            overflow-y: auto;
            margin-top: 20px;
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }

        .file-item:last-child { border-bottom: none; }

        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .file-icon {
            font-size: 1.4rem;
            width: 32px;
            flex-shrink: 0;
            text-align: center;
        }

        .download-link {
            background: var(--game-accent);
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: bold;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .close-modal {
            position: absolute; top: 14px; right: 14px;
            background: none; border: none; color: var(--text);
            font-size: 1.5rem; cursor: pointer; line-height: 1;
        }

        .hidden { display: none; }

        footer {
            margin-top: auto;
            padding: 60px 0 20px;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.7;
        }
        footer b { color: var(--accent); }

        @media (max-width: 600px) {
            body { padding: 24px 14px; }
            header { flex-direction: column; align-items: flex-start; gap: 10px; }
            h1 { font-size: 1.4rem; }
            .controls { width: 100%; }
            input { flex: 1; width: auto; min-width: 0; font-size: 0.9rem; }
            button.tool-btn, select.tool-btn { padding: 10px 12px; font-size: 0.85rem; }
            .grid { grid-template-columns: 1fr; gap: 12px; }
            .section-header { margin: 20px 0 10px; }
            .modal-content { padding: 20px; }
            .file-list { max-height: 60vh; }
            .file-item { padding: 12px 10px; }
        }

        @media (max-width: 380px) {
            h1 { font-size: 1.2rem; }
            .project-card { padding: 14px; gap: 10px; }
            .icon { width: 38px; height: 38px; font-size: 18px; }
        }

        @media (min-width: 1200px) {
            .grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

<header>
    <h1 id="site-title">🚀 Cemal Evli</h1>
    <div class="controls">
        <input id="search" placeholder="🔍 Search Project or Game...">
        <button id="openNewsletter" class="tool-btn" title="Subscribe">📧</button>
        
        <select id="langSelect" class="tool-btn">
            <option value="en">English</option>
            <option value="tr">Türkçe</option>
        </select>

        <button id="themeToggle" class="tool-btn">🌙 / ☀️</button>
    </div>
</header>

<div class="section-header">
    <h2 class="section-title" id="title-web">📂 My Web Projects</h2>
</div>
<div id="project-container" class="grid"><p class="loading-msg">Loading...</p></div>

<div class="section-header">
    <h2 class="section-title games" id="title-games">🎮 Games</h2>
</div>
<div id="game-container" class="grid"><p class="loading-msg">Loading...</p></div>

<div id="newsletterModal" class="modal-overlay">
    <div class="modal-content">
        <button class="close-modal" onclick="toggleModal('newsletterModal', false)">&times;</button>
        <h2 id="modal-news-title">📬 Subscribe to GitHub Newsletter</h2>
        <form id="newsletter-form" style="display:flex; flex-direction:column; gap:10px; margin-top:15px;">
            <input type="email" id="email-input" placeholder="Enter your email..." required style="width:100%;">
            <button type="submit" id="subscribe-btn" class="tool-btn" style="background:var(--accent); color:#0f172a; border:none;">Subscribe</button>
        </form>
        <div id="status-msg"></div>
    </div>
</div>

<div id="gameFilesModal" class="modal-overlay">
    <div class="modal-content">
        <button class="close-modal" onclick="toggleModal('gameFilesModal', false)">&times;</button>
        <h2 id="modalGameName" style="margin:0; font-size:1.4rem;">🎮 Game Files</h2>
        <div id="fileContainer" class="file-list"></div>
    </div>
</div>

<footer>
    <p id="footer-text">All rights reserved. &copy; 2026 <a href="https://github.com/cemal201138" target="_blank" style="text-decoration:none; color:inherit;"><b>Cemal Evli</b></a></p>
</footer>

<script>
const USERNAME = "cemal201138";
const SITES_API = `https://api.github.com/repos/${USERNAME}/My_Netlify_SitesApps/contents/`;
const RELEASES_API = `https://api.github.com/repos/${USERNAME}/games/releases`;
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7A6ch3QXCuIfThH8NN7eXZqMQl69H77LbrWdDFdCXHpGpQ6x2nfuqQxbID6vdHFfj/exec"; 

const translations = {
    en: {
        search: "🔍 Search Project or Game...",
        web: "📂 My Web Projects",
        games: "🎮 Games",
        loading: "Loading...",
        error: "An error occurred.",
        noFiles: "No files found.",
        newsTitle: "📬 Subscribe to GitHub Newsletter",
        emailPlh: "Enter your email...",
        subBtn: "Subscribe",
        saving: "Saving...",
        success: "✅ Subscribed successfully!",
        errSub: "❌ Error occurred.",
        footer: "All rights reserved.",
        badge: "OPEN",
        download: "DOWNLOAD",
        gameFiles: "🎮 Game Files"
    },
    tr: {
        search: "🔍 Proje veya Oyun Ara...",
        web: "📂 Web Projelerim",
        games: "🎮 Oyunlar",
        loading: "Yükleniyor...",
        error: "Hata oluştu.",
        noFiles: "Dosya bulunamadı.",
        newsTitle: "📬 GitHub Bültenine Abone Ol",
        emailPlh: "E-posta adresini gir...",
        subBtn: "Abone Ol",
        saving: "Kaydediliyor...",
        success: "✅ Başarıyla abone oldun!",
        errSub: "❌ Hata oluştu.",
        footer: "Tüm hakları saklıdır.",
        badge: "AÇ",
        download: "İNDİR",
        gameFiles: "🎮 Oyun Dosyaları"
    }
};

function updateUI(lang) {
    const t = translations[lang];
    document.getElementById('search').placeholder = t.search;
    document.getElementById('title-web').innerText = t.web;
    document.getElementById('title-games').innerText = t.games;
    document.getElementById('modal-news-title').innerText = t.newsTitle;
    document.getElementById('email-input').placeholder = t.emailPlh;
    document.getElementById('subscribe-btn').innerText = t.subBtn;
    document.getElementById('footer-text').childNodes[0].textContent = t.footer + " \u00A9 2026 ";
    document.querySelectorAll('.loading-msg').forEach(el => el.innerText = t.loading);
}

const langSelect = document.getElementById('langSelect');
langSelect.addEventListener('change', (e) => {
    const newLang = e.target.value;
    localStorage.setItem("preferredLang", newLang);
    updateUI(newLang);
    loadProjects();
    loadGames();
});

const savedLang = localStorage.getItem("preferredLang") || "en";
langSelect.value = savedLang;
updateUI(savedLang);

function getFileIcon(filename) {
    const ext = filename.split('.').pop().toLowerCase();
    const icons = {
        'zip': '📦', 'rar': '📦', '7z': '📦',
        'exe': '⚙️', 'msi': '⚙️', 'apk': '🤖',
        'pdf': '📕', 'jpg': '🖼️', 'png': '🖼️', 'gif': '🖼️',
        'txt': '📄', 'md': '📝', 'mp4': '🎬', 'mp3': '🎵'
    };
    return icons[ext] || '📄';
}

function toggleModal(id, show) {
    const m = document.getElementById(id);
    if(show) { m.classList.add('active'); document.body.style.overflow = 'hidden'; }
    else { m.classList.remove('active'); document.body.style.overflow = 'auto'; }
}

if(localStorage.getItem("theme") === "light") document.body.classList.add("light");
document.getElementById('themeToggle').onclick = () => {
    document.body.classList.toggle("light");
    localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
};

document.getElementById('openNewsletter').onclick = () => toggleModal('newsletterModal', true);

document.getElementById('newsletter-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const lang = langSelect.value;
    const btn = document.getElementById('subscribe-btn');
    const msg = document.getElementById('status-msg');
    btn.disabled = true; btn.innerText = translations[lang].saving;
    try {
        await fetch(`${GOOGLE_SCRIPT_URL}?email=${encodeURIComponent(document.getElementById('email-input').value)}`, { mode: 'no-cors' });
        msg.innerHTML = `<span style='color:#4ade80'>${translations[lang].success}</span>`;
        setTimeout(() => { toggleModal('newsletterModal', false); btn.disabled = false; btn.innerText = translations[lang].subBtn; msg.innerHTML = ""; }, 1500);
    } catch (err) { msg.innerHTML = `<span style='color:#f87171'>${translations[lang].errSub}</span>`; btn.disabled = false; }
});

const norm = t => t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

async function loadProjects() {
    const lang = langSelect.value;
    const container = document.getElementById("project-container");
    try {
        const res = await fetch(SITES_API);
        const items = await res.json();
        container.innerHTML = "";
        items.filter(i => i.type === "dir").forEach(p => {
            const card = document.createElement("a");
            card.className = "project-card";
            card.href = p.path; card.target = "_blank";
            card.dataset.name = norm(p.name);
            card.innerHTML = `<div class="icon">🌐</div><div class="name"><b>${p.name.replace(/_/g, " ")}</b></div>`;
            container.appendChild(card);
        });
    } catch (e) { container.innerHTML = `<p>${translations[lang].error}</p>`; }
}

async function loadGames() {
    const lang = langSelect.value;
    const container = document.getElementById("game-container");
    try {
        const res = await fetch(RELEASES_API);
        const releases = await res.json();
        container.innerHTML = "";

        releases.forEach(rel => {
            const card = document.createElement("div");
            card.className = "project-card game-card";
            card.dataset.name = norm(rel.name || rel.tag_name);
            card.innerHTML = `
                <div class="icon">🎮</div>
                <div class="info-group">
                    <div class="name"><b>${rel.name || rel.tag_name}</b></div>
                    <div style="font-size:0.75rem; opacity:0.6;">${rel.tag_name}</div>
                </div>
                <span class="badge">${translations[lang].badge}</span>
            `;
            
            card.onclick = () => {
                const fileContainer = document.getElementById("fileContainer");
                document.getElementById("modalGameName").innerText = rel.name || rel.tag_name;
                fileContainer.innerHTML = "";

                if(rel.assets.length === 0) {
                    fileContainer.innerHTML = `<p style='padding:20px; opacity:0.6;'>${translations[lang].noFiles}</p>`;
                } else {
                    rel.assets.forEach(asset => {
                        const div = document.createElement("div");
                        div.className = "file-item";
                        const size = (asset.size / (1024 * 1024)).toFixed(2);
                        const icon = getFileIcon(asset.name);
                        div.innerHTML = `
                            <div class="file-info">
                                <div class="file-icon">${icon}</div>
                                <div style="min-width:0;">
                                    <div style="font-weight:bold; font-size:0.85rem; word-break:break-all;">${asset.name}</div>
                                    <div style="font-size:0.7rem; opacity:0.6;">${size} MB</div>
                                </div>
                            </div>
                            <a href="${asset.browser_download_url}" class="download-link">${translations[lang].download}</a>
                        `;
                        fileContainer.appendChild(div);
                    });
                }
                toggleModal('gameFilesModal', true);
            };
            container.appendChild(card);
        });
    } catch (e) { container.innerHTML = `<p>${translations[lang].error}</p>`; }
}

document.getElementById('search').addEventListener("input", function() {
    const q = norm(this.value);
    document.querySelectorAll(".project-card").forEach(card => card.classList.toggle("hidden", !card.dataset.name.includes(q)));
});

loadProjects();
loadGames();
</script>
</body>
</html>
