<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CemalEvli - Linklerim</title>
    <link id="favicon" rel="icon" type="image/png" href="https://wsrv.nl/?url=https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/imcemalevli/profile.png&w=64&h=64&mask=circle&output=png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        html {
            height: 100%;
        }

        html, body {
            overflow-x: hidden;
            max-width: 100%;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0b0b0f;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 24px 16px;
            color: #f4f4f5;
            position: relative;
        }

        body::before, body::after {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1 0%, #d946ef 100%);
            filter: blur(130px);
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }
        body::before { top: -50px; left: -50px; }
        body::after { bottom: -50px; right: -50px; }

        .lp-wrap {
            max-width: 420px;
            width: 100%;
            opacity: 0;
            transform: translateY(20px);
            animation: lp-fadein 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            z-index: 1;
        }

        .lp-card {
            background: linear-gradient(180deg, rgba(20, 20, 25, 0.7) 0%, rgba(13, 13, 16, 0.85) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            position: relative;
            padding: 40px 28px 28px 28px;
        }

        .qr-trigger {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #a1a1aa;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .qr-trigger:hover {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            transform: scale(1.05);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }

        .lp-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .lp-avatar-ring {
            width: 104px;
            height: 104px;
            border-radius: 50%;
            margin: 0 auto 20px;
            padding: 3px;
            background: linear-gradient(135deg, #4f46e5 0%, #c084fc 50%, #6366f1 100%);
            position: relative;
        }

        .lp-avatar-ring::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            background: inherit;
            filter: blur(10px);
            opacity: 0.4;
            z-index: -1;
        }

        .lp-avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #131316;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #131316;
        }

        .lp-avatar-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: block;
        }

        .lp-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .lp-bio {
            font-size: 0.88rem;
            color: #a1a1aa;
            line-height: 1.6;
            min-height: 48px;
            font-weight: 400;
            width: 100%;
            overflow: hidden;
        }

        .lp-bio span {
            display: block;
            white-space: nowrap;
            overflow: hidden;
        }

        .lp-bio-link {
            color: #a5b4fc;
            text-decoration: none !important;
            font-weight: 600;
            transition: all 0.2s;
            border-bottom: none !important;
            display: inline-block;
        }

        .lp-bio-link:hover {
            color: #c084fc;
        }

        .lp-links {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 28px;
        }

        .lp-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            text-decoration: none;
            color: #e4e4e7;
            font-size: 0.95rem;
            font-weight: 500;
            position: relative;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lp-link::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%) scaleY(0.4);
            width: 4px;
            height: 60%;
            border-radius: 0 4px 4px 0;
            background: currentColor;
            opacity: 0;
            transition: all 0.25s ease;
        }

        .lp-link:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(4px);
            border-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            box-shadow: -4px 10px 20px rgba(0, 0, 0, 0.15);
        }

        .lp-link:hover::before {
            opacity: 1;
            transform: translateY(-50%) scaleY(1);
        }

        .lp-link-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .lp-icon-box {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.04);
            color: #a1a1aa;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .lp-link:hover .lp-icon-box {
            transform: scale(1.08);
            color: var(--hover-color, #ffffff);
            background: var(--hover-bg, rgba(255, 255, 255, 0.08));
            border-color: var(--hover-border, rgba(255, 255, 255, 0.2));
            box-shadow: 0 0 12px var(--hover-shadow, rgba(255, 255, 255, 0.05));
        }

        .lp-arrow {
            color: #52525b;
            font-size: 12px;
            transition: all 0.2s;
        }

        .lp-link:hover .lp-arrow {
            transform: translateX(2px);
            color: #ffffff;
        }

        .lp-divider {
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0) 100%);
            margin-bottom: 24px;
        }

        .lp-footer {
            font-size: 0.82rem;
            color: #52525b;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .lp-refresh {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #71717a;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .lp-refresh:hover {
            border-color: rgba(255, 255, 255, 0.15);
            color: #e4e4e7;
            background: rgba(255, 255, 255, 0.05);
        }

        .rotating { animation: lp-spin 0.8s linear infinite; }
        @keyframes lp-spin { 100% { transform: rotate(360deg); } }

        @keyframes lp-fadein {
            to { opacity: 1; transform: translateY(0); }
        }

        .qr-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 8, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .qr-modal.active {
            display: flex;
            opacity: 1;
        }

        .qr-content {
            background: #131316;
            padding: 32px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            max-width: 320px;
            width: 90%;
            box-shadow: 0 40px 80px rgba(0,0,0,0.7);
            transform: scale(0.92);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .qr-modal.active .qr-content {
            transform: scale(1);
        }

        .qr-content img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
            background: #fff;
            padding: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .qr-close {
            color: #71717a;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s;
        }

        .qr-close:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="lp-wrap">
        <div class="lp-card">
            
            <div class="qr-trigger" onclick="toggleQR()" title="QR Kodu Göster">
                <i class="fas fa-qrcode"></i>
            </div>

            <div class="lp-header">
                <div class="lp-avatar-ring">
                    <div class="lp-avatar-inner" id="lpAvatarInner">
                        <i class="fas fa-user" style="font-size:1.8rem;color:#3f3f46"></i>
                    </div>
                </div>
                <div class="lp-name">Cemal Evli</div>
                <div class="lp-bio" id="lpBio">
                    <i class="fas fa-spinner fa-spin" style="font-size:11px; color:#6366f1"></i>
                </div>
            </div>

            <div class="lp-links" id="lpLinksContainer">
                <div style="text-align: center; padding: 20px; color: #71717a;">
                    <i class="fas fa-circle-notch fa-spin"></i> Bağlantılar yükleniyor...
                </div>
            </div>

            <div class="lp-divider"></div>

            <div class="lp-footer">
                <span>🤍 Cemal Evli</span>
                <button class="lp-refresh" onclick="refreshData()" id="refreshBtn">
                    <i class="fas fa-sync-alt" id="refreshIcon"></i> Yenile
                </button>
            </div>

        </div>
    </div>

    <div class="qr-modal" id="qrModal" onclick="toggleQR()">
        <div class="qr-content" onclick="event.stopPropagation()">
            <img src="https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/imcemalevli/qr_imcemalevli_qr.png" alt="QR Code">
            <p style="font-size: 0.95rem; margin-bottom: 16px; color: #fff; font-weight: 600;">Profilimi Paylaş</p>
            <div class="qr-close" onclick="toggleQR()">Kapat</div>
        </div>
    </div>

    <script>
        // En yaygın 20 popüler sosyal medya / platform renk haritası
        const BRAND_COLORS = {
            "instagram": { color: "#f472b6", bg: "rgba(236, 72, 153, 0.15)", border: "rgba(236, 72, 153, 0.35)", shadow: "rgba(236, 72, 153, 0.2)" },
            "facebook":  { color: "#1877f2", bg: "rgba(24, 119, 242, 0.15)", border: "rgba(24, 119, 242, 0.35)", shadow: "rgba(24, 119, 242, 0.2)" },
            "twitter":   { color: "#1da1f2", bg: "rgba(29, 161, 242, 0.15)", border: "rgba(29, 161, 242, 0.35)", shadow: "rgba(29, 161, 242, 0.2)" },
            "x-twitter": { color: "#ffffff", bg: "rgba(255, 255, 255, 0.08)", border: "rgba(255, 255, 255, 0.25)", shadow: "rgba(255, 255, 255, 0.05)" },
            "youtube":   { color: "#f87171", bg: "rgba(239, 68, 68, 0.15)", border: "rgba(239, 68, 68, 0.35)", shadow: "rgba(239, 68, 68, 0.2)" },
            "tiktok":    { color: "#25f4ee", bg: "rgba(37, 244, 238, 0.12)", border: "rgba(37, 244, 238, 0.35)", shadow: "rgba(37, 244, 238, 0.2)" },
            "github":    { color: "#c9d1d9", bg: "rgba(240, 246, 252, 0.12)", border: "rgba(240, 246, 252, 0.3)", shadow: "rgba(240, 246, 252, 0.1)" },
            "linkedin":  { color: "#0a66c2", bg: "rgba(10, 102, 194, 0.15)", border: "rgba(10, 102, 194, 0.35)", shadow: "rgba(10, 102, 194, 0.2)" },
            "whatsapp":  { color: "#25d366", bg: "rgba(37, 211, 102, 0.15)", border: "rgba(37, 211, 102, 0.35)", shadow: "rgba(37, 211, 102, 0.2)" },
            "telegram":  { color: "#229edd", bg: "rgba(34, 158, 221, 0.15)", border: "rgba(34, 158, 221, 0.35)", shadow: "rgba(34, 158, 221, 0.2)" },
            "spotify":   { color: "#1ed760", bg: "rgba(30, 215, 96, 0.15)", border: "rgba(30, 215, 96, 0.35)", shadow: "rgba(30, 215, 96, 0.2)" },
            "twitch":    { color: "#a970ff", bg: "rgba(169, 112, 255, 0.15)", border: "rgba(169, 112, 255, 0.35)", shadow: "rgba(169, 112, 255, 0.2)" },
            "discord":   { color: "#5865f2", bg: "rgba(88, 101, 242, 0.15)", border: "rgba(88, 101, 242, 0.35)", shadow: "rgba(88, 101, 242, 0.2)" },
            "pinterest": { color: "#e60023", bg: "rgba(230, 0, 35, 0.15)", border: "rgba(230, 0, 35, 0.35)", shadow: "rgba(230, 0, 35, 0.2)" },
            "reddit":    { color: "#ff4500", bg: "rgba(255, 69, 0, 0.15)", border: "rgba(255, 69, 0, 0.35)", shadow: "rgba(255, 69, 0, 0.2)" },
            "snapchat":  { color: "#fffc00", bg: "rgba(255, 252, 0, 0.1)", border: "rgba(255, 252, 0, 0.3)", shadow: "rgba(255, 252, 0, 0.15)" },
            "threads":   { color: "#ffffff", bg: "rgba(255, 255, 255, 0.08)", border: "rgba(255, 255, 255, 0.25)", shadow: "rgba(255, 255, 255, 0.05)" },
            "envelope":  { color: "#6366f1", bg: "rgba(99, 102, 241, 0.15)", border: "rgba(99, 102, 241, 0.35)", shadow: "rgba(99, 102, 241, 0.2)" }, // E-posta
            "globe":     { color: "#38bdf8", bg: "rgba(56, 189, 248, 0.15)", border: "rgba(56, 189, 248, 0.35)", shadow: "rgba(56, 189, 248, 0.2)" }, // Web sitesi
            "steam":     { color: "#171a21", bg: "rgba(23, 26, 33, 0.3)", border: "rgba(102, 192, 244, 0.35)", shadow: "rgba(102, 192, 244, 0.15)" }
        };

        // İkon sınıf adından platform anahtarını çıkaran yardımcı fonksiyon
        function getBrandKey(iconClass) {
            if (!iconClass) return null;
            const parts = iconClass.split(' ');
            for (const part of parts) {
                if (part.startsWith('fa-')) {
                    const key = part.replace('fa-', '');
                    if (BRAND_COLORS[key]) return key;
                }
            }
            return null;
        }

        function toggleQR() {
            const modal = document.getElementById('qrModal');
            if (modal.classList.contains('active')) {
                modal.classList.remove('active');
                setTimeout(() => modal.style.display = 'none', 300);
            } else {
                modal.style.display = 'flex';
                setTimeout(() => modal.classList.add('active'), 10);
            }
        }

        async function loadProfileImage() {
            const inner = document.getElementById('lpAvatarInner');
            const url = 'https://wsrv.nl/?url=https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/imcemalevli/profile.png&w=200&h=200&mask=circle&t=' + Date.now();
            return new Promise(res => {
                const img = new Image();
                img.src = url;
                img.onload = () => {
                    inner.innerHTML = '';
                    img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%;';
                    inner.appendChild(img);
                    res();
                };
                img.onerror = () => {
                    inner.innerHTML = '<i class="fas fa-user" style="font-size:1.8rem;color:#3f3f46"></i>';
                    res();
                };
            });
        }

        function parseLine(line) {
            line = line.replace(/@([a-zA-Z0-9_]+)\$+\((https?:\/\/[^)]+)\)\$+/g,
                '<a href="$2" target="_blank" class="lp-bio-link">@$1</a>');
            line = line.replace(/#([a-zA-Z0-9_]+)\$+\((https?:\/\/[^)]+)\)\$+/g,
                '<a href="$2" target="_blank" class="lp-bio-link">#$1</a>');
            return line;
        }

        function fitLine(span) {
            const parent = span.parentElement;
            if (!parent) return;
            const maxWidth = parent.clientWidth;
            let size = 14;
            span.style.fontSize = size + 'px';
            while (span.scrollWidth > maxWidth && size > 9) {
                size -= 0.5;
                span.style.fontSize = size + 'px';
            }
        }

        function renderBio(lines) {
            const bio = document.getElementById('lpBio');
            bio.innerHTML = lines
                .map(l => `<span style="display:block;white-space:nowrap;overflow:hidden;">${parseLine(l)}</span>`)
                .join('');
            bio.querySelectorAll('span').forEach(fitLine);
        }

        async function loadBiography() {
            const fallback = [
                'Small wins lead to a big victory: @bunyanfen$$(https://www.instagram.com/bunyanfen/)$$',
                '🖤 @besiktas$$(https://www.instagram.com/besiktas/)$$ 🤍'
            ];
            try {
                const r = await fetch('https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/imcemalevli/biography?t=' + Date.now());
                const d = await r.json();
                renderBio(d.bio && Array.isArray(d.bio) ? d.bio : fallback);
            } catch (e) {
                renderBio(fallback);
                console.error('Biyografi yükleme hatası:', e);
            }
        }

        async function loadSocialLinks() {
            const container = document.getElementById('lpLinksContainer');
            try {
                const response = await fetch('https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/social-links?t=' + Date.now());
                const links = await response.json();
                
                if (Array.isArray(links) && links.length > 0) {
                    container.innerHTML = links.map(link => {
                        const brandKey = getBrandKey(link.icon);
                        let inlineStyles = '';
                        let leftIconColorStyle = '';
                        
                        // Eğer ikon listemizde tanımlı bir sosyal medya ise CSS değişkenlerini (CSS Variables) karta ata
                        if (brandKey) {
                            const config = BRAND_COLORS[brandKey];
                            inlineStyles = `style="--hover-color: ${config.color}; --hover-bg: ${config.bg}; --hover-border: ${config.border}; --hover-shadow: ${config.shadow};"`;
                            leftIconColorStyle = `style="color: ${config.color};"`;
                        }

                        return `
                            <a href="${link.url}" class="lp-link" target="_blank" ${inlineStyles}>
                                <div class="lp-link-left">
                                    <div class="lp-icon-box" ${leftIconColorStyle}><i class="${link.icon}"></i></div>
                                    <span style="color: #e4e4e7;">${link.title}</span>
                                </div>
                                <i class="fas fa-arrow-right lp-arrow"></i>
                            </a>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = '<div style="text-align: center; padding: 20px; color: #ef4444;">Bağlantı bulunamadı.</div>';
                }
            } catch (error) {
                console.error('Sosyal medya linkleri yükleme hatası:', error);
                container.innerHTML = '<div style="text-align: center; padding: 20px; color: #ef4444;">Bağlantılar yüklenirken bir hata oluştu.</div>';
            }
        }

        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            const icon = document.getElementById('refreshIcon');
            const bio = document.getElementById('lpBio');
            const inner = document.getElementById('lpAvatarInner');
            const container = document.getElementById('lpLinksContainer');

            btn.disabled = true;
            icon.classList.add('rotating');
            bio.innerHTML = '<i class="fas fa-spinner fa-spin" style="font-size:11px; color:#6366f1"></i>';
            inner.innerHTML = '<i class="fas fa-circle-notch fa-spin" style="font-size:1.5rem;color:#71717a"></i>';
            container.innerHTML = '<div style="text-align: center; padding: 20px; color: #71717a;"><i class="fas fa-circle-notch fa-spin"></i> Yenileniyor...</div>';

            await Promise.all([loadProfileImage(), loadBiography(), loadSocialLinks()]);

            setTimeout(() => {
                icon.classList.remove('rotating');
                btn.disabled = false;
            }, 400);
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadProfileImage();
            loadBiography();
            loadSocialLinks();
        });

        window.addEventListener('resize', () => {
            document.querySelectorAll('#lpBio span').forEach(fitLine);
        });
    </script>
</body>
</html>
