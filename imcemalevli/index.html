<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CemalEvli - Linklerim</title>
    <link id="favicon" rel="icon" type="image/png" href="https://wsrv.nl/?url=https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/imcemalevli/profile.png&w=64&h=64&mask=circle&output=png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top, #121214 0%, #09090b 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
            color: #f4f4f5;
        }

        .lp-wrap {
            max-width: 400px;
            width: 100%;
            opacity: 0;
            transform: translateY(20px);
            animation: lp-fadein 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .lp-card {
            background: rgba(24, 24, 27, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            padding: 32px 24px;
        }

        .qr-trigger {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #a1a1aa;
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .qr-trigger:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .lp-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .lp-avatar-ring {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            margin: 0 auto 20px;
            padding: 3px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.2);
        }

        .lp-avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #18181b;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #18181b;
        }

        .lp-avatar-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: block;
        }

        .lp-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .lp-bio {
            font-size: 0.85rem;
            color: #a1a1aa;
            line-height: 1.6;
            min-height: 40px;
            font-weight: 400;
        }

        .lp-bio-link {
            color: #818cf8;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .lp-bio-link:hover {
            color: #a5b4fc;
            text-decoration: underline;
        }

        .lp-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .lp-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-decoration: none;
            color: #e4e4e7;
            font-size: 0.92rem;
            font-weight: 500;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lp-link:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .lp-link-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .lp-icon-box {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .lp-link:hover .lp-icon-box {
            transform: scale(1.05);
        }

        /* Modernize Edilmiş Sosyal Medya Renk Paleti */
        .ic-purple  { background: rgba(139, 92, 246, 0.15); color: #a78bfa; border: 1px solid rgba(139, 92, 246, 0.2); }
        .ic-pink    { background: rgba(236, 72, 153, 0.15); color: #f472b6; border: 1px solid rgba(236, 72, 153, 0.2); }
        .ic-teal    { background: rgba(20, 184, 166, 0.15); color: #2dd4bf; border: 1px solid rgba(20, 184, 166, 0.2); }
        .ic-black   { background: rgba(255, 255, 255, 0.08); color: #f4f4f5; border: 1px solid rgba(255, 255, 255, 0.1); }
        .ic-spotify { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
        .ic-youtube { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }

        .lp-arrow {
            color: #71717a;
            font-size: 11px;
            transition: transform 0.2s;
        }

        .lp-link:hover .lp-arrow {
            transform: translateX(4px);
            color: #e4e4e7;
        }

        .lp-divider {
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0) 100%);
            margin-bottom: 20px;
        }

        .lp-footer {
            font-size: 0.8rem;
            color: #71717a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .lp-refresh {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #a1a1aa;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .lp-refresh:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
        }

        .rotating { animation: lp-spin 0.8s linear infinite; }
        @keyframes lp-spin { 100% { transform: rotate(360deg); } }

        @keyframes lp-fadein {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Modern Modal Tasarımı */
        .qr-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(9, 9, 11, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .qr-modal.active {
            display: flex;
            opacity: 1;
        }

        .qr-content {
            background: #18181b;
            padding: 28px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 300px;
            width: 90%;
            box-shadow: 0 32px 64px rgba(0,0,0,0.6);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .qr-modal.active .qr-content {
            transform: scale(1);
        }

        .qr-content img {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            background: #fff;
            padding: 8px;
        }

        .qr-close {
            color: #a1a1aa;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s;
        }

        .qr-close:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="lp-wrap">
        <div class="lp-card">
            
            <div class="qr-trigger" onclick="toggleQR()" title="QR Kodu Göster">
                <i class="fas fa-qrcode"></i>
            </div>

            <div class="lp-header">
                <div class="lp-avatar-ring">
                    <div class="lp-avatar-inner" id="lpAvatarInner">
                        <i class="fas fa-user" style="font-size:1.8rem;color:#52525b"></i>
                    </div>
                </div>
                <div class="lp-name">Cemal Evli</div>
                <div class="lp-bio" id="lpBio">
                    <i class="fas fa-spinner fa-spin" style="font-size:11px"></i>
                </div>
            </div>

            <div class="lp-links">

                <a href="https://www.instagram.com/imcemalevli/" class="lp-link" target="_blank">
                    <div class="lp-link-left">
                        <div class="lp-icon-box ic-pink"><i class="fab fa-instagram"></i></div>
                        <span>Instagram</span>
                    </div>
                    <i class="fas fa-arrow-right lp-arrow"></i>
                </a>

                <a href="https://www.facebook.com/profile.php?id=100076601840154" class="lp-link" target="_blank">
                    <div class="lp-link-left">
                        <div class="lp-icon-box ic-purple"><i class="fab fa-facebook"></i></div>
                        <span>Facebook</span>
                    </div>
                    <i class="fas fa-arrow-right lp-arrow"></i>
                </a>

                <a href="https://www.tiktok.com/@imcemalevli" class="lp-link" target="_blank">
                    <div class="lp-link-left">
                        <div class="lp-icon-box ic-black"><i class="fab fa-tiktok"></i></div>
                        <span>TikTok</span>
                    </div>
                    <i class="fas fa-arrow-right lp-arrow"></i>
                </a>

                <a href="https://www.youtube.com/@imcemalevli" class="lp-link" target="_blank">
                    <div class="lp-link-left">
                        <div class="lp-icon-box ic-youtube"><i class="fab fa-youtube"></i></div>
                        <span>YouTube</span>
                    </div>
                    <i class="fas fa-arrow-right lp-arrow"></i>
                </a>

                <a href="https://open.spotify.com/user/31r7za26zhchmq64y5vcssbvewtq?si=d7ca95da85b441c8" class="lp-link" target="_blank">
                    <div class="lp-link-left">
                        <div class="lp-icon-box ic-spotify"><i class="fab fa-spotify"></i></div>
                        <span>Spotify</span>
                    </div>
                    <i class="fas fa-arrow-right lp-arrow"></i>
                </a>

                <a href="https://github.com/cemal201138" class="lp-link" target="_blank">
                    <div class="lp-link-left">
                        <div class="lp-icon-box ic-teal"><i class="fab fa-github"></i></div>
                        <span>GitHub</span>
                    </div>
                    <i class="fas fa-arrow-right lp-arrow"></i>
                </a>

            </div>

            <div class="lp-divider"></div>

            <div class="lp-footer">
                <span>🤍 Cemal Evli</span>
                <button class="lp-refresh" onclick="refreshData()" id="refreshBtn">
                    <i class="fas fa-sync-alt" id="refreshIcon"></i> Verileri Yenile
                </button>
            </div>

        </div>
    </div>

    <div class="qr-modal" id="qrModal" onclick="toggleQR()">
        <div class="qr-content" onclick="event.stopPropagation()">
            <img src="https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/imcemalevli/imcemalevli_qr.png" alt="QR Code">
            <p style="font-size: 0.95rem; margin-bottom: 16px; color: #fff; font-weight: 600;">Profilimi Paylaş</p>
            <div class="qr-close" onclick="toggleQR()">Kapat</div>
        </div>
    </div>

    <script>
        function toggleQR() {
            const modal = document.getElementById('qrModal');
            if (modal.classList.contains('active')) {
                modal.classList.remove('active');
                setTimeout(() => modal.style.display = 'none', 300);
            } else {
                modal.style.display = 'flex';
                setTimeout(() => modal.classList.add('active'), 10);
            }
        }

        async function loadProfileImage() {
            const inner = document.getElementById('lpAvatarInner');
            const url = 'https://wsrv.nl/?url=https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/imcemalevli/profile.png&w=200&h=200&mask=circle&t=' + Date.now();
            return new Promise(res => {
                const img = new Image();
                img.src = url;
                img.onload = () => {
                    inner.innerHTML = '';
                    img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%;';
                    inner.appendChild(img);
                    res();
                };
                img.onerror = () => {
                    inner.innerHTML = '<i class="fas fa-user" style="font-size:1.8rem;color:#52525b"></i>';
                    res();
                };
            });
        }

        function parseLine(line) {
            line = line.replace(/@([a-zA-Z0-9_]+)\$+\((https?:\/\/[^)]+)\)\$+/g,
                '<a href="$2" target="_blank" class="lp-bio-link">@$1</a>');
            line = line.replace(/#([a-zA-Z0-9_]+)\$+\((https?:\/\/[^)]+)\)\$+/g,
                '<a href="$2" target="_blank" class="lp-bio-link">#$1</a>');
            return line;
        }

        async function loadBiography() {
            const bio = document.getElementById('lpBio');
            const fallback = [
                '| Small wins lead to a big victory: @bunyanfen$$(https://www.instagram.com/bunyanfen/)$$ |',
                '| 🖤@besiktas$$(https://www.instagram.com/besiktas/)$$ 🤍 | :)"'
            ];
            try {
                const r = await fetch('https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/imcemalevli/biography?t=' + Date.now());
                const d = await r.json();
                if (d.bio && Array.isArray(d.bio)) {
                    bio.innerHTML = d.bio.map(l => `<span style="display:block;white-space:nowrap">${parseLine(l)}</span>`).join('');
                }
            } catch (e) {
                bio.innerHTML = fallback.map(l => `<span style="display:block;white-space:nowrap">${parseLine(l)}</span>`).join('');
                console.error('Biyografi yükleme hatası:', e);
            }
        }

        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            const icon = document.getElementById('refreshIcon');
            const bio = document.getElementById('lpBio');
            const inner = document.getElementById('lpAvatarInner');

            btn.disabled = true;
            icon.classList.add('rotating');
            bio.innerHTML = '<i class="fas fa-spinner fa-spin" style="font-size:11px"></i>';
            inner.innerHTML = '<i class="fas fa-circle-notch fa-spin" style="font-size:1.5rem;color:#a1a1aa"></i>';

            await Promise.all([loadProfileImage(), loadBiography()]);

            setTimeout(() => {
                icon.classList.remove('rotating');
                btn.disabled = false;
            }, 400);
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadProfileImage();
            loadBiography();
        });
    </script>
</body>
</html>
