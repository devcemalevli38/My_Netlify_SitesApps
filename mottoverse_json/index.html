<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Söz Oluşturucu</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/mottoverse_json/mottoverse.ico">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --success-color: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .panel-left, .panel-right {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        h2 {
            font-size: 1.5rem;
            color: var(--accent-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .count-badge {
            font-size: 0.9rem;
            background: var(--border-color);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            color: var(--text-color);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        input[type="text"], textarea {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.8rem;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: var(--accent-color);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }

        .btn-secondary:hover {
            background-color: var(--border-color);
        }

        .btn-danger {
            background-color: #ef4444;
            color: white;
        }
        .btn-danger:hover {
            background-color: #dc2626;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .json-output-container {
            position: relative;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        pre {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1rem;
            overflow: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            flex-grow: 1;
            max-height: 450px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .toast {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background-color: var(--success-color);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .quote-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0.5rem;
            background: var(--bg-color);
        }

        .quote-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
        }

        .quote-item:last-child {
            border-bottom: none;
        }

        .quote-item span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80%;
        }

        .delete-icon {
            color: #ef4444;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="panel-left">
        <h2>Söz Ekle</h2>
        
        <div class="form-group">
            <label for="quoteDescription">Söz (İçerik)</label>
            <textarea id="quoteDescription" placeholder="Örn: Hayatta en hakiki mürşit ilimdir..."></textarea>
        </div>

        <div class="form-group">
            <label for="quoteAuthor">Yazar</label>
            <input type="text" id="quoteAuthor" placeholder="Örn: Mustafa Kemal Atatürk">
        </div>

        <button class="btn" id="addBtn">Listeye Ekle</button>

        <h2>Eklenen Sözler <span class="count-badge" id="quoteCount">0</span></h2>
        <div class="quote-list" id="quoteList">
            </div>
    </div>

    <div class="panel-right">
        <h2>
            test.json Çıktısı
            <div class="action-buttons">
                <button class="btn btn-secondary" id="copyBtn" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;">Kopyala</button>
                <button class="btn" id="downloadBtn" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;">İndir</button>
            </div>
        </h2>

        <div class="json-output-container">
            <div class="toast" id="toast">Kopyalandı!</div>
            <pre id="jsonOutput">[]</pre>
        </div>
        
        <button class="btn btn-danger" id="clearBtn">Tüm Listeyi Temizle</button>
    </div>
</div>

<script>
    // State Yönetimi
    let quotes = [];

    // DOM Elementleri
    const quoteDescription = document.getElementById('quoteDescription');
    const quoteAuthor = document.getElementById('quoteAuthor');
    const addBtn = document.getElementById('addBtn');
    const quoteList = document.getElementById('quoteList');
    const quoteCount = document.getElementById('quoteCount');
    const jsonOutput = document.getElementById('jsonOutput');
    const copyBtn = document.getElementById('copyBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const toast = document.getElementById('toast');

    // JSON Çıktısını ve Arayüzü Güncelleme Fonksiyonu
    function updateUI() {
        // Objeleri test.json formatına getir ve başlık numaralarını yeniden düzenle
        const formattedQuotes = quotes.map((item, index) => ({
            title: `Söz ${index + 1}`,
            description: item.description,
            author: item.author
        }));

        // JSON text alanını güncelle
        jsonOutput.textContent = JSON.stringify(formattedQuotes, null, 2);
        quoteCount.textContent = quotes.length;

        // Sol alttaki listeyi güncelle
        quoteList.innerHTML = '';
        formattedQuotes.forEach((quote, index) => {
            const item = document.createElement('div');
            item.className = 'quote-item';
            item.innerHTML = `
                <span><strong>${quote.title}:</strong> "${quote.description}" - <em>${quote.author}</em></span>
                <span class="delete-icon" onclick="deleteQuote(${index})">&times;</span>
            `;
            quoteList.appendChild(item);
        });
    }

    // Söz Ekleme Yapısı
    addBtn.addEventListener('click', () => {
        const desc = quoteDescription.value.trim();
        const auth = quoteAuthor.value.trim();

        if (!desc || !auth) {
            alert('Lütfen hem söz içeriğini hem de yazar adını doldurun.');
            return;
        }

        // Listeye ekle
        quotes.push({
            description: desc,
            author: auth
        });

        // Inputları temizle
        quoteDescription.value = '';
        quoteAuthor.value = '';
        quoteDescription.focus();

        updateUI();
    });

    // Tekli Söz Silme Fonksiyonu
    window.deleteQuote = function(index) {
        quotes.splice(index, 1);
        updateUI();
    };

    // Kopyalama Butonu Mekanizması
    copyBtn.addEventListener('click', () => {
        const textToCopy = jsonOutput.textContent;
        navigator.clipboard.writeText(textToCopy).then(() => {
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2000);
        }).catch(err => {
            alert('Kopyalama başarısız oldu: ', err);
        });
    });

    // İndirme Butonu Mekanizması (.json)
    downloadBtn.addEventListener('click', () => {
        if (quotes.length === 0) {
            alert('İndirmek için önce en az bir söz eklemelisiniz.');
            return;
        }
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(jsonOutput.textContent);
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", "mottoverse-json.json");
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    });

    // Tüm Listeyi Temizleme
    clearBtn.addEventListener('click', () => {
        if (quotes.length > 0 && confirm('Tüm listeyi silmek istediğinize emin misiniz?')) {
            quotes = [];
            updateUI();
        }
    });

    // Textarea üzerinde CTRL + Enter kombinasyonuyla da ekleme yapabilme
    quoteDescription.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'Enter') {
            addBtn.click();
        }
    });
</script>

</body>
</html>
