<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yönlendiriliyor...</title>
    <script>
        async function fetchUrlAndRedirect() {
            // Yeni belirtilen spotifyplaylist.json dosyasının ham (raw) URL'si
            const jsonUrl = "https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/spotifyplaylist/spotifyplaylist.json";
            
            try {
                const response = await fetch(jsonUrl);
                if (!response.ok) throw new Error("Ağ hatası");
                
                const data = await response.json();
                
                // JSON içinde "url" anahtarı varsa doğrudan ona yönlendirir
                if (data && data.url) {
                    window.location.href = data.url;
                } else {
                    // JSON yapısı farklıysa dosya içindeki ilk bulduğu değere yönlendirir
                    const firstValue = Object.values(data)[0];
                    if (firstValue) window.location.href = firstValue;
                }
            } catch (error) {
                console.error("Yönlendirme hatası:", error);
            }
        }

        // Sayfa yüklenir yüklenmez fonksiyonu çalıştır
        fetchUrlAndRedirect();
    </script>
</head>
<body>
</body>
</html>
