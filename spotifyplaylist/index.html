<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönlendiriliyorsunuz...</title>
    
    <script>
        // Başta URL tanımını yapıyoruz
        const hedefURL = "https://cemalevli.dpdns.org/spotifyplaylist";

        // Sayfa yüklendiği anda otomatik yönlendirmeyi başlatır
        window.location.href = hedefURL;
    </script>
</head>
<body>

    <p>
        Eğer otomatik olarak yönlendirilmezseniz, lütfen 
        <a id="yonlendirmeLinki" href="#">buraya tıklayın</a>.
    </p>

    <script>
        // Eğer otomatik yönlendirme tarayıcıda takılırsa, 
        // kullanıcının tıklayacağı linke de yukarıdaki URL'yi atıyoruz
        document.getElementById("yonlendirmeLinki").href = hedefURL;
    </script>

</body>
</html>
