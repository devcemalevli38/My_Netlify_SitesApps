<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Medya Kontrol Pro</title>
<style>
:root {
    --bg: #0b0f14;
    --panel: #121a25;
    --accent: #1db954;
    --accent-hover: #1ed760;
    --text: #f1f1f1;
    --muted: #9aa4b2;
}
* { box-sizing: border-box; }
body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top, #1b2735, #0b0f14);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: system-ui, sans-serif;
    color: var(--text);
}
.card {
    background: linear-gradient(180deg, #141e2b, #0f1621);
    border-radius: 26px;
    box-shadow: 0 30px 80px rgba(0,0,0,.7);
    padding: 30px;
    width: 360px;
}
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 26px;
}
.player, .volume-controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
}
button {
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: #1a2635;
    color: var(--text);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: all .15s ease;
    display: flex; align-items: center; justify-content: center;
}
.player button { width: 60px; height: 60px; font-size: 22px; }
.play { width: 80px !important; height: 80px !important; background: var(--accent) !important; color: #000 !important; font-size: 30px !important;}
.volume-controls button { width: 50px; height: 50px; font-size: 18px; background: #243449; }
button:active { transform: scale(.9); }

.volume-section-title {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.settings { display: none; padding-top: 15px; border-top: 1px solid #333; }
.settings input { width: 100%; padding: 10px; border-radius: 8px; border: none; margin-bottom: 10px; background: #000; color: #fff; }
.settings button { width: 100%; border-radius: 8px; padding: 10px; background: var(--accent); color: #000; border-radius: 8px; height: auto; }
</style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>🎵 Medya Kontrol</h2>
        <button style="background:none; box-shadow:none; font-size: 20px;" onclick="toggleSettings()">⚙️</button>
    </div>

    <div class="player">
        <button onclick="sendCommand('media', 'prev')">⏮</button>
        <button class="play" onclick="sendCommand('media', 'play')">⏯</button>
        <button onclick="sendCommand('media', 'next')">⏭</button>
    </div>

    <div class="volume-section-title">Ses Kontrolü</div>
    
    <div class="volume-controls">
        <button onclick="sendCommand('volume', 'down')">🔉</button>
        <button onclick="sendCommand('volume', 'mute')" title="Uygulamayı Sustur">🔇</button>
        <button onclick="sendCommand('volume', 'up')">🔊</button>
    </div>
    
    <div class="volume-controls">
        <button style="width: 160px; border-radius: 20px;" onclick="sendCommand('media', 'mute')">Sistem Sessiz</button>
    </div>

    <div class="settings" id="settings">
        <input id="serverInput" placeholder="Sunucu URL (örn: https://xyz.tailscale.net)">
        <button onclick="saveServer()">Kaydet</button>
    </div>
</div>

<script>
let serverUrl = localStorage.getItem("serverUrl") || "";
document.getElementById("serverInput").value = serverUrl;

function toggleSettings() {
    const s = document.getElementById("settings");
    s.style.display = s.style.display === "block" ? "none" : "block";
}

function saveServer() {
    serverUrl = document.getElementById("serverInput").value.trim();
    localStorage.setItem("serverUrl", serverUrl);
    alert("Ayarlar Kaydedildi!");
}

function sendCommand(title, body) {
    if (!serverUrl) return alert("Lütfen ayarlardan sunucu adresini girin!");
    // URL sonuna /komut ekleyip eklemediğini kontrol et
    let baseUrl = serverUrl.endsWith('/') ? serverUrl.slice(0, -1) : serverUrl;
    fetch(`${baseUrl}/komut?title=${title}&body=${body}`).catch(e => console.error("Hata:", e));
}
</script>
</body>
</html>
