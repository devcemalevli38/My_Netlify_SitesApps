<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oyun Paneli - My Netlify SitesApps</title>
    <link rel="icon" type="image/x-icon" href="webgames.ico">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a1a; display: flex; flex-direction: column; font-family: 'Segoe UI', sans-serif; }
        .game-menu { height: 60px; background: #121212; display: flex; justify-content: center; align-items: center; gap: 10px; border-bottom: 2px solid #333; z-index: 10; padding: 0 10px; overflow-x: auto; }
        .menu-btn { padding: 8px 15px; background: #252525; color: white; border: 1px solid #444; border-radius: 5px; cursor: pointer; transition: all 0.3s; font-weight: bold; white-space: nowrap; text-transform: capitalize; }
        .menu-btn:hover { background: #383838; border-color: #0078d4; }
        .menu-btn.active { background: #0078d4; border-color: #00a4ef; box-shadow: 0 0 10px rgba(0, 120, 212, 0.4); }
        .game-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; width: 100vw; }
        .iframe-container { width: 98%; height: 95%; border-radius: 10px; overflow: hidden; background: #000; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        iframe { width: 100%; height: 100%; border: none; }
        .game-info { height: 30px; color: #888; text-align: center; font-size: 12px; background: #121212; display: flex; align-items: center; justify-content: center; border-top: 1px solid #222; }
    </style>
</head>
<body>

<div class="game-menu" id="dynamic-menu">
    <span style="color: #666;">Oyunlar yükleniyor...</span>
</div>

<div class="game-wrapper">
    <div class="iframe-container">
        <iframe id="game-viewport" src="" allowfullscreen="true"></iframe>
    </div>
</div>

<div class="game-info">
    <p id="current-game-text">Lütfen bir oyun seçin</p>
</div>

<script>
    // --- GÜNCEL AYARLAR ---
    const username = "cemal201138"; 
    const repo = "My_Netlify_SitesApps"; 
    const folderPath = "webgames/htmlgamefolder"; 

    const menuContainer = document.getElementById('dynamic-menu');
    const iframe = document.getElementById('game-viewport');

    async function fetchGames() {
        try {
            // GitHub API'den klasör listesini al
            const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folderPath}`);
            const files = await response.json();

            if (!Array.isArray(files)) {
                throw new Error("Klasör boş veya bulunamadı.");
            }

            menuContainer.innerHTML = ""; 

            // Sadece .html dosyalarını filtrele
            const htmlFiles = files.filter(file => file.name.endsWith('.html'));

            htmlFiles.forEach((file, index) => {
                const fileName = file.name.replace('.html', '');
                const btn = document.createElement('button');
                btn.className = 'menu-btn';
                // İsimdeki tire ve alt tireleri boşlukla değiştirerek göster
                btn.innerText = fileName.replace(/[-_]/g, ' '); 
                
                btn.onclick = () => {
                    // webgames/ içindeki ana dosyadan htmlgamefolder/ içine bakıyoruz
                    loadGame("htmlgamefolder/" + file.name, btn);
                };

                menuContainer.appendChild(btn);

                // Sayfa açıldığında ilk oyunu yükle
                if (index === 0) loadGame("htmlgamefolder/" + file.name, btn);
            });
        } catch (error) {
            menuContainer.innerHTML = "<span style='color:red;'>Hata: Liste alınamadı!</span>";
            console.error("Hata ayrıntısı:", error);
        }
    }

    function loadGame(path, btn) {
        iframe.src = path; 
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('current-game-text').innerText = "Şu an oynanan: " + btn.innerText;
    }

    fetchGames();
</script>

</body>
</html>
