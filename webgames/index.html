<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Oyun Dünyası</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a1a; display: flex; flex-direction: column; font-family: 'Segoe UI', sans-serif; }
        .game-menu { height: 60px; background: #121212; display: flex; justify-content: center; align-items: center; gap: 10px; border-bottom: 2px solid #333; z-index: 10; padding: 0 15px; overflow-x: auto; }
        .menu-btn { padding: 8px 15px; background: #252525; color: white; border: 1px solid #444; border-radius: 5px; cursor: pointer; transition: all 0.3s; font-weight: bold; white-space: nowrap; text-transform: capitalize; }
        .menu-btn:hover { background: #383838; border-color: #0078d4; }
        .menu-btn.active { background: #0078d4; border-color: #00a4ef; box-shadow: 0 0 10px rgba(0, 120, 212, 0.4); }
        
        .fullscreen-btn { background: #28a745; border-color: #1e7e34; margin-left: auto; }
        .fullscreen-btn:hover { background: #218838; border-color: #ffffff; }

        .game-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; width: 100vw; background: #1a1a1a; }
        .iframe-container { width: 98%; height: 95%; border-radius: 10px; overflow: hidden; background: #000; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        /* Ruffle elementlerinin container içine düzgün yayılması için */
        #ruffle-player, ruffle-player { width: 100% !important; height: 100% !important; display: block !important; }
        
        .game-info { height: 30px; color: #888; text-align: center; font-size: 12px; background: #121212; display: flex; align-items: center; justify-content: center; border-top: 1px solid #222; }
        
        :fullscreen .iframe-container { width: 100%; height: 100%; border-radius: 0; }
        :-webkit-full-screen .iframe-container { width: 100%; height: 100%; border-radius: 0; }
    </style>
</head>
<body>

<div class="game-menu" id="dynamic-menu">
    <span style="color: #666;">Flash oyunlar yükleniyor...</span>
</div>

<div class="game-wrapper" id="main-display">
    <div class="iframe-container">
        <div id="ruffle-player"></div>
    </div>
</div>

<div class="game-info">
    <p id="current-game-text">Bu sitede emülatör olarak <a href="https://ruffle.rs/" target="_blank" style="color: #0078d4; text-decoration: none; font-weight: bold;">Ruffle</a> kullanılmaktadır.</p>
</div>

<script src="ruffle/ruffle.js"></script>

<script>
    // GitHub Yapılandırması
    const username = "cemal201138"; 
    const repo = "My_Netlify_SitesApps"; 
    const folderPath = "webgames/oyunlar"; // GitHub'daki .swf oyunlarının olduğu klasör yolu

    const menuContainer = document.getElementById('dynamic-menu');
    const displayArea = document.getElementById('main-display');
    
    let player = null;

    // Ruffle İlk Kurulum ve Ayarlar
    window.RufflePlayer = window.RufflePlayer || {};
    window.RufflePlayer.config = {
        publicPath: "ruffle/"
    };

    window.addEventListener("load", (event) => {
        const ruffle = window.RufflePlayer.newest();
        player = ruffle.createPlayer();
        const container = document.getElementById("ruffle-player");
        container.appendChild(player);
        
        player.config = {
            letterbox: "on",
            scale: "exactFit",
            forceScale: true,
            quality: "high"
        };

        // Ruffle hazır olduktan sonra GitHub'dan oyunları çekiyoruz
        fetchGames();
    });

    async function fetchGames() {
        try {
            const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folderPath}`);
            const files = await response.json();

            if (!Array.isArray(files)) {
                throw new Error("Klasör boş veya bulunamadı.");
            }

            menuContainer.innerHTML = ""; 

            // Sadece .swf uzantılı dosyaları filtrele
            const swfFiles = files.filter(file => file.name.endsWith('.swf'));

            swfFiles.forEach((file, index) => {
                const fileName = file.name.replace('.swf', '');
                const btn = document.createElement('button');
                btn.className = 'menu-btn';
                btn.innerText = fileName.replace(/[-_]/g, ' '); 
                
                btn.onclick = () => {
                    // Yerel "oyunlar/" klasöründen swf adını çağırır
                    loadGame("oyunlar/" + file.name, btn);
                };

                menuContainer.appendChild(btn);
                // İlk oyunu otomatik başlat
                if (index === 0) loadGame("oyunlar/" + file.name, btn);
            });

            addFullscreenButton();

        } catch (error) {
            menuContainer.innerHTML = "<span style='color:red;'>Hata: Liste alınamadı!</span>";
            console.error("Hata ayrıntısı:", error);
        }
    }

    function loadGame(path, btn) {
        if (player) {
            player.load(path); // Ruffle'a yeni oyun yolunu gönderiyoruz
        }
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function addFullscreenButton() {
        const fsBtn = document.createElement('button');
        fsBtn.className = 'menu-btn fullscreen-btn';
        fsBtn.innerHTML = '⛶ Tam Ekran';
        fsBtn.onclick = () => {
            if (!document.fullscreenElement) {
                displayArea.requestFullscreen().catch(err => {
                    alert(`Tam ekran hatası: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        };
        menuContainer.appendChild(fsBtn);
    }
</script>

</body>
</html>
