<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube No Ads</title>
    <link rel="icon" type="image/x-icon" href="youtubenoads.ico">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f0f0f;
            color: #f1f1f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 95%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }

        /* Oynatıcı Bölümü */
        .player-section {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-screen {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }

        .video-screen iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            background: #282828;
            padding: 12px;
            border-radius: 10px;
        }

        /* Giriş Bölümü */
        .input-section {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 85vh;
            overflow-y: auto;
        }

        h3 { margin: 0 0 10px 0; font-size: 16px; color: #aaa; text-transform: uppercase; }

        /* Toplu Metin Alanı */
        textarea {
            width: 100%;
            height: 80px;
            background: #000;
            color: #2ecc71;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            font-family: monospace;
            resize: none;
            box-sizing: border-box;
        }

        /* Tekli Kutucuklar */
        #inputContainer {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-row {
            display: flex;
            gap: 5px;
        }

        input {
            flex: 1;
            padding: 10px;
            background: #000;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
        }

        /* Butonlar */
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-add { background: #333; color: white; border: 1px dashed #555; }
        .btn-play { background: #e62117; color: white; padding: 15px; font-size: 16px; }
        .btn-remove { background: #444; color: #ff4d4d; }
        .btn-nav { background: #3d3d3d; color: white; min-width: 80px; }

        button:hover { opacity: 0.8; transform: translateY(-1px); }
        #status { font-weight: bold; color: #ff0000; }
    </style>
</head>
<body>

    <h2>YouTube No Ads</h2>

    <div class="container">
        <div class="player-section">
            <div class="video-screen">
                <iframe id="mainPlayer" src="" allowfullscreen></iframe>
            </div>
            <div class="controls">
                <button class="btn-nav" onclick="oncekiVideo()">Geri</button>
                <div id="status">Video Bekleniyor...</div>
                <button class="btn-nav" onclick="sonrakiVideo()">İleri</button>
            </div>
        </div>

        <div class="input-section">
            
            <div>
                <h3>1. Toplu Metin Girişi</h3>
                <p style="font-size: 12px; color: #777;">Örn: "url1", "url2"</p>
                <textarea id="bulkInput" placeholder='"https://youtube.com/watch?v=abc", "https://youtu.be/xyz"'></textarea>
            </div>

            <hr style="border: 0; border-top: 1px solid #333; width: 100%;">

            <div>
                <h3>2. Tekli Kutucuklar</h3>
                <div id="inputContainer">
                    <div class="input-row">
                        <input type="text" class="video-url" placeholder="YouTube Linki Yapıştır">
                        <button class="btn-remove" onclick="this.parentElement.remove()">X</button>
                    </div>
                </div>
                <button class="btn-add" onclick="yeniKutuEkle()" style="margin-top: 10px; width: 100%;">+ Başka Kutu Ekle</button>
            </div>

            <button class="btn-play" onclick="listeyiOlustur()">LİSTEYİ BAŞLAT</button>
        </div>
    </div>

    <script>
        let globalPlaylist = [];
        let currentIndex = 0;

        function yeniKutuEkle() {
            const container = document.getElementById('inputContainer');
            const div = document.createElement('div');
            div.className = 'input-row';
            div.innerHTML = `
                <input type="text" class="video-url" placeholder="YouTube Linki Yapıştır">
                <button class="btn-remove" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(div);
        }

        // URL'yi uygun formata dönüştüren yardımcı fonksiyon
        function formatYouTubeUrl(url) {
            url = url.trim();
            if (url.includes("youtube.com")) {
                return url.replace("youtube.com", "yout-ube.com");
            } else if (url.includes("youtu.be/")) {
                // youtu.be/VIDEO_ID kısmındaki ID'yi al
                const parts = url.split("youtu.be/");
                if (parts.length > 1) {
                    const videoId = parts[1].split(/[?#]/)[0]; // Parametreleri temizle
                    return `https://www.yout-ube.com/watch?v=${videoId}`;
                }
            }
            return null;
        }

        function listeyiOlustur() {
            globalPlaylist = [];
            
            // 1. Toplu Metin Alanını İşle
            const bulkText = document.getElementById('bulkInput').value;
            // Regex hem youtube.com hem de youtu.be linklerini yakalayacak şekilde güncellendi
            const bulkMatches = bulkText.match(/"([^"]+)"|'([^']+)'|https?:\/\/(?:www\.)?(?:youtube\.com|youtu\.be)\/[^\s,"]+/g);
            
            if (bulkMatches) {
                bulkMatches.forEach(match => {
                    const cleanUrl = match.replace(/['"]/g, "");
                    const formatted = formatYouTubeUrl(cleanUrl);
                    if (formatted) globalPlaylist.push(formatted);
                });
            }

            // 2. Tekli Kutucukları İşle
            const singleInputs = document.querySelectorAll('.video-url');
            singleInputs.forEach(input => {
                const formatted = formatYouTubeUrl(input.value);
                if (formatted) globalPlaylist.push(formatted);
            });

            // Listeyi Başlat
            if (globalPlaylist.length > 0) {
                currentIndex = 0;
                oynat(currentIndex);
            } else {
                alert("Geçerli bir YouTube veya youtu.be linki bulunamadı!");
            }
        }

        function oynat(index) {
            const player = document.getElementById('mainPlayer');
            const status = document.getElementById('status');
            
            if (index >= 0 && index < globalPlaylist.length) {
                player.src = globalPlaylist[index];
                status.innerText = `Oynatılıyor: ${index + 1} / ${globalPlaylist.length}`;
            }
        }

        function sonrakiVideo() {
            if (currentIndex < globalPlaylist.length - 1) {
                currentIndex++;
                oynat(currentIndex);
            }
        }

        function oncekiVideo() {
            if (currentIndex > 0) {
                currentIndex--;
                oynat(currentIndex);
            }
        }
    </script>
</body>
</html>
