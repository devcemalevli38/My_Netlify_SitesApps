<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube No Ads</title>
    <link rel="icon" type="image/x-icon" href="youtubenoads.ico">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f0f0f;
            color: #f1f1f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 95%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }

        .player-section {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-screen {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }

        .video-screen iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            background: #282828;
            padding: 12px;
            border-radius: 10px;
        }

        .input-section {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 85vh;
            overflow-y: auto;
        }

        h3 { margin: 0 0 10px 0; font-size: 16px; color: #aaa; text-transform: uppercase; }

        textarea {
            width: 100%;
            height: 80px;
            background: #000;
            color: #2ecc71;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            font-family: monospace;
            resize: none;
            box-sizing: border-box;
        }

        #inputContainer {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-row {
            display: flex;
            gap: 5px;
        }

        input {
            flex: 1;
            padding: 10px;
            background: #000;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-add { background: #333; color: white; border: 1px dashed #555; }
        .btn-play { background: #e62117; color: white; padding: 15px; font-size: 16px; }
        .btn-remove { background: #444; color: #ff4d4d; }
        .btn-nav { background: #3d3d3d; color: white; min-width: 80px; }

        button:hover { opacity: 0.8; transform: translateY(-1px); }
        #status { font-weight: bold; color: #ff0000; }
    </style>
</head>
<body>

    <h2>YouTube No Ads</h2>

    <div class="container">
        <div class="player-section">
            <div class="video-screen">
                <iframe id="mainPlayer" src="" allowfullscreen></iframe>
            </div>
            <div class="controls">
                <button class="btn-nav" onclick="oncekiVideo()">Geri</button>
                <div id="status">Video Bekleniyor...</div>
                <button class="btn-nav" onclick="sonrakiVideo()">İleri</button>
            </div>
        </div>

        <div class="input-section">
            <div>
                <h3>1. Toplu Giriş (Yıldız ile Ayırın)</h3>
                <p style="font-size: 12px; color: #777;">Örn: url1 * url2</p>
                <textarea id="bulkInput" placeholder='https://youtube.com/watch?v=abc * https://youtube.com/watch?v=xyz'></textarea>
            </div>

            <hr style="border: 0; border-top: 1px solid #333; width: 100%;">

            <div>
                <h3>2. Tekli Kutucuklar</h3>
                <div id="inputContainer">
                    <div class="input-row">
                        <input type="text" class="video-url" placeholder="YouTube Linki Yapıştır">
                        <button class="btn-remove" onclick="this.parentElement.remove()">X</button>
                    </div>
                </div>
                <button class="btn-add" onclick="yeniKutuEkle()" style="margin-top: 10px; width: 100%;">+ Başka Kutu Ekle</button>
            </div>

            <button class="btn-play" onclick="listeyiOlustur()">LİSTEYİ BAŞLAT</button>
        </div>
    </div>

    <script>
        let globalPlaylist = [];
        let currentIndex = 0;

        // Sayfa yüklendiğinde URL parametrelerini kontrol et
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const urlValue = urlParams.get('url');

            if (urlValue) {
                // Artık yıldız (*) işaretine göre bölüyoruz
                const urls = urlValue.split('*');
                urls.forEach(url => processAndAdd(url));

                if (globalPlaylist.length > 0) {
                    currentIndex = 0;
                    oynat(currentIndex);
                }
            }
        };

        // Link işleme ve dönüştürme fonksiyonu
        function processAndAdd(url) {
            let cleanUrl = url.trim();
            if (!cleanUrl) return;

            if (cleanUrl.includes("youtube.com")) {
                globalPlaylist.push(cleanUrl.replace("youtube.com", "yout-ube.com"));
            } else if (cleanUrl.includes("youtu.be")) {
                let videoId = cleanUrl.split('/').pop().split(/[?&]/)[0];
                globalPlaylist.push(`https://www.yout-ube.com/watch?v=${videoId}`);
            } else if (cleanUrl.includes("yout-ube.com")) {
                globalPlaylist.push(cleanUrl);
            }
        }

        function yeniKutuEkle() {
            const container = document.getElementById('inputContainer');
            const div = document.createElement('div');
            div.className = 'input-row';
            div.innerHTML = `
                <input type="text" class="video-url" placeholder="YouTube Linki Yapıştır">
                <button class="btn-remove" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(div);
        }

        function listeyiOlustur() {
            globalPlaylist = [];
            
            // 1. Toplu Giriş (Yıldız veya boşluk/satır bazlı ayırma)
            const bulkText = document.getElementById('bulkInput').value;
            // Hem yıldız hem de genel URL yapısını yakalayan regex
            const bulkUrls = bulkText.split('*');
            bulkUrls.forEach(url => processAndAdd(url));

            // 2. Tekli Kutucuklar
            const singleInputs = document.querySelectorAll('.video-url');
            singleInputs.forEach(input => {
                processAndAdd(input.value);
            });

            if (globalPlaylist.length > 0) {
                currentIndex = 0;
                oynat(currentIndex);
            } else {
                alert("Geçerli bir YouTube linki bulunamadı!");
            }
        }

        function oynat(index) {
            const player = document.getElementById('mainPlayer');
            const status = document.getElementById('status');
            
            if (index >= 0 && index < globalPlaylist.length) {
                player.src = globalPlaylist[index];
                status.innerText = `Oynatılıyor: ${index + 1} / ${globalPlaylist.length}`;
            }
        }

        function sonrakiVideo() {
            if (currentIndex < globalPlaylist.length - 1) {
                currentIndex++;
                oynat(currentIndex);
            }
        }

        function oncekiVideo() {
            if (currentIndex > 0) {
                currentIndex--;
                oynat(currentIndex);
            }
        }
    </script>
</body>
</html>
