<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemal Evli | Kişisel Blog</title>
    <!-- Favicon Eklendi -->
    <link rel="icon" type="image/png" href="https://wsrv.nl/?url=https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/imcemalevli/profile.png&w=64&h=64&mask=circle&output=png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .animate-fade-in { animation: cubicBlurIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes cubicBlurIn {
            from { opacity: 0; transform: translateY(15px); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #262626; border-radius: 999px; }
        ::-webkit-scrollbar-thumb:hover { background: #4f46e5; }
    </style>
</head>
<body class="bg-[#050505] text-neutral-200 antialiased selection:bg-indigo-500/30 selection:text-indigo-200 overflow-x-hidden">

    <div class="fixed top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-indigo-500/10 rounded-full blur-[120px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-purple-500/10 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <nav class="sticky top-0 z-50 bg-[#050505]/60 backdrop-blur-xl border-b border-neutral-900/80 transition-all duration-300">
        <div class="max-w-5xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="#" class="text-xl font-extrabold tracking-tighter bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent hover:scale-105 transition-transform duration-300">
                CEMAL EVLI
            </a>
            <div class="flex bg-neutral-900/60 p-1.5 rounded-full border border-neutral-800/60 shadow-inner">
                <button onclick="switchTab('photos')" class="tab-btn px-5 py-2 text-xs md:text-sm font-semibold rounded-full text-neutral-400 hover:text-neutral-100 transition-all duration-300 bg-neutral-800/80 text-white shadow-sm" id="btn-photos">
                    <i class="fa-regular fa-image mr-2 opacity-70"></i>Fotoğraflar
                </button>
                <button onclick="switchTab('videos')" class="tab-btn px-5 py-2 text-xs md:text-sm font-semibold rounded-full text-neutral-400 hover:text-neutral-100 transition-all duration-300" id="btn-videos">
                    <i class="fa-solid fa-clapperboard mr-2 opacity-70"></i>Videolar
                </button>
                <button onclick="switchTab('posts')" class="tab-btn px-5 py-2 text-xs md:text-sm font-semibold rounded-full text-neutral-400 hover:text-neutral-100 transition-all duration-300" id="btn-posts">
                    <i class="fa-regular fa-pen-to-square mr-2 opacity-70"></i>Yazılar
                </button>
            </div>
        </div>
    </nav>

    <header class="relative z-10 max-w-4xl mx-auto px-6 pt-20 pb-16 text-center">
        <!-- Ortadaki Kamera Logosu Belirttiğiniz Görselle Değiştirildi -->
        <div class="relative w-28 h-28 mx-auto mb-8 group">
            <div class="absolute inset-0 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-3xl blur-md opacity-70 group-hover:opacity-100 transition-opacity duration-500 animate-pulse"></div>
            <div class="relative w-full h-full bg-neutral-900 border border-neutral-800 rounded-3xl flex items-center justify-center shadow-2xl overflow-hidden p-1">
                <img src="https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/imcemalevli/profile.png" alt="Cemal Evli" class="w-full h-full object-cover rounded-2xl">
            </div>
        </div>
        
        <h1 class="text-4xl sm:text-6xl font-black tracking-tight mb-6 text-white">
            Anlarımı ve Hikayelerimi Keşfedin.
        </h1>
        <p class="text-base sm:text-lg text-neutral-400 max-w-2xl mx-auto leading-relaxed font-light">
            Objektifime takılan kareleri, hazırladığım video projelerini ve kişisel yazılarımı bu platformda bulabilirsiniz.
        </p>

        <div class="mt-8 flex justify-center gap-3 flex-wrap">
            <a href="https://github.com/cemal201138" target="_blank" class="w-11 h-11 bg-neutral-900/60 border border-neutral-800/80 hover:border-indigo-500/50 rounded-xl flex items-center justify-center text-neutral-400 hover:text-white hover:-translate-y-1 transition-all duration-300 shadow-sm"><i class="fa-brands fa-github text-lg"></i></a>
            <a href="https://www.instagram.com/cemalevli38/" target="_blank" class="w-11 h-11 bg-neutral-900/60 border border-neutral-800/80 hover:border-indigo-500/50 rounded-xl flex items-center justify-center text-neutral-400 hover:text-white hover:-translate-y-1 transition-all duration-300 shadow-sm"><i class="fa-brands fa-instagram text-lg"></i></a>
            <a href="https://www.facebook.com/profile.php?id=100076601840154" target="_blank" class="w-11 h-11 bg-neutral-900/60 border border-neutral-800/80 hover:border-indigo-500/50 rounded-xl flex items-center justify-center text-neutral-400 hover:text-white hover:-translate-y-1 transition-all duration-300 shadow-sm"><i class="fa-brands fa-facebook text-lg"></i></a>
            <a href="https://www.tiktok.com/@imcemalevli" target="_blank" class="w-11 h-11 bg-neutral-900/60 border border-neutral-800/80 hover:border-indigo-500/50 rounded-xl flex items-center justify-center text-neutral-400 hover:text-white hover:-translate-y-1 transition-all duration-300 shadow-sm"><i class="fa-brands fa-tiktok text-lg"></i></a>
            <a href="https://www.youtube.com/@imcemalevli" target="_blank" class="w-11 h-11 bg-neutral-900/60 border border-neutral-800/80 hover:border-indigo-500/50 rounded-xl flex items-center justify-center text-neutral-400 hover:text-white hover:-translate-y-1 transition-all duration-300 shadow-sm"><i class="fa-brands fa-youtube text-lg"></i></a>
        </div>
    </header>

    <main class="relative z-10 max-w-5xl mx-auto px-6 pb-32">
        <section id="photos" class="tab-content active">
            <div id="photos-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
        </section>

        <section id="videos" class="tab-content">
            <div id="videos-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </section>

        <section id="posts" class="tab-content">
            <div id="posts-container" class="space-y-6 max-w-3xl mx-auto"></div>
        </section>
    </main>

    <div id="lightbox" class="fixed inset-0 bg-black/90 backdrop-blur-md z-50 hidden flex items-center justify-center p-4 transition-all duration-300 opacity-0" onclick="closeLightbox()">
        <button class="absolute top-6 right-6 w-12 h-12 bg-neutral-900/80 hover:bg-neutral-800 text-neutral-300 hover:text-white rounded-full flex items-center justify-center border border-neutral-800 transition-colors"><i class="fa-solid fa-xmark text-lg"></i></button>
        <img id="lightbox-img" src="" alt="Büyük Görsel" class="max-w-full max-h-[82vh] rounded-2xl shadow-2xl border border-neutral-800/40 transform scale-95 transition-transform duration-300">
    </div>

    <div id="article-modal" class="fixed inset-0 bg-black/70 backdrop-blur-md z-50 hidden flex items-center justify-center p-4 transition-all duration-300 opacity-0" onclick="if(event.target === this) closeArticle()">
        <div class="bg-[#0b0b0b] border border-neutral-900 w-full max-w-2xl rounded-2xl max-h-[75vh] overflow-y-auto p-8 relative shadow-2xl transform scale-95 transition-transform duration-300">
            <button onclick="closeArticle()" class="absolute top-6 right-6 w-10 h-10 bg-neutral-900 hover:bg-neutral-800 text-neutral-400 hover:text-white rounded-xl flex items-center justify-center border border-neutral-800/60 transition-colors"><i class="fa-solid fa-xmark"></i></button>
            <h2 id="modal-title" class="text-2xl font-extrabold text-white mb-6 pr-8 tracking-tight"></h2>
            <div id="modal-content" class="text-neutral-400 space-y-4 leading-relaxed font-light text-sm md:text-base border-t border-neutral-900 pt-6 whitespace-pre-line"></div>
        </div>
    </div>

    <script>
        const DATA_URL = './data.json';
        let globalMediaData = { photos: [], videos: [], texts: [] };
        let fetchedTextsCache = {};

        function cleanTitle(filename) {
            const nameWithoutExt = filename.substring(0, filename.lastIndexOf('.')) || filename;
            return nameWithoutExt.replace(/[-_]/g, ' ');
        }

        document.addEventListener("DOMContentLoaded", () => {
            fetch(DATA_URL)
                .then(response => {
                    if (!response.ok) throw new Error("Veri dosyası yüklenemedi");
                    return response.json();
                })
                .then(data => {
                    globalMediaData = data;
                    renderPhotos();
                    renderVideos();
                    renderTexts();
                })
                .catch(error => {
                    console.error("Hata:", error);
                    document.querySelectorAll('main section div').forEach(el => {
                        el.innerHTML = `<p class="text-red-500/70 text-sm col-span-full text-center py-12">Veriler yüklenirken bir hata oluştu (data.json bulunamadı veya hatalı).</p>`;
                    });
                });
        });

        function renderPhotos() {
            const grid = document.getElementById('photos-grid');
            const data = globalMediaData.photos || [];

            if (data.length === 0) {
                grid.innerHTML = `<p class="text-neutral-600 text-sm col-span-full text-center py-12">Henüz fotoğraf eklenmedi.</p>`;
                return;
            }

            grid.innerHTML = data.map(file => {
                const title = cleanTitle(file.name);
                return `
                    <div class="group relative overflow-hidden rounded-2xl bg-neutral-900/40 border border-neutral-900 cursor-pointer p-2 hover:border-neutral-800 transition-all duration-500 shadow-xl animate-fade-in" onclick="openLightbox('${file.download_url}')">
                        <div class="overflow-hidden rounded-xl h-72 w-full relative">
                            <img src="${file.download_url}" alt="${title}" class="w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-105 filter grayscale-[20%] group-hover:grayscale-0" loading="lazy">
                            <div class="absolute inset-0 bg-gradient-to-t from-neutral-950 via-neutral-950/20 to-transparent opacity-0 group-hover:opacity-100 transition-all duration-400 flex items-end p-5">
                                <div>
                                    <span class="text-[10px] uppercase tracking-widest text-indigo-400 font-bold mb-1 block">FOTOĞRAF</span>
                                    <p class="text-sm font-semibold text-white capitalize">${title}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderVideos() {
            const grid = document.getElementById('videos-grid');
            const data = globalMediaData.videos || [];

            if (data.length === 0) {
                grid.innerHTML = `<p class="text-neutral-600 text-sm col-span-full text-center py-12">Henüz video eklenmedi.</p>`;
                return;
            }

            grid.innerHTML = data.map(file => {
                const title = cleanTitle(file.name);
                return `
                    <div class="bg-neutral-900/30 border border-neutral-900 rounded-2xl p-3 shadow-2xl hover:border-neutral-800 transition-all duration-300 animate-fade-in">
                        <div class="aspect-video rounded-xl overflow-hidden shadow-inner relative group border border-neutral-800/40">
                            <video controls class="w-full h-full object-cover" preload="metadata">
                                <source src="${file.download_url}" type="video/mp4">
                            </video>
                        </div>
                        <div class="p-4 mt-2">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="text-[10px] font-bold px-2.5 py-1 bg-indigo-500/10 text-indigo-400 rounded-md border border-indigo-500/20">VİDEO</span>
                            </div>
                            <h3 class="font-bold text-lg text-white capitalize">${title}</h3>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderTexts() {
            const container = document.getElementById('posts-container');
            const data = globalMediaData.texts || [];

            if (data.length === 0) {
                container.innerHTML = `<p class="text-neutral-600 text-sm text-center py-12">Henüz yazı eklenmedi.</p>`;
                return;
            }

            container.innerHTML = data.map((file, index) => {
                const displayTitle = file.title || cleanTitle(file.name);
                const uniqueId = `text-summary-${index}`;
                
                fetch(file.download_url)
                    .then(res => {
                        if (!res.ok) throw new Error("Yazı içeriği yüklenemedi");
                        return res.text();
                    })
                    .then(text => {
                        fetchedTextsCache[index] = text;
                        const summaryEl = document.getElementById(uniqueId);
                        if (summaryEl) {
                            summaryEl.innerText = text.length > 150 ? text.substring(0, 150) + "..." : text;
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        const summaryEl = document.getElementById(uniqueId);
                        if (summaryEl) summaryEl.innerText = "İçerik yüklenirken hata oluştu.";
                    });

                return `
                    <article class="group bg-neutral-900/20 hover:bg-neutral-900/40 border border-neutral-900 hover:border-neutral-800 p-6 rounded-2xl transition-all duration-300 cursor-pointer shadow-lg animate-fade-in" onclick="openArticle(${index})">
                        <div class="flex items-center gap-3 text-[11px] text-neutral-500 font-semibold mb-4">
                            <span class="text-indigo-400 tracking-wider font-bold">YAZI / BLOG</span>
                        </div>
                        <h2 class="text-xl font-bold text-white group-hover:text-indigo-400 transition-colors duration-300 mb-3 tracking-tight capitalize">${displayTitle}</h2>
                        <p id="${uniqueId}" class="text-neutral-400 text-sm font-light leading-relaxed line-clamp-2">Yazı yükleniyor...</p>
                        <div class="mt-4 flex items-center text-xs text-neutral-400 font-medium group-hover:text-white transition-colors duration-300">
                            Okumaya Devam Et <i class="fa-solid fa-arrow-right-long ml-2 transition-transform group-hover:translate-x-1"></i>
                        </div>
                    </article>
                `;
            }).join('');
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-neutral-800/80', 'text-white', 'shadow-sm');
                btn.classList.add('text-neutral-400');
            });
            const activeContent = document.getElementById(tabId);
            activeContent.classList.add('active');
            const activeBtn = document.getElementById('btn-' + tabId);
            activeBtn.classList.remove('text-neutral-400');
            activeBtn.classList.add('bg-neutral-800/80', 'text-white', 'shadow-sm');
        }

        function openLightbox(src) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            lightbox.classList.remove('hidden');
            lightbox.classList.add('flex');
            setTimeout(() => {
                lightbox.classList.remove('opacity-0');
                img.classList.remove('scale-95');
            }, 10);
        }
        
        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            lightbox.classList.add('opacity-0');
            img.classList.add('scale-95');
            setTimeout(() => {
                lightbox.classList.add('hidden');
                lightbox.classList.remove('flex');
            }, 300);
        }

        function openArticle(index) {
            const file = globalMediaData.texts[index];
            if (!file) return;

            const modal = document.getElementById('article-modal');
            const innerContainer = modal.querySelector('div');
            
            const contentText = fetchedTextsCache[index] || "Yazı içeriği yükleniyor, lütfen bekleyin...";
            
            document.getElementById('modal-title').innerText = file.title || cleanTitle(file.name);
            document.getElementById('modal-content').innerText = contentText;
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                innerContainer.classList.remove('scale-95');
            }, 10);
        }
        
        function closeArticle() {
            const modal = document.getElementById('article-modal');
            const innerContainer = modal.querySelector('div');
            modal.classList.add('opacity-0');
            innerContainer.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }
    </script>
</body>
</html>
