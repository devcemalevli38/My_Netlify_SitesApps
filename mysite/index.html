        body { font-family: 'Plus Jakarta Sans', sans-serif; }

        ::-webkit-scrollbar-thumb { background: #262626; border-radius: 999px; }

<body class="bg-[#050505] text-neutral-200 antialiased selection:bg-indigo-500/30 selection:text-indigo-200 overflow-x-hidden">

    <div id="password-screen" class="fixed inset-0 bg-[#050505] z-[100] flex items-center justify-center p-6 transition-all duration-500">
        <div class="fixed top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-indigo-500/10 rounded-full blur-[120px] pointer-events-none"></div>
        <div class="fixed bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-purple-500/10 rounded-full blur-[120px] pointer-events-none"></div>
        
        <div class="relative bg-neutral-900/40 border border-neutral-900 backdrop-blur-xl p-8 rounded-2xl w-full max-w-md text-center shadow-2xl animate-fade-in">
            <div class="w-16 h-16 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg">
                <i class="fa-solid fa-lock text-white text-xl"></i>
            </div>
            <h2 class="text-2xl font-extrabold text-white tracking-tight mb-2">Şifre:</h2>
            <p class="text-sm text-neutral-400 mb-6 font-light">Bu içeriği görüntülemek için lütfen erişim şifresini girin.</p>
            
            <form onsubmit="verifyPassword(event)" class="space-y-4">
                <div class="relative">
                    <input type="password" id="blog-password" required placeholder="Şifreniz" class="w-full bg-neutral-950 border border-neutral-800/80 rounded-xl px-4 py-3 text-sm text-white placeholder-neutral-500 focus:outline-none focus:border-indigo-500/50 transition-colors duration-300">
                </div>
                <p id="password-error" class="text-red-500 text-xs hidden font-medium text-left px-1"><i class="fa-solid fa-circle-exclamation mr-1.5"></i>Hatalı şifre girdiniz!</p>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold py-3 rounded-xl shadow-md hover:shadow-indigo-500/10 transition-all duration-300">
                    Giriş Yap
                </button>
            </form>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="fixed top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-indigo-500/10 rounded-full blur-[120px] pointer-events-none z-0"></div>
        <div class="fixed bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-purple-500/10 rounded-full blur-[120px] pointer-events-none z-0"></div>

        <nav class="sticky top-0 z-50 bg-[#050505]/60 backdrop-blur-xl border-b border-neutral-900/80 transition-all duration-300">
            <div class="max-w-5xl mx-auto px-6 h-20 flex items-center justify-between">
                <a href="#" class="text-xl font-extrabold tracking-tighter bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent hover:scale-105 transition-transform duration-300">
                    CEMAL EVLI
                </a>
                <div class="flex bg-neutral-900/60 p-1.5 rounded-full border border-neutral-800/60 shadow-inner">
                    <button onclick="switchTab('photos')" class="tab-btn px-5 py-2 text-xs md:text-sm font-semibold rounded-full text-neutral-400 hover:text-neutral-100 transition-all duration-300" id="btn-photos">
                        <i class="fa-regular fa-image mr-2 opacity-70"></i>Fotoğraflar
                    </button>
                    <button onclick="switchTab('videos')" class="tab-btn px-5 py-2 text-xs md:text-sm font-semibold rounded-full text-neutral-400 hover:text-neutral-100 transition-all duration-300" id="btn-videos">
                        <i class="fa-solid fa-clapperboard mr-2 opacity-70"></i>Videolar
                    </button>
                    <button onclick="switchTab('posts')" class="tab-btn px-5 py-2 text-xs md:text-sm font-semibold rounded-full text-neutral-400 hover:text-neutral-100 transition-all duration-300 bg-neutral-800/80 text-white shadow-sm" id="btn-posts">
                        <i class="fa-regular fa-pen-to-square mr-2 opacity-70"></i>Yazılar
                    </button>
                </div>
            </div>
        </nav>

        <header class="relative z-10 max-w-4xl mx-auto px-6 pt-20 pb-16 text-center">
            <div class="relative w-28 h-28 mx-auto mb-8 group">
                <div class="absolute inset-0 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-3xl blur-md opacity-70 group-hover:opacity-100 transition-opacity duration-500 animate-pulse"></div>
                <div class="relative w-full h-full bg-neutral-900 border border-neutral-800 rounded-3xl flex items-center justify-center shadow-2xl overflow-hidden p-1">
                    <img src="https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/imcemalevli/profile.png" alt="Cemal Evli" class="w-full h-full object-cover rounded-2xl">
                </div>
            </div>
            
            <h1 class="text-4xl sm:text-6xl font-black tracking-tight mb-6 text-white">
                Anlarımı ve Hikayelerimi Keşfedin.
            </h1>
            <p class="text-base sm:text-lg text-neutral-400 max-w-2xl mx-auto leading-relaxed font-light">
                Objektifime takılan kareleri, hazırladığım video projelerini ve kişisel yazılarımı bu platformda bulabilirsiniz.
            </p>

            <div class="mt-8 flex justify-center gap-3 flex-wrap">
                <a href="https://github.com/cemal201138" target="_blank" class="w-11 h-11 bg-neutral-900/60 border border-neutral-800/80 hover:border-indigo-500/50 rounded-xl flex items-center justify-center text-neutral-400 hover:text-white hover:-translate-y-1 transition-all duration-300 shadow-sm"><i class="fa-brands fa-github text-lg"></i></a>
                <a href="https://www.instagram.com/cemalevli38/" target="_blank" class="w-11 h-11 bg-neutral-900/60 border border-neutral-800/80 hover:border-indigo-500/50 rounded-xl flex items-center justify-center text-neutral-400 hover:text-white hover:-translate-y-1 transition-all duration-300 shadow-sm"><i class="fa-brands fa-instagram text-lg"></i></a>
                <a href="https://www.facebook.com/profile.php?id=100076601840154" target="_blank" class="w-11 h-11 bg-neutral-900/60 border border-neutral-800/80 hover:border-indigo-500/50 rounded-xl flex items-center justify-center text-neutral-400 hover:text-white hover:-translate-y-1 transition-all duration-300 shadow-sm"><i class="fa-brands fa-facebook text-lg"></i></a>
                <a href="https://www.tiktok.com/@imcemalevli" target="_blank" class="w-11 h-11 bg-neutral-900/60 border border-neutral-800/80 hover:border-indigo-500/50 rounded-xl flex items-center justify-center text-neutral-400 hover:text-white hover:-translate-y-1 transition-all duration-300 shadow-sm"><i class="fa-brands fa-tiktok text-lg"></i></a>
                <a href="https://www.youtube.com/@imcemalevli" target="_blank" class="w-11 h-11 bg-neutral-900/60 border border-neutral-800/80 hover:border-indigo-500/50 rounded-xl flex items-center justify-center text-neutral-400 hover:text-white hover:-translate-y-1 transition-all duration-300 shadow-sm"><i class="fa-brands fa-youtube text-lg"></i></a>
            </div>
        </header>

        <main class="relative z-10 max-w-5xl mx-auto px-6 pb-32">
            <section id="photos" class="tab-content">
                <div id="photos-folders" class="flex flex-wrap gap-2 justify-center mb-8"></div>
                <div id="photos-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
            </section>

            <section id="videos" class="tab-content">
                <div id="videos-folders" class="flex flex-wrap gap-2 justify-center mb-8"></div>
                <div id="videos-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
            </section>

            <section id="posts" class="tab-content active">
                <div id="posts-folders" class="flex flex-wrap gap-2 justify-center mb-8"></div>
                <div id="posts-container" class="space-y-6 max-w-3xl mx-auto"></div>
            </section>
        </main>
    </div>

    <div id="lightbox" class="fixed inset-0 bg-black/90 backdrop-blur-md z-50 hidden flex items-center justify-center p-4 transition-all duration-300 opacity-0" onclick="closeLightbox()">
        <button class="absolute top-6 right-6 w-12 h-12 bg-neutral-900/80 hover:bg-neutral-800 text-neutral-300 hover:text-white rounded-full flex items-center justify-center border border-neutral-800 transition-colors"><i class="fa-solid fa-xmark text-lg"></i></button>
        <img id="lightbox-img" src="" alt="Büyük Görsel" class="max-w-full max-h-[82vh] rounded-2xl shadow-2xl border border-neutral-800/40 transform scale-95 transition-transform duration-300">
    </div>

    <div id="article-modal" class="fixed inset-0 bg-black/70 backdrop-blur-md z-50 hidden flex items-center justify-center p-4 transition-all duration-300 opacity-0" onclick="if(event.target === this) closeArticle()">
        <div class="bg-[#0b0b0b] border border-neutral-900 w-full max-w-2xl rounded-2xl max-h-[75vh] overflow-y-auto p-8 relative shadow-2xl transform scale-95 transition-transform duration-300">
            <button onclick="closeArticle()" class="absolute top-6 right-6 w-10 h-10 bg-neutral-900 hover:bg-neutral-800 text-neutral-400 hover:text-white rounded-xl flex items-center justify-center border border-neutral-800/60 transition-colors"><i class="fa-solid fa-xmark"></i></button>
            <h2 id="modal-title" class="text-2xl font-extrabold text-white mb-6 pr-8 tracking-tight"></h2>
            <div id="modal-content" class="text-neutral-400 space-y-4 leading-relaxed font-light text-sm md:text-base border-t border-neutral-900 pt-6 whitespace-pre-line"></div>
        </div>
    </div>

    <script>
        const DATA_URL = './data.json';
        let globalMediaData = { photos: [], videos: [], texts: [] };
        let fetchedTextsCache = {};
        let activeFilters = { photos: 'all', videos: 'all', posts: 'all' };

        const CORRECT_HASH = "61eee464a8c30c0e0d3040ca3a55fbfb67e52a38c636aa684c1a5d7f5a7ad3f0";

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);                    
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function verifyPassword(event) {
            event.preventDefault();
            const passwordInput = document.getElementById('blog-password').value;
            const errorText = document.getElementById('password-error');
            
            const inputHash = await sha256(passwordInput);

            if (inputHash === CORRECT_HASH) {
                const passwordScreen = document.getElementById('password-screen');
                passwordScreen.classList.add('opacity-0', 'pointer-events-none');
                
                const mainContent = document.getElementById('main-content');
                mainContent.classList.remove('hidden');
                
                setTimeout(() => { passwordScreen.remove(); }, 500);
                initBlogData();
            } else {
                errorText.classList.remove('hidden');
                document.getElementById('blog-password').value = '';
            }
        }

        function initBlogData() {
            fetch(DATA_URL)
                .then(response => {
                    if (!response.ok) throw new Error("Veri dosyası yüklenemedi");
                    return response.json();
                })
                .then(data => {
                    globalMediaData = data;
                    renderAllSections();
                })
                .catch(error => {
                    console.error("Hata:", error);
                    document.querySelectorAll('main section div[id$="-grid"], main section div[id$="-container"]').forEach(el => {
                        el.innerHTML = `<p class="text-red-500/70 text-sm col-span-full text-center py-12">Veriler yüklenirken bir hata oluştu (data.json bulunamadı veya hatalı).</p>`;
                    });
                });
        }

        function cleanTitle(filename) {
            const baseName = filename.includes('/') ? filename.split('/').pop() : filename;
            const nameWithoutExt = baseName.substring(0, baseName.lastIndexOf('.')) || baseName;
            return nameWithoutExt.replace(/[-_]/g, ' ');
        }

        function getFolderName(filename) {
            if (filename && filename.includes('/')) {
                return filename.split('/')[0];
            }
            return null;
        }

        function renderAllSections() {
            renderSectionFolders('photos', globalMediaData.photos || [], renderPhotos);
            renderSectionFolders('videos', globalMediaData.videos || [], renderVideos);
            renderSectionFolders('posts', globalMediaData.texts || [], renderTexts);

            renderPhotos();
            renderVideos();
            renderTexts();
        }

        function renderSectionFolders(type, items, renderCallback) {
            const folderContainer = document.getElementById(`${type}-folders`);
            if (!folderContainer) return;

            const folders = new Set();
            items.forEach(item => {
                const folder = getFolderName(item.name);
                if (folder) folders.add(folder);
            });

            if (folders.size === 0) {
                folderContainer.innerHTML = '';
                return;
            }

            const currentActive = activeFilters[type];
            let html = `
                <button onclick="setFolderFilter('${type}', 'all', ${renderCallback.name})" class="px-4 py-1.5 text-xs font-semibold rounded-xl border transition-all duration-300 ${currentActive === 'all' ? 'bg-indigo-600 border-indigo-500 text-white shadow-md' : 'bg-neutral-900/60 border-neutral-800 text-neutral-400 hover:text-white'}">
                    Hepsi
                </button>
            `;

            folders.forEach(folder => {
                const isActive = currentActive === folder;
                html += `
                    <button onclick="setFolderFilter('${type}', '${folder}', ${renderCallback.name})" class="px-4 py-1.5 text-xs font-semibold rounded-xl border transition-all duration-300 capitalize ${isActive ? 'bg-indigo-600 border-indigo-500 text-white shadow-md' : 'bg-neutral-900/60 border-neutral-800 text-neutral-400 hover:text-white'}">
                        <i class="fa-solid fa-folder mr-1.5 opacity-70"></i>${folder}
                    </button>
                `;
            });

            folderContainer.innerHTML = html;
        }

        function setFolderFilter(type, folderName, renderCallback) {
            activeFilters[type] = folderName;
            if (type === 'photos') renderSectionFolders('photos', globalMediaData.photos || [], renderPhotos);
            if (type === 'videos') renderSectionFolders('videos', globalMediaData.videos || [], renderVideos);
            if (type === 'posts') renderSectionFolders('posts', globalMediaData.texts || [], renderTexts);
            renderCallback();
        }

        function renderPhotos() {
            const grid = document.getElementById('photos-grid');
            let data = globalMediaData.photos || [];

            if (activeFilters.photos !== 'all') {
                data = data.filter(file => getFolderName(file.name) === activeFilters.photos);
            }

            if (data.length === 0) {
                grid.innerHTML = `<p class="text-neutral-600 text-sm col-span-full text-center py-12">Bu klasörde henüz fotoğraf eklenmedi.</p>`;
                return;
            }

            grid.innerHTML = data.map(file => {
                const title = cleanTitle(file.name);
                const folder = getFolderName(file.name);
                return `
                    <div class="group relative overflow-hidden rounded-2xl bg-neutral-900/40 border border-neutral-900 cursor-pointer p-2 hover:border-neutral-800 transition-all duration-500 shadow-xl animate-fade-in" onclick="openLightbox('${file.download_url}')">
                        <div class="overflow-hidden rounded-xl h-72 w-full relative">
                            <img src="${file.download_url}" alt="${title}" class="w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-105 filter grayscale-[20%] group-hover:grayscale-0" loading="lazy">
                            <div class="absolute inset-0 bg-gradient-to-t from-neutral-950 via-neutral-950/20 to-transparent opacity-0 group-hover:opacity-100 transition-all duration-400 flex items-end p-5">
                                <div>
                                    <span class="text-[10px] uppercase tracking-widest text-indigo-400 font-bold mb-1 block">FOTOĞRAF ${folder ? ` / ${folder}` : ''}</span>
                                    <p class="text-sm font-semibold text-white capitalize">${title}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderVideos() {
            const grid = document.getElementById('videos-grid');
            let data = globalMediaData.videos || [];

            if (activeFilters.videos !== 'all') {
                data = data.filter(file => getFolderName(file.name) === activeFilters.videos);
            }

            if (data.length === 0) {
                grid.innerHTML = `<p class="text-neutral-600 text-sm col-span-full text-center py-12">Bu klasörde henüz video eklenmedi.</p>`;
                return;
            }

            grid.innerHTML = data.map(file => {
                const title = cleanTitle(file.name);
                const folder = getFolderName(file.name);
                return `
                    <div class="bg-neutral-900/30 border border-neutral-900 rounded-2xl p-3 shadow-2xl hover:border-neutral-800 transition-all duration-300 animate-fade-in">
                        <div class="aspect-video rounded-xl overflow-hidden shadow-inner relative group border border-neutral-800/40">
                            <video controls class="w-full h-full object-cover" preload="metadata">
                                <source src="${file.download_url}" type="video/mp4">
                            </video>
                        </div>
                        <div class="p-4 mt-2">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="text-[10px] font-bold px-2.5 py-1 bg-indigo-500/10 text-indigo-400 rounded-md border border-indigo-500/20 uppercase">VİDEO ${folder ? ` / ${folder}` : ''}</span>
                            </div>
                            <h3 class="font-bold text-lg text-white capitalize">${title}</h3>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderTexts() {
            const container = document.getElementById('posts-container');
            let data = globalMediaData.texts || [];

            if (activeFilters.posts !== 'all') {
                data = data.filter(file => getFolderName(file.name) === activeFilters.posts);
            }

            if (data.length === 0) {
                container.innerHTML = `<p class="text-neutral-600 text-sm text-center py-12">Bu klasörde henüz yazı eklenmedi.</p>`;
                return;
            }

            container.innerHTML = data.map((file, index) => {
                const orijinalIndex = globalMediaData.texts.indexOf(file);
                const displayTitle = file.title || cleanTitle(file.name);
                const folder = getFolderName(file.name);
                const uniqueId = `text-summary-${orijinalIndex}`;
                
                if (!fetchedTextsCache[orijinalIndex]) {
                    fetch(file.download_url)
                        .then(res => {
                            if (!res.ok) throw new Error("Yazı içeriği yüklenemedi");
                            return res.text();
                        })
                        .then(text => {
                            fetchedTextsCache[orijinalIndex] = text;
                            const summaryEl = document.getElementById(uniqueId);
                            if (summaryEl) {
                                summaryEl.innerText = text.length > 150 ? text.substring(0, 150) + "..." : text;
                            }
                        })
                        .catch(err => {
                            console.error("Yazı getirme hatası:", err, "URL:", file.download_url);
                            const summaryEl = document.getElementById(uniqueId);
                            if (summaryEl) summaryEl.innerText = "İçerik yüklenirken hata oluştu.";
                        });
                }

                return `
                    <article class="group bg-neutral-900/20 hover:bg-neutral-900/40 border border-neutral-900 hover:border-neutral-800 p-6 rounded-2xl transition-all duration-300 cursor-pointer shadow-lg animate-fade-in" onclick="openArticle(${orijinalIndex})">
                        <div class="flex items-center gap-3 text-[11px] text-neutral-500 font-semibold mb-4">
                            <span class="text-indigo-400 tracking-wider font-bold uppercase">YAZI / BLOG ${folder ? ` / ${folder}` : ''}</span>
                        </div>
                        <h2 class="text-xl font-bold text-white group-hover:text-indigo-400 transition-colors duration-300 mb-3 tracking-tight capitalize">${displayTitle}</h2>
                        <p id="${uniqueId}" class="text-neutral-400 text-sm font-light leading-relaxed line-clamp-2">
                            ${fetchedTextsCache[orijinalIndex] ? (fetchedTextsCache[orijinalIndex].length > 150 ? fetchedTextsCache[orijinalIndex].substring(0, 150) + "..." : fetchedTextsCache[orijinalIndex]) : 'Yazı yükleniyor...'}
                        </p>
                        <div class="mt-4 flex items-center text-xs text-neutral-400 font-medium group-hover:text-white transition-colors duration-300">
                            Okumaya Devam Et <i class="fa-solid fa-arrow-right-long ml-2 transition-transform group-hover:translate-x-1"></i>
                        </div>
                    </article>
                `;
            }).join('');
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-neutral-800/80', 'text-white', 'shadow-sm');
                btn.classList.add('text-neutral-400');
            });
            const activeContent = document.getElementById(tabId);
            if (activeContent) activeContent.classList.add('active');
            const activeBtn = document.getElementById('btn-' + tabId);
            if (activeBtn) {
                activeBtn.classList.remove('text-neutral-400');
                activeBtn.classList.add('bg-neutral-800/80', 'text-white', 'shadow-sm');
            }
        }

        function openLightbox(src) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            lightbox.classList.remove('hidden');
            lightbox.classList.add('flex');
            setTimeout(() => {
                lightbox.classList.remove('opacity-0');
                img.classList.remove('scale-95');
            }, 10);
        }
        
        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            lightbox.classList.add('opacity-0');
            img.classList.add('scale-95');
            setTimeout(() => {
                lightbox.classList.add('hidden');
                lightbox.classList.remove('flex');
            }, 300);
        }

        // HTML injection ve XSS açıklarını önlemek için güvenli metin kaçırma fonksiyonu
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // Metin içindeki düz URL'leri tespit edip tıklanabilir link haline getiren yardımcı fonksiyon
        function linkify(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, function(url) {
                return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="text-indigo-400 hover:text-indigo-300 underline break-all transition-colors">${url}</a>`;
            });
        }

        function openArticle(index) {
            const file = globalMediaData.texts[index];
            if (!file) return;

            const modal = document.getElementById('article-modal');
            const innerContainer = modal.querySelector('div');
            const modalContentEl = document.getElementById('modal-content');
            
            document.getElementById('modal-title').innerText = file.title || cleanTitle(file.name);
            
            if (fetchedTextsCache[index]) {
                // Güvenlik adımları: Önce metni escape et, sonra linkleri a etiketine dönüştür
                const safeText = escapeHTML(fetchedTextsCache[index]);
                modalContentEl.innerHTML = linkify(safeText);
            } else {
                modalContentEl.innerText = "Yazı içeriği yükleniyor, lütfen bekleyin...";
            }
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                innerContainer.classList.remove('scale-95');
            }, 10);
        }
        
        function closeArticle() {
            const modal = document.getElementById('article-modal');
            const innerContainer = modal.querySelector('div');
            modal.classList.add('opacity-0');
            innerContainer.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }
    </script>
</body>
</html>
