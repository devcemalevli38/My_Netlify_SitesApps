name: Update Projects Contents

on:
  schedule:
    # Her gün saat 19:00 UTC (Türkiye saati ile 22:00)
    - cron: '0 19 * * *'
  workflow_dispatch: # Manuel olarak başlatmak istersen

jobs:
  update-json:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch and Process Repository Data
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          # 1. projects.json dosyasından repo isimlerini oku
          REPOS=$(jq -r '.repositories[]' myprojects/projects.json)
          
          # 2. Geçici bir JSON dizisi oluştur
          echo "[" > temp_contents.json
          
          FIRST=true
          for REPO in $REPOS; do
            if [ "$FIRST" = false ]; then echo "," >> temp_contents.json; fi
            
            echo "Processing: $REPO"
            
            # Repo genel bilgilerini çek
            REPO_INFO=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/cemal201138/$REPO")
            
            # En son Release (Sürüm) bilgilerini çek
            RELEASE_INFO=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/cemal201138/$REPO/releases/latest")
            
            # İki JSON'u birleştir: latest_release alanı altına sürüm bilgilerini ekle
            # Eğer release yoksa (404 dönerse) bu alan null veya hata mesajı içerir.
            echo "$REPO_INFO" | jq --argjson rel "$RELEASE_INFO" '. + {latest_release: $rel}' >> temp_contents.json
            
            FIRST=false
          done
          
          echo "]" >> temp_contents.json
          
          # 3. Sonucu hedef dosyaya taşı
          mkdir -p myprojects
          mv temp_contents.json myprojects/projectscontents.json

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add myprojects/projectscontents.json
          
          # Değişiklik yoksa çık, varsa commit yap
          git commit -m "Auto-update projectscontents.json with release info [$(date)]" || exit 0
          
          # Çakışmaları önlemek için rebase ile çek ve pushla
          git pull --rebase origin main
          git push origin main
