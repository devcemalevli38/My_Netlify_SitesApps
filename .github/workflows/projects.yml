name: Projects Data Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Release Data and Stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Proje listesi
          REPOS=("Python_Muzik_Calar" "Python-Hand-Mouse" "Pushbullet-Sender-Android")
          USER="cemal201138"
          
          # Özet JSON dosyasını başlat
          echo "[]" > myprojects.json

          for REPO in "${REPOS[@]}"; do
            echo "Processing $REPO..."
            
            # Repo istatistiklerini çek
            REPO_DATA=$(curl -sH "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/$USER/$REPO")
            STARS=$(echo $REPO_DATA | jq '.stargazers_count // 0')
            FORKS=$(echo $REPO_DATA | jq '.forks_count // 0')
            
            # Son sürüm bilgilerini çek
            RELEASE_DATA=$(curl -sH "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/$USER/$REPO/releases/latest")
            
            # Ham veriyi dosyaya yaz
            echo "$RELEASE_DATA" > "${REPO}_release.json"
            
            # Temel sürüm bilgilerini al
            TAG=$(echo $RELEASE_DATA | jq -r '.tag_name // "n/a"')
            PUB_DATE=$(echo $RELEASE_DATA | jq -r '.published_at // "n/a"')
            
            # Kaynak kod linklerini oluştur
            ZIP_URL="https://github.com/$USER/$REPO/archive/refs/tags/$TAG.zip"
            TAR_URL="https://github.com/$USER/$REPO/archive/refs/tags/$TAG.tar.gz"

            # Yüklenmiş dosyaların (assets) isim ve linklerini çek
            # Bu kısım JSON içinde bir dosya listesi oluşturur
            ASSETS=$(echo $RELEASE_DATA | jq -c '[.assets[]? | {file_name: .name, download_url: .browser_download_url}] // []')

            # Tüm bilgileri myprojects.json dosyasına ekle
            jq ". += [{
              project: \"$REPO\",
              version: \"$TAG\",
              stars: $STARS,
              forks: $FORKS,
              source_zip: \"$ZIP_URL\",
              source_tar: \"$TAR_URL\",
              updated_at: \"$PUB_DATE\",
              downloadable_files: $ASSETS
            }]" myprojects.json > tmp.json && mv tmp.json myprojects.json
          done

      - name: Commit and Push Changes
        run: |
          git config --local user.name "cemal201138"
          git config --local user.email "cemal201138@users.noreply.github.com"
          
          # Dosyaları ekle
          git add myprojects.json *_release.json
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Automated update (Full Data & Assets): $(date)"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes detected."
          fi
