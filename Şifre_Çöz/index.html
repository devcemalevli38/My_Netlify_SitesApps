<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<title>QR Decryptor</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/%C5%9Eifre_%C3%87%C3%B6z/icon.ico">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/%C5%9Eifre_%C3%87%C3%B6z/icon.ico">

<style>
:root{
  --bg:#0b0f14;
  --card:#111827cc;
  --border:#1f2937;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#22c55e;
  --info:#3b82f6;
  --footer-accent: #38bdf8;
}
*{ box-sizing:border-box; }

body{
  margin:0;
  padding:14px;
  background:
    radial-gradient(1200px 600px at 10% -10%, #1f2937 0%, transparent 40%),
    radial-gradient(800px 400px at 90% 10%, #052e16 0%, transparent 35%),
    var(--bg);
  color:var(--text);
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Ana İçerik Kapsayıcısı */
.container {
  max-width: 720px;
  width: 100%;
  margin: 0 auto;
  flex: 1; /* Footer'ı en alta itmek için */
}

h2{text-align:center; margin:10px 0 18px; font-weight:600;}

#pinDisplay{
  font-size:3rem; font-weight:700; letter-spacing:.15em; text-align:center;
  padding:16px; border-radius:16px;
  background:linear-gradient(135deg,#052e16,#064e3b);
  border:1px solid #064e3b; color:#ecfdf5;
  box-shadow:0 10px 40px #00000080; margin-bottom:16px;
}

#video{
  width:100%; max-height:45vh; border-radius:16px;
  border:1px solid var(--border); background:#000;
  box-shadow:0 10px 30px #00000080;
}

input[type="password"]{
  width:100%; padding:12px 14px; margin-top:6px;
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; color:var(--text); outline: none;
}
input[type="password"]:focus { border-color: var(--info); }

button{
  background:#1f2937; color:var(--text);
  border:1px solid var(--border);
  border-radius:14px; padding:12px 16px;
  cursor:pointer; transition:.25s; font-weight: 600;
}
button:hover{transform:translateY(-1px); background:#273449; border-color: var(--muted);}
button:disabled{opacity:.5; cursor:not-allowed;}

.row{display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;}
label{display:flex; gap:6px; color:var(--muted); align-items: center; cursor: pointer;}

#status{
  margin-top:12px; padding:12px; border-radius:14px;
  background:var(--card); border:1px solid var(--border);
  border-left:4px solid var(--info); min-height: 44px;
}

.small{font-size:.85em; color:var(--muted); margin-top: 15px;}

/* --- FOOTER STİLLERİ --- */
footer {
    margin-top: 40px;
    padding: 30px 0 20px;
    width: 100%;
    text-align: center;
    font-size: 0.9rem;
    opacity: 0.8;
    border-top: 1px solid var(--border);
}

footer b { color: var(--footer-accent); }
footer a { text-decoration: none; color: inherit; transition: opacity 0.2s; }
footer a:hover { opacity: 0.7; }

</style>
</head>

<body>

<div class="container">
    <h2>QR Decryptor</h2>
    <div id="pinDisplay">---</div>
    <video id="video" playsinline autoplay></video>

    <div class="row">
      <button id="startBtn">Kamerayı Başlat</button>
      <button id="stopBtn" disabled>Durdur</button>
    </div>

    <p style="margin-bottom: 5px;"><strong>Şifre:</strong></p>
    <input id="pwd" type="password" placeholder="Paylaşılan şifreyi girin..."/>

    <div class="row" style="justify-content: space-between; align-items: center;">
      <label><input type="checkbox" id="remember"> Şifreyi kaydet</label>
      <button id="forget">Temizle</button>
    </div>

    <div class="small">Not: Şifre tarayıcıda (localStorage) saklanır. Cihazınız başkalarıyla ortaksa "Temizle" butonunu kullanın.</div>
    <div id="status">Sistem hazır.</div>
</div>

<footer>
    <p>Tüm hakları saklıdır. &copy; 2026 <a href="https://github.com/cemal201138" target="_blank"><b>Cemal Evli</b></a></p>
</footer>

<script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>

<script>
const STORAGE_KEY='qr_decryptor_saved_password';
const video=document.getElementById('video');
const pwdInput=document.getElementById('pwd');
const rememberChk=document.getElementById('remember');
const statusBox=document.getElementById('status');
const pinDisplay=document.getElementById('pinDisplay');
const startBtn=document.getElementById('startBtn');
const stopBtn=document.getElementById('stopBtn');

let stream=null, scanActive=false;

const savePassword=p=>localStorage.setItem(STORAGE_KEY,p);
const loadSavedPassword=()=>localStorage.getItem(STORAGE_KEY);
const forgetSavedPassword=()=>localStorage.removeItem(STORAGE_KEY);

function b64_to_u8(b){
  const bin=atob(b), a=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) a[i]=bin.charCodeAt(i);
  return a;
}

async function deriveKey(p,s){
  const enc=new TextEncoder();
  const base=await crypto.subtle.importKey('raw',enc.encode(p),{name:'PBKDF2'},false,['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2',salt:s,iterations:200000,hash:'SHA-256'},
    base,{name:'AES-GCM',length:256},false,['decrypt']
  );
}

async function decryptFromQR(data,pwd){
  try{
    const o=JSON.parse(data);
    const key=await deriveKey(pwd,b64_to_u8(o.salt));
    const pt=await crypto.subtle.decrypt(
      {name:'AES-GCM',iv:b64_to_u8(o.iv)},key,b64_to_u8(o.ct)
    );
    pinDisplay.textContent=new TextDecoder().decode(pt).split('|')[0];
    statusBox.textContent='✅ QR Okundu ve PIN Çözüldü.';
  }catch(e){
    pinDisplay.textContent='---';
    statusBox.textContent='❌ Şifre hatalı veya geçersiz QR.';
  }
}

async function startCamera(){
  if(scanActive) return;
  statusBox.textContent='Kamera erişimi isteniyor...';
  try {
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    video.srcObject=stream;
    await video.play();
    scanActive=true;
    startBtn.disabled=true;
    stopBtn.disabled=false;
    scanLoop();
    statusBox.textContent='🔍 QR aranıyor...';
  } catch(e) {
    statusBox.textContent='⚠️ Kamera hatası: ' + e.message;
  }
}

function stopCamera(){
  stream?.getTracks().forEach(t=>t.stop());
  video.srcObject = null;
  scanActive=false;
  startBtn.disabled=false;
  stopBtn.disabled=true;
  statusBox.textContent='Kamera durduruldu.';
}

function scanLoop(){
  const c=document.createElement('canvas');
  const x=c.getContext('2d');
  (function loop(){
    if(!scanActive) return;
    if(video.readyState===video.HAVE_ENOUGH_DATA){
      c.width=video.videoWidth;
      c.height=video.videoHeight;
      x.drawImage(video,0,0);
      const d=x.getImageData(0,0,c.width,c.height);
      const qr=jsQR(d.data,d.width,d.height);
      if(qr){
        const pwd=loadSavedPassword()||pwdInput.value;
        if(pwd) {
            decryptFromQR(qr.data,pwd);
            stopCamera();
            return;
        } else {
            statusBox.textContent = "⚠️ Önce şifreyi girmelisiniz!";
        }
      }
    }
    requestAnimationFrame(loop);
  })();
}

rememberChk.onchange=()=>{
  if(rememberChk.checked && pwdInput.value){
    savePassword(pwdInput.value);
    statusBox.textContent='Şifre kaydedildi.';
  }else{
    forgetSavedPassword();
    statusBox.textContent='Şifre kaydı kaldırıldı.';
  }
};

pwdInput.oninput=()=>{
  if(rememberChk.checked) savePassword(pwdInput.value);
};

document.getElementById('forget').onclick=()=>{
  forgetSavedPassword();
  pwdInput.value='';
  rememberChk.checked=false;
  statusBox.textContent='Bellek temizlendi.';
};

startBtn.onclick=startCamera;
stopBtn.onclick=stopCamera;

window.onload=()=>{
  const s=loadSavedPassword();
  if(s){
    pwdInput.value=s;
    rememberChk.checked=true;
  }
  // Sayfa açılır açılmaz kamerayı başlatmayı dener
  startCamera().catch(()=>{});
};
</script>
</body>
</html>
