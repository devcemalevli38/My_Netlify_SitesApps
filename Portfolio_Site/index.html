<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemal Evli's Portfolio</title>
    
    <link rel="icon" type="image/png" href="https://wsrv.nl/?url=github.com/cemal201138.png&w=64&h=64&mask=circle&output=png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --neon-shadow: 0 0 10px rgba(56, 189, 248, 0.5), 0 0 20px rgba(56, 189, 248, 0.3);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --navbar-height: 64px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            line-height: 1.6;
            margin: 0; padding: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ─── NAVBAR ─── */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 999;
            height: var(--navbar-height);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
            background: rgba(2, 6, 23, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(56, 189, 248, 0.08);
            transition: background 0.3s, border-color 0.3s;
        }

        .navbar.scrolled {
            background: rgba(2, 6, 23, 0.92);
            border-color: rgba(56, 189, 248, 0.18);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
            list-style: none;
            margin: 0; padding: 0;
        }

        .nav-links a {
            position: relative;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            padding: 8px 16px;
            border-radius: 8px;
            transition: color 0.25s, background 0.25s;
            cursor: pointer;
            user-select: none;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 4px; left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 20px; height: 2px;
            background: var(--accent);
            border-radius: 2px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-main);
            background: rgba(56, 189, 248, 0.08);
        }

        .nav-links a.active::after, .nav-links a:hover::after {
            transform: translateX(-50%) scaleX(1);
        }

        .nav-links a.active { color: var(--accent); }

        /* ─── ÜST SAĞ ALAN (dil + yenile) ─── */
        .top-controls {
            position: fixed;
            top: 12px; right: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ─── YENİLE BUTONU ─── */
        .refresh-btn {
            background: var(--card-bg);
            color: var(--text-dim);
            border: 1px solid rgba(56, 189, 248, 0.35);
            width: 38px;
            height: 38px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .refresh-btn:hover {
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: var(--neon-shadow);
        }

        .refresh-btn.spinning i {
            animation: spin 0.7s linear infinite;
        }

        .refresh-btn.done {
            color: #4ade80;
            border-color: #4ade80;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.4);
            transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        /* ─── DİL MENÜSÜ ─── */
        .lang-container {
            position: relative;
        }

        .lang-btn {
            background: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--accent);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            height: 38px;
            box-sizing: border-box;
        }

        .lang-btn:hover { box-shadow: var(--neon-shadow); }

        .lang-dropdown {
            position: absolute;
            top: 45px; right: 0;
            background: var(--card-bg);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 8px;
            display: none;
            flex-direction: column;
            min-width: 120px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .lang-dropdown.active { display: flex; }

        .lang-option {
            padding: 10px;
            cursor: pointer;
            color: var(--text-main);
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .lang-option:hover { background: var(--accent); color: var(--bg-color); }

        /* ─── MAIN CONTENT ─── */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
            padding-top: calc(var(--navbar-height) + 60px);
            flex: 1;
        }

        header { text-align: center; margin-bottom: 80px; }

        .profile-img {
            width: 150px !important;
            height: 150px !important;
            border-radius: 50% !important;
            object-fit: cover !important;
            aspect-ratio: 1 / 1 !important;
            margin-bottom: 25px;
            border: 3px solid var(--accent);
            padding: 5px;
            box-shadow: var(--neon-shadow);
            transition: var(--transition);
            background-color: var(--card-bg);
            display: inline-block;
        }

        .profile-img:hover {
            transform: scale(1.05) rotate(5deg);
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.8);
        }

        h1 {
            font-size: 3.2rem;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, #fff, var(--accent), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .subtitle {
            color: var(--accent);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
        }

        /* ─── SOCIAL LINKS ─── */
        .social-links {
            margin-top: 35px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            min-height: 2.5rem;
            transition: opacity 0.3s;
        }

        .social-links a {
            color: var(--text-main);
            font-size: 1.8rem;
            text-decoration: none;
            transition: var(--transition);
        }

        .social-links a:hover { transform: scale(1.2) translateY(-5px); }

        .social-links a:hover .fa-github    { color: #fff; }
        .social-links a:hover .fa-instagram { color: #E1306C; }
        .social-links a:hover .fa-facebook  { color: #1877F2; }
        .social-links a:hover .fa-globe     { color: var(--accent); }
        .social-links a:hover .fa-envelope  { color: var(--accent); }
        .social-links a:hover .fa-tree      { color: #43d854; }
        .social-links a:hover .fa-twitter   { color: #1DA1F2; }
        .social-links a:hover .fa-youtube   { color: #FF0000; }
        .social-links a:hover .fa-linkedin  { color: #0A66C2; }
        .social-links a:hover .fa-telegram  { color: #2AABEE; }
        .social-links a:hover .fa-discord   { color: #5865F2; }
        .social-links a:hover .fa-twitch    { color: #9146FF; }
        .social-links a:hover i { transition: color 0.25s; }

        @keyframes social-flash {
            0%   { opacity: 0; transform: scale(0.85); }
            60%  { opacity: 1; transform: scale(1.06); }
            100% { opacity: 1; transform: scale(1); }
        }

        .social-links.updated a {
            animation: social-flash 0.5s ease-out both;
        }

        .social-links.updated a:nth-child(1) { animation-delay: 0.00s; }
        .social-links.updated a:nth-child(2) { animation-delay: 0.06s; }
        .social-links.updated a:nth-child(3) { animation-delay: 0.12s; }
        .social-links.updated a:nth-child(4) { animation-delay: 0.18s; }
        .social-links.updated a:nth-child(5) { animation-delay: 0.24s; }
        .social-links.updated a:nth-child(6) { animation-delay: 0.30s; }
        .social-links.updated a:nth-child(7) { animation-delay: 0.36s; }
        .social-links.updated a:nth-child(8) { animation-delay: 0.42s; }

        /* ─── ABOUT TEXT ─── */
        .section-title {
            border-left: 4px solid var(--accent);
            padding-left: 15px;
            margin: 60px 0 30px;
            font-size: 1.5rem;
            text-transform: uppercase;
        }

        .about-text {
            color: var(--text-dim);
            background: rgba(30, 41, 59, 0.3);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(56, 189, 248, 0.1);
            white-space: pre-wrap;
            min-height: 60px;
            transition: opacity 0.3s;
        }

        .about-text.loading, .projects-container.loading {
            opacity: 0.45;
            font-style: italic;
        }

        @keyframes updated-flash {
            0%   { border-color: var(--accent); box-shadow: var(--neon-shadow); }
            100% { border-color: rgba(56, 189, 248, 0.1); box-shadow: none; }
        }

        .about-text.updated, .project-card.updated {
            animation: updated-flash 1.5s ease-out forwards;
        }

        .about-text a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
        }

        /* ─── PROJECT CARDS ─── */
        .projects-container {
            transition: opacity 0.3s;
        }

        .project-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
            text-decoration: none;
            display: block;
            color: inherit;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition);
        }

        .project-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            background: rgba(30, 41, 59, 0.6);
        }

        .project-card h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.35rem;
        }

        .project-card p {
            color: var(--text-dim);
            margin-bottom: 15px;
            font-size: 0.95rem;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
        }

        footer {
            text-align: center;
            padding: 60px 0 30px;
            color: var(--text-dim);
            border-top: 1px solid rgba(56, 189, 248, 0.1);
            font-size: 0.95rem;
            opacity: 0.8;
            width: 100%;
        }

        footer b { color: var(--accent); font-weight: 700; }
        footer a { text-decoration: none; color: inherit; transition: color 0.3s ease; }
        footer a:hover { color: var(--accent); }
        footer p { margin: 0; }

        /* ─── MOBİL ─── */
        @media (max-width: 540px) {
            .nav-links a { font-size: 0.78rem; padding: 7px 10px; }
            .top-controls { top: 14px; right: 10px; gap: 6px; }
            .lang-btn { padding: 6px 10px; font-size: 0.8rem; }
            .refresh-btn { width: 34px; height: 34px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <ul class="nav-links">
            <li><a data-section="hero"     id="nav-home"     class="active">Home</a></li>
            <li><a data-section="about"    id="nav-about">About</a></li>
            <li><a data-section="projects" id="nav-projects">Projects</a></li>
        </ul>
    </nav>

    <div class="top-controls">
        <button class="refresh-btn" id="refresh-btn" title="Verileri yenile / Refresh data" onclick="hardRefresh()">
            <i class="fas fa-rotate-right"></i>
        </button>

        <div class="lang-container">
            <button class="lang-btn" onclick="toggleDropdown()">
                <i class="fas fa-language"></i> <span id="btn-text">Language</span>
            </button>
            <div class="lang-dropdown" id="lang-dropdown">
                <div class="lang-option" onclick="changeLanguage('tr')">Türkçe</div>
                <div class="lang-option" onclick="changeLanguage('en')">English</div>
            </div>
        </div>
    </div>

    <div class="container">
        <section id="hero">
            <header>
                <img src="https://github.com/cemal201138.png" alt="Cemal Evli" class="profile-img">
                <h1>Cemal Evli</h1>
                <p class="subtitle" id="ui-subtitle">Student and Future Developer</p>
                <div class="social-links" id="social-links"></div>
            </header>
        </section>

        <section id="about">
            <h2 class="section-title" id="ui-about-title">About Me</h2>
            <p class="about-text loading" id="ui-about-text">Loading...</p>
        </section>

        <section id="projects">
            <h2 class="section-title" id="ui-projects-title">My Projects</h2>
            <div class="projects-container loading" id="projects-container">Loading...</div>
        </section>
    </div>

    <footer>
        <p><span id="ui-footer-text">All rights reserved.</span> &copy; 2026 <a href="https://github.com/cemal201138" target="_blank"><b>Cemal Evli</b></a></p>
    </footer>

    <script>
        // ════════════════════════════════════════
        //  KAYNAK TANIMLARI
        // ════════════════════════════════════════

        const ABOUT_SOURCES = {
            en: {
                url: 'https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/Portfolio_Site/aboutme_eng',
                cacheKey: 'aboutme_eng',
                fallback: 'I am a student working with the goal of turning my curiosity for technology into tangible projects. I am developing myself in web technologies and Python. You can follow my projects and more at "https://cemalevli.qzz.io".'
            },
            tr: {
                url: 'https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/Portfolio_Site/aboutme_tr',
                cacheKey: 'aboutme_tr',
                fallback: 'Teknolojiye duyduğum merakı, somut projelere dönüştürme hedefiyle çalışan bir öğrenciyim. Web teknolojileri ve Python üzerine kendimi geliştiriyorum. Projelerimi ve daha fazlasını "https://cemalevli.qzz.io" adresinden takip edebilirsiniz.'
            }
        };

        const SOCIAL_SOURCE = {
            url: 'https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/social-links',
            cacheKey: 'social_links',
            fallback: JSON.stringify([
                {"icon": "fab fa-github",    "url": "https://github.com/cemal201138",                               "title": "GitHub"},
                {"icon": "fab fa-facebook",  "url": "https://www.facebook.com/profile.php?id=100076601840154",     "title": "Facebook"},
                {"icon": "fab fa-instagram", "url": "https://www.instagram.com/cemalevli38/",                      "title": "Instagram"},
                {"icon": "fas fa-envelope",  "url": "mailto:mylab@cemalevli.qzz.io",                               "title": "E-posta"},
                {"icon": "fas fa-globe",     "url": "https://cemalevli.qzz.io",                                    "title": "Web Sitem"}
            ])
        };

        const PROJECTS_SOURCE = {
            url: 'https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/Portfolio_Site/projects.json',
            cacheKey: 'projects_list',
            fallback: JSON.stringify([
                {
                    "name": "Python Hand Mouse",
                    "url": "https://github.com/cemal201138/Python-Hand-Mouse",
                    "description_tr": "El hareketleriyle fare kontrolü.",
                    "description_en": "Mouse control with hand gestures.",
                    "tags": ["Python", "OpenCV"]
                },
                {
                    "name": "Python Müzik Çalar",
                    "url": "https://github.com/cemal201138/Python_Muzik_Calar",
                    "description_tr": "Gelişmiş arayüzlü müzik oynatıcı.",
                    "description_en": "Music player with advanced interface.",
                    "tags": ["Tkinter", "Pygame"]
                }
            ])
        };

        // Silinecek cache key'lerin tamamı
        const ALL_CACHE_KEYS = [
            ABOUT_SOURCES.en.cacheKey,
            ABOUT_SOURCES.tr.cacheKey,
            SOCIAL_SOURCE.cacheKey,
            PROJECTS_SOURCE.cacheKey
        ];

        // ════════════════════════════════════════
        //  HARD REFRESH — cache sil + yeniden çek
        // ════════════════════════════════════════

        async function hardRefresh() {
            const btn = document.getElementById('refresh-btn');

            // Zaten dönüyorsa çift tıklamayı engelle
            if (btn.classList.contains('spinning')) return;

            // 1) Tüm cache'i sil
            ALL_CACHE_KEYS.forEach(k => localStorage.removeItem(k));

            // 2) Dinamik alanları "yükleniyor" haline döndür
            const d = translations[currentLang];
            
            const aboutEl = document.getElementById('ui-about-text');
            aboutEl.classList.remove('updated');
            aboutEl.classList.add('loading');
            aboutEl.textContent = d.loading;

            const projectsEl = document.getElementById('projects-container');
            projectsEl.classList.add('loading');
            projectsEl.textContent = d.loading;

            // 3) Butonu döndür
            btn.classList.add('spinning');
            btn.classList.remove('done');

            // 4) Tüm verileri yeniden çek (force: true → değişmese bile render et)
            await fetchAndDetectChanges(true);

            // 5) Bitince ✓ efekti
            btn.classList.remove('spinning');
            btn.classList.add('done');
            setTimeout(() => btn.classList.remove('done'), 1800);
        }

        // ════════════════════════════════════════
        //  GENEL FETCH + DEĞİŞİKLİK TESPİTİ
        // ════════════════════════════════════════

        async function fetchOne(url, cacheKey, fallback) {
            const oldText = localStorage.getItem(cacheKey);
            try {
                const res = await fetch(url, { cache: 'no-store' });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const newText = (await res.text()).trim();
                const changed = newText !== oldText;
                if (changed) localStorage.setItem(cacheKey, newText);
                return { text: newText, changed };
            } catch (err) {
                console.warn('[fetch] hata —', cacheKey, err);
                return { text: oldText || fallback, changed: false };
            }
        }

        // ════════════════════════════════════════
        //  ABOUT TEXT
        // ════════════════════════════════════════

        function linkify(text) {
            return text.replace(/"(https?:\/\/[^"]+)"/g,
                '<a href="$1" target="_blank">$1</a>');
        }

        function renderAbout(text, flash = true) {
            const el = document.getElementById('ui-about-text');
            el.classList.remove('loading', 'updated');
            el.innerHTML = linkify(text);
            if (flash) { void el.offsetWidth; el.classList.add('updated'); }
        }

        // ════════════════════════════════════════
        //  SOCIAL LINKS
        // ════════════════════════════════════════

        function renderSocialLinks(jsonText, flash = false) {
            const container = document.getElementById('social-links');
            let links;
            try {
                links = JSON.parse(jsonText);
            } catch (e) {
                console.warn('[Social] JSON parse hatası:', e);
                return;
            }

            container.classList.remove('updated');
            container.innerHTML = links.map(link => {
                const target = link.url.startsWith('mailto:') ? '' : 'target="_blank"';
                return `<a href="${link.url}" ${target} title="${link.title}"><i class="${link.icon}"></i></a>`;
            }).join('');

            if (flash) { void container.offsetWidth; container.classList.add('updated'); }
        }

        // ════════════════════════════════════════
        //  PROJECT CARDS DYNAMIC RENDER
        // ════════════════════════════════════════

        function renderProjects(jsonText, flash = false) {
            const container = document.getElementById('projects-container');
            let projects;
            try {
                projects = JSON.parse(jsonText);
            } catch (e) {
                console.warn('[Projects] JSON parse hatası:', e);
                return;
            }

            container.classList.remove('loading');
            
            container.innerHTML = projects.map(proj => {
                const description = currentLang === 'tr' ? proj.description_tr : proj.description_en;
                const tagsHtml = proj.tags.map(t => `<span class="tag">${t}</span>`).join('');
                
                return `
                    <a href="${proj.url}" target="_blank" class="project-card ${flash ? 'updated' : ''}">
                        <h3>${proj.name}</h3>
                        <p>${description}</p>
                        <div class="tag-container">${tagsHtml}</div>
                    </a>
                `;
            }).join('');
        }

        // ════════════════════════════════════════
        //  ANA FETCH DÖNGÜSÜ
        //  force=true → değişmese bile her zaman render et
        // ════════════════════════════════════════

        async function fetchAndDetectChanges(force = false) {
            const [engResult, trResult, socialResult, projectsResult] = await Promise.allSettled([
                fetchOne(ABOUT_SOURCES.en.url, ABOUT_SOURCES.en.cacheKey, ABOUT_SOURCES.en.fallback),
                fetchOne(ABOUT_SOURCES.tr.url,  ABOUT_SOURCES.tr.cacheKey,  ABOUT_SOURCES.tr.fallback),
                fetchOne(SOCIAL_SOURCE.url,      SOCIAL_SOURCE.cacheKey,      SOCIAL_SOURCE.fallback),
                fetchOne(PROJECTS_SOURCE.url,    PROJECTS_SOURCE.cacheKey,    PROJECTS_SOURCE.fallback)
            ]);

            const aboutResult = currentLang === 'tr' ? trResult : engResult;
            if (aboutResult.status === 'fulfilled' && (aboutResult.value.changed || force)) {
                renderAbout(aboutResult.value.text, true);
            }

            if (socialResult.status === 'fulfilled' && (socialResult.value.changed || force)) {
                renderSocialLinks(socialResult.value.text, true);
            }

            if (projectsResult.status === 'fulfilled' && (projectsResult.value.changed || force)) {
                renderProjects(projectsResult.value.text, true);
            }
        }

        // ════════════════════════════════════════
        //  ÇEVİRİLER
        // ════════════════════════════════════════

        const translations = {
            en: {
                btnText: "English", subtitle: "Student and Future Developer",
                aboutTitle: "About Me", projectsTitle: "My Projects",
                footer: "All rights reserved.",
                navHome: "Home", navAbout: "About", navProjects: "Projects",
                loading: "Loading..."
            },
            tr: {
                btnText: "Türkçe", subtitle: "Öğrenci ve Geleceğin Yazılımcısı",
                aboutTitle: "Hakkımda", projectsTitle: "Projelerim",
                footer: "Tüm hakları saklıdır.",
                navHome: "Ana Sayfa", navAbout: "Hakkımda", navProjects: "Projeler",
                loading: "Yükleniyor..."
            }
        };

        let currentLang = 'en';

        function toggleDropdown() {
            document.getElementById('lang-dropdown').classList.toggle('active');
        }

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('preferredLang', lang);
            updateUI(lang);
            document.getElementById('lang-dropdown').classList.remove('active');
        }

        function updateUI(lang) {
            const d = translations[lang];
            document.getElementById('btn-text').innerText          = d.btnText;
            document.getElementById('ui-subtitle').innerText       = d.subtitle;
            document.getElementById('ui-about-title').innerText    = d.aboutTitle;
            document.getElementById('ui-projects-title').innerText = d.projectsTitle;
            document.getElementById('ui-footer-text').innerText    = d.footer;
            document.getElementById('nav-home').innerText          = d.navHome;
            document.getElementById('nav-about').innerText         = d.navAbout;
            document.getElementById('nav-projects').innerText      = d.navProjects;
            document.documentElement.lang = lang;

            // Hakkımda Güncelle
            const cachedAbout = localStorage.getItem(ABOUT_SOURCES[lang].cacheKey);
            const aboutEl = document.getElementById('ui-about-text');
            if (cachedAbout) {
                renderAbout(cachedAbout, false);
            } else {
                aboutEl.classList.add('loading');
                aboutEl.textContent = d.loading;
            }

            // Projeleri Güncelle (Dil değiştiğinde açıklamalar değişmeli)
            const cachedProjects = localStorage.getItem(PROJECTS_SOURCE.cacheKey);
            if (cachedProjects) {
                renderProjects(cachedProjects, false);
            }
        }

        // ════════════════════════════════════════
        //  SMOOTH SCROLL + ACTIVE NAV
        // ════════════════════════════════════════

        const NAVBAR_H = 64, SCROLL_OFFSET = 20;

        function scrollToSection(sectionId) {
            const el = document.getElementById(sectionId);
            if (!el) return;
            window.scrollTo({
                top: el.getBoundingClientRect().top + window.scrollY - NAVBAR_H - SCROLL_OFFSET,
                behavior: 'smooth'
            });
        }

        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', e => { e.preventDefault(); scrollToSection(link.dataset.section); });
        });

        const navbar = document.getElementById('navbar');

        function updateActiveNav() {
            const scrollMid = window.scrollY + NAVBAR_H + SCROLL_OFFSET + 10;
            let current = 'hero';
            ['hero','about','projects'].forEach(id => {
                const el = document.getElementById(id);
                if (el && el.offsetTop <= scrollMid) current = id;
            });
            document.querySelectorAll('.nav-links a').forEach(link => {
                link.classList.toggle('active', link.dataset.section === current);
            });
        }

        window.addEventListener('scroll', () => {
            navbar.classList.toggle('scrolled', window.scrollY > 20);
            updateActiveNav();
        }, { passive: true });

        // ════════════════════════════════════════
        //  BAŞLANGIÇ
        // ════════════════════════════════════════

        window.onload = async () => {
            currentLang = localStorage.getItem('preferredLang') || 'en';
            updateUI(currentLang);
            updateActiveNav();

            const cachedSocial = localStorage.getItem(SOCIAL_SOURCE.cacheKey);
            renderSocialLinks(cachedSocial || SOCIAL_SOURCE.fallback, false);

            const cachedProjects = localStorage.getItem(PROJECTS_SOURCE.cacheKey);
            renderProjects(cachedProjects || PROJECTS_SOURCE.fallback, false);

            await fetchAndDetectChanges();
        };

        window.onclick = function(e) {
            if (!e.target.closest('.lang-container') && !e.target.closest('#refresh-btn')) {
                document.getElementById('lang-dropdown').classList.remove('active');
            }
        };
    </script>

</body>
</html>
