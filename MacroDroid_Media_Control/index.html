<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MacroDroid Media Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- MODERN DEĞİŞKENLER & SIFIRLAMA --- */
        :root {
            /* Renk Paleti (Fütüristik Neon) */
            --cls-bg-dark: #06070a;
            --cls-accent: #00f2fe; /* Ana Neon Turkuaz */
            --cls-accent-rgb: 0, 242, 254;
            --cls-danger: #ff0055; /* Hata Kırmızısı */
            --cls-success: #00ff88; /* Başarı Yeşili */
            
            /* Cam Efekti (Glassmorphism Pro) */
            --cls-panel-bg: rgba(10, 11, 16, 0.75);
            --cls-panel-border: rgba(255, 255, 255, 0.06);
            
            /* Tipografi */
            --cls-font-main: 'Inter', sans-serif;
            --cls-text-main: #ffffff;
            --cls-text-dim: #8892b0;
            
            /* Geçişler */
            --cls-ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--cls-bg-dark);
            color: var(--cls-text-main);
            font-family: var(--cls-font-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- MODER ARKAPLAN ANİMASYONU --- */
        body::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at center, rgba(var(--cls-accent-rgb), 0.15) 0%, rgba(6, 7, 10, 0) 70%);
            animation: auraPulse 10s infinite alternate var(--cls-ease);
            z-index: -1;
        }

        @keyframes auraPulse {
            0% { transform: translate(-25%, -25%) scale(1); opacity: 0.5; }
            100% { transform: translate(-15%, -15%) scale(1.1); opacity: 0.8; }
        }

        /* --- ANA PANEL TERSARIMI --- */
        .panel {
            background: var(--cls-panel-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--cls-panel-border);
            border-radius: 40px;
            padding: 50px 35px 35px 35px;
            width: 360px;
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.5),
                0 0 50px rgba(var(--cls-accent-rgb), 0.08);
            position: relative;
            z-index: 10;
            transition: transform 0.4s var(--cls-ease), box-shadow 0.4s var(--cls-ease);
        }

        /* Ayarlar paneli açıkken ana paneli hafifçe geriye it */
        .panel.settings-active {
            transform: scale(0.97);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6);
        }

        /* --- BAŞLIK VE TİPOGRAFİ --- */
        h2 {
            font-weight: 700;
            font-size: 26px;
            margin: 0 0 40px 0;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        /* --- BUTON GRID VE MODERN BUTONLAR --- */
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        button {
            font-family: var(--cls-font-main);
            font-weight: 500;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--cls-text-main);
            border-radius: 24px;
            padding: 22px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s var(--cls-ease);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Buton Parlama Efekti */
        button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%);
            transform: scale(0);
            transition: transform 0.5s var(--cls-ease);
            opacity: 0;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(var(--cls-accent-rgb), 0.3);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        button:hover::after {
            transform: scale(1);
            opacity: 1;
        }

        button:active {
            transform: scale(0.96) translateY(-1px);
            transition: all 0.1s ease;
        }

        /* Özel Buton Stilleri */
        .btn-main {
            grid-column: span 2;
            font-weight: 600;
            background: rgba(var(--cls-accent-rgb), 0.06);
            border-color: rgba(var(--cls-accent-rgb), 0.2);
            color: var(--cls-accent);
        }
        .btn-main:hover {
            background: rgba(var(--cls-accent-rgb), 0.12);
            border-color: rgba(var(--cls-accent-rgb), 0.5);
            box-shadow: 0 10px 40px rgba(var(--cls-accent-rgb), 0.2);
        }

        .btn-vol {
            color: var(--cls-success);
            border-color: rgba(0, 255, 136, 0.15);
        }
        .btn-vol:hover {
            border-color: rgba(0, 255, 136, 0.4);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.1);
        }

        /* --- AYARLAR DİŞLİ BUTONU --- */
        .settings-btn {
            background: transparent;
            border: none;
            padding: 0;
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 22px;
            color: var(--cls-text-dim);
            opacity: 0.6;
            z-index: 100;
            cursor: pointer;
            width: auto;
            border-radius: 50%;
            transition: all 0.4s var(--cls-ease);
        }
        .settings-btn:hover {
            opacity: 1;
            color: var(--cls-accent);
            transform: rotate(90deg) scale(1.1);
            background: transparent;
            border: none;
            box-shadow: none;
        }
        .settings-btn::after { display: none; } /* Parlama efektini kapat */

        /* --- DURUM ÇUBUĞU --- */
        .status-bar {
            margin-top: 35px;
            font-size: 11px;
            font-weight: 600;
            color: var(--cls-text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            opacity: 0.8;
            transition: color 0.3s ease;
        }

        /* --- MODERN AYARLAR PANELİ (OVERLAY) --- */
        .settings-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #08090d; /* Daha koyu saf arka plan */
            border-radius: 40px;
            z-index: 50;
            padding: 50px 30px;
            box-sizing: border-box;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s var(--cls-ease), transform 0.4s var(--cls-ease);
        }

        .settings-overlay.show {
            display: flex;
            flex-direction: column;
            opacity: 1;
            transform: translateY(0);
        }

        .settings-overlay h3 {
            font-weight: 700;
            font-size: 22px;
            margin: 0 0 30px 0;
            color: var(--cls-text-main);
        }

        /* Modern Input Alanı */
        .input-group {
            margin-bottom: 25px;
        }

        label {
            display:block;
            font-size: 11px;
            color: var(--cls-accent);
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 18px;
            border-radius: 18px;
            color: var(--cls-text-main);
            font-family: var(--cls-font-main);
            font-size: 14px;
            transition: all 0.3s var(--cls-ease);
        }

        input:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--cls-accent);
            box-shadow: 0 0 15px rgba(var(--cls-accent-rgb), 0.15);
        }

        /* Modern Kaydet Butonu */
        .save-btn {
            background: var(--cls-accent);
            color: #000;
            font-weight: 700;
            width: 100%;
            margin-top: auto; /* En alta yasla */
            padding: 20px;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            letter-spacing: 0.5px;
        }
        .save-btn:hover {
            background: #fff;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
        }

        /* Yardımcı Sınıflar */
        .hidden { display: none !important; }
        .fade-out { opacity: 0; transform: scale(0.9); transition: all 0.4s var(--cls-ease); }
    </style>
</head>
<body>

<div class="panel" id="mainPanel">
    <button class="settings-btn" onclick="toggleSettings()" title="Ayarlar">⚙️</button>

    <div id="mainContent">
        <h2>MacroDroid Media Control</h2>
        <div class="btn-grid">
            <button class="btn-main" onclick="gonder('play')">⏯ Play / Pause</button>
            <button onclick="gonder('back')" title="Önceki">⏮</button>
            <button onclick="gonder('next')" title="Sonraki">⏭</button>
            <button class="btn-vol" onclick="gonder('vol_up')">VOL +</button>
            <button class="btn-vol" onclick="gonder('vol_down')">VOL -</button>
        </div>
        <div id="log" class="status-bar">SYSTEM IS READY</div>
    </div>

    <div id="settingsPanel" class="settings-overlay">
        <h3>Settings</h3>
        <div class="input-group">
            <label for="baseUrlInput">MacroDroid Webhook URL</label>
            <input type="text" id="baseUrlInput" placeholder="https://trigger.macrodroid.com/...">
        </div>
        <button class="save-btn" onclick="saveUrls()">SAVE</button>
    </div>
</div>

<script>
    // --- JAVASCRIPT MANTIĞI (GÜNCELLENMİŞ GÖRSEL EFEKTLERLE) ---
    let baseUrl = "";
    const mainPanel = document.getElementById('mainPanel');
    const settingsPanel = document.getElementById('settingsPanel');
    const mainContent = document.getElementById('mainContent');

    // Sayfa yüklendiğinde LocalStorage'dan URL'yi al
    window.onload = () => {
        const saved = localStorage.getItem('macrodroid_base_url');
        if (saved) {
            baseUrl = saved;
            document.getElementById('baseUrlInput').value = baseUrl;
        }
    };

    // Ayarlar panelini aç/kapat (Akıcı animasyonla)
    function toggleSettings() {
        if (settingsPanel.classList.contains('show')) {
            // Kapat
            settingsPanel.classList.remove('show');
            mainContent.classList.remove('fade-out');
            mainPanel.classList.remove('settings-active');
            // Animasyon bitiminde gizle
            setTimeout(() => { if(!settingsPanel.classList.contains('show')) settingsPanel.style.display = 'none'; }, 400);
        } else {
            // Aç
            settingsPanel.style.display = 'flex';
            mainPanel.classList.add('settings-active');
            // Reflow için küçük gecikme
            setTimeout(() => {
                settingsPanel.classList.add('show');
                mainContent.classList.add('fade-out');
            }, 10);
        }
    }

    // URL'yi LocalStorage'a kaydet
    function saveUrls() {
        const inputVal = document.getElementById('baseUrlInput').value.trim();
        if (inputVal && inputVal.startsWith('http')) {
            baseUrl = inputVal;
            localStorage.setItem('macrodroid_base_url', baseUrl);
            toggleSettings(); // Paneli kapat
            showLog("URL Başarıyla Kaydedildi", "var(--cls-success)");
        } else {
            showLog("Geçersiz URL Formatı!", "var(--cls-danger)");
            // Input'u salla (Hata efekti)
            const input = document.getElementById('baseUrlInput');
            input.style.borderColor = 'var(--cls-danger)';
            input.style.transform = 'translateX(5px)';
            setTimeout(() => input.style.transform = 'translateX(-5px)', 100);
            setTimeout(() => input.style.transform = 'translateX(0)', 200);
            setTimeout(() => input.style.borderColor = 'rgba(255,255,255,0.08)', 1000);
        }
    }

    // Durum çubuğuna mesaj yaz
    function showLog(message, color = "var(--cls-text-dim)") {
        const logElement = document.getElementById('log');
        if (logElement) {
            logElement.innerText = message.toUpperCase();
            logElement.style.color = color;
            // Eğer başarı veya hata ise, 3 saniye sonra normale döndür
            if (color !== "var(--cls-text-dim)") {
                setTimeout(() => showLog("SİSTEM HAZIR"), 3000);
            }
        }
    }

    // Komutu MacroDroid'e gönder
    function gonder(komut) {
        if (!baseUrl) {
            return showLog("HATA: URL Ayarlanmadı!", "var(--cls-danger)");
        }

        // İstek yapısı: baseUrl?title=media&body=komut
        const finalUrl = `${baseUrl}?title=media&body=${komut}`;
        
        showLog(`${komut} Komutu Gönderiliyor...`, "var(--cls-accent)");

        // Fetch isteği (mode: no-cors, MacroDroid genelde yanıt dönmez)
        fetch(finalUrl, { mode: 'no-cors', cache: 'no-cache' })
            .then(() => {
                showLog("KOMUT BAŞARILI", "var(--cls-success)");
            })
            .catch((error) => {
                console.error('İstek Hatası:', error);
                showLog("BAĞLANTI HATASI!", "var(--cls-danger)");
            });
    }
</script>

</body>
</html>
