<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MacroDroid Media Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- MODERN DEĞİŞKENLER & SIFIRLAMA --- */
        :root {
            --cls-bg-dark: #06070a;
            --cls-accent: #00f2fe;
            --cls-accent-rgb: 0, 242, 254;
            --cls-danger: #ff0055;
            --cls-success: #00ff88;
            --cls-panel-bg: rgba(10, 11, 16, 0.75);
            --cls-panel-border: rgba(255, 255, 255, 0.06);
            --cls-font-main: 'Inter', sans-serif;
            --cls-text-main: #ffffff;
            --cls-text-dim: #8892b0;
            --cls-ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--cls-bg-dark);
            color: var(--cls-text-main);
            font-family: var(--cls-font-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- ARKA PLAN ANİMASYONU --- */
        body::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at center, rgba(var(--cls-accent-rgb), 0.15) 0%, rgba(6, 7, 10, 0) 70%);
            animation: auraPulse 10s infinite alternate var(--cls-ease);
            z-index: -1;
        }

        @keyframes auraPulse {
            0% { transform: translate(-25%, -25%) scale(1); opacity: 0.5; }
            100% { transform: translate(-15%, -15%) scale(1.1); opacity: 0.8; }
        }

        /* --- ANA PANEL --- */
        .panel {
            background: var(--cls-panel-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--cls-panel-border);
            border-radius: 40px;
            padding: 50px 35px 35px 35px;
            width: 360px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5), 0 0 50px rgba(var(--cls-accent-rgb), 0.08);
            position: relative;
            z-index: 10;
            transition: transform 0.4s var(--cls-ease), box-shadow 0.4s var(--cls-ease);
        }

        .panel.settings-active {
            transform: scale(0.97);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6);
        }

        h2 {
            font-weight: 700;
            font-size: 24px;
            margin: 0 0 40px 0;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        /* --- BUTONLAR --- */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        button {
            font-family: var(--cls-font-main);
            font-weight: 500;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--cls-text-main);
            border-radius: 24px;
            padding: 22px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s var(--cls-ease);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(var(--cls-accent-rgb), 0.3);
            transform: translateY(-3px);
        }

        .btn-main { grid-column: span 2; color: var(--cls-accent); background: rgba(var(--cls-accent-rgb), 0.06); }
        .btn-vol { color: var(--cls-success); border-color: rgba(0, 255, 136, 0.15); }

        /* --- AYARLAR --- */
        .settings-btn {
            background: transparent; border: none; position: absolute; top: 25px; right: 25px;
            color: var(--cls-text-dim); cursor: pointer; transition: all 0.4s var(--cls-ease); font-size: 22px;
        }
        .settings-btn:hover { color: var(--cls-accent); transform: rotate(90deg); }

        .settings-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #08090d; border-radius: 40px; z-index: 50; padding: 50px 30px;
            flex-direction: column; opacity: 0; transform: translateY(20px); transition: all 0.4s var(--cls-ease);
        }
        .settings-overlay.show { display: flex; opacity: 1; transform: translateY(0); }

        input {
            width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 18px; border-radius: 18px; color: #fff; margin-bottom: 20px;
        }

        .save-btn { background: var(--cls-accent); color: #000; font-weight: 700; width: 100%; margin-top: auto; border:none; }

        .status-bar { margin-top: 35px; font-size: 11px; color: var(--cls-text-dim); text-align: center; letter-spacing: 2px; }

        /* --- FOOTER ENTEGRASYONU --- */
        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--cls-text-dim);
            opacity: 0.7;
            z-index: 10;
            letter-spacing: 0.5px;
        }

        footer b {
            color: var(--cls-accent);
            text-shadow: 0 0 10px rgba(var(--cls-accent-rgb), 0.3);
        }

        footer a {
            text-decoration: none;
            color: inherit;
            transition: color 0.3s ease;
        }

        footer a:hover b {
            color: #fff;
        }

        .fade-out { opacity: 0; transform: scale(0.9); pointer-events: none; }
    </style>
</head>
<body>

<div class="panel" id="mainPanel">
    <button class="settings-btn" onclick="toggleSettings()" title="Ayarlar">⚙️</button>

    <div id="mainContent">
        <h2>Media Control Pro</h2>
        <div class="btn-grid">
            <button class="btn-main" onclick="gonder('play')">⏯ Play / Pause</button>
            <button onclick="gonder('back')" title="Önceki">⏮</button>
            <button onclick="gonder('next')" title="Sonraki">⏭</button>
            <button class="btn-vol" onclick="gonder('vol_up')">VOL +</button>
            <button class="btn-vol" onclick="gonder('vol_down')">VOL -</button>
        </div>
        <div id="log" class="status-bar">SYSTEM READY</div>
    </div>

    <div id="settingsPanel" class="settings-overlay">
        <h3>Settings</h3>
        <label style="font-size:11px; color:var(--cls-accent); font-weight:700; margin-bottom:10px; display:block; text-transform:uppercase;">Webhook URL</label>
        <input type="text" id="baseUrlInput" placeholder="https://trigger.macrodroid.com/...">
        <button class="save-btn" onclick="saveUrls()">SAVE SETTINGS</button>
    </div>
</div>

<footer>
    <p>Tüm hakları saklıdır. &copy; 2026 <a href="https://github.com/cemal201138" target="_blank"><b>Cemal Evli</b></a></p>
</footer>

<script>
    let baseUrl = "";
    const mainPanel = document.getElementById('mainPanel');
    const settingsPanel = document.getElementById('settingsPanel');
    const mainContent = document.getElementById('mainContent');

    window.onload = () => {
        const saved = localStorage.getItem('macrodroid_base_url');
        if (saved) {
            baseUrl = saved;
            document.getElementById('baseUrlInput').value = baseUrl;
        }
    };

    function toggleSettings() {
        if (settingsPanel.classList.contains('show')) {
            settingsPanel.classList.remove('show');
            mainContent.classList.remove('fade-out');
            mainPanel.classList.remove('settings-active');
            setTimeout(() => { if(!settingsPanel.classList.contains('show')) settingsPanel.style.display = 'none'; }, 400);
        } else {
            settingsPanel.style.display = 'flex';
            mainPanel.classList.add('settings-active');
            setTimeout(() => {
                settingsPanel.classList.add('show');
                mainContent.classList.add('fade-out');
            }, 10);
        }
    }

    function saveUrls() {
        const inputVal = document.getElementById('baseUrlInput').value.trim();
        if (inputVal.startsWith('http')) {
            baseUrl = inputVal;
            localStorage.setItem('macrodroid_base_url', baseUrl);
            toggleSettings();
            showLog("Settings Saved", "var(--cls-success)");
        } else {
            showLog("Invalid URL!", "var(--cls-danger)");
        }
    }

    function showLog(message, color = "var(--cls-text-dim)") {
        const logElement = document.getElementById('log');
        logElement.innerText = message.toUpperCase();
        logElement.style.color = color;
        if (color !== "var(--cls-text-dim)") {
            setTimeout(() => { logElement.innerText = "SYSTEM READY"; logElement.style.color = "var(--cls-text-dim)"; }, 3000);
        }
    }

    function gonder(komut) {
        if (!baseUrl) return showLog("URL Not Set!", "var(--cls-danger)");
        
        const finalUrl = `${baseUrl}?title=media&body=${komut}`;
        showLog(`Sending ${komut}...`, "var(--cls-accent)");

        fetch(finalUrl, { mode: 'no-cors', cache: 'no-cache' })
            .then(() => showLog("Success", "var(--cls-success)"))
            .catch(() => showLog("Error!", "var(--cls-danger)"));
    }
</script>

</body>
</html>
