<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemal Evli - Linklerim</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 70%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: rgba(20, 20, 35, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .profile-section {
            text-align: center;
            padding: 40px 30px 25px;
            background: linear-gradient(135deg, #1e1b4b 0%, #2a1d5c 50%, #3b1f72 100%);
            color: #f7fafc;
            position: relative;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .profile-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
            z-index: 0;
        }

        .profile-section > * {
            position: relative;
            z-index: 1;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.12);
            overflow: hidden;
            border: 4px solid rgba(255,255,255,0.25);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
        }

        .profile-avatar:hover {
            transform: scale(1.05);
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: block;
        }

        /* Varsayılan ikon - resim yüklenmezse görünür */
        .profile-avatar::before {
            content: '\f007';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 2.5rem;
            color: #f7fafc;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        /* Resim yüklendiğinde ikon gizlenir */
        .profile-avatar.has-image::before {
            display: none;
        }

        .profile-name {
            font-size: clamp(1.4rem, 4vw, 1.8rem);
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 15px rgba(0,0,0,0.9);
            background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .profile-bio {
            font-size: clamp(0.85rem, 2.8vw, 0.95rem);
            font-weight: 400;
            color: #e2e8f0;
            text-shadow: 0 1px 8px rgba(0,0,0,0.9);
            line-height: 1.5;
            opacity: 1;
            max-width: 90%;
            margin: 0 auto;
            word-break: break-word;
        }

        .bio-link {
            color: #a0a0ff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            border-radius: 4px;
            padding: 1px 3px;
            position: relative;
        }

        .bio-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #a0a0ff, transparent);
            transition: width 0.3s ease;
        }

        .bio-link:hover {
            color: #c0c0ff;
            text-shadow: 0 0 8px rgba(160, 160, 255, 0.6);
        }

        .bio-link:hover::after {
            width: 100%;
        }

        .links-section {
            padding: 30px;
        }

        .link-item {
            display: block;
            margin-bottom: 15px;
            padding: 20px 25px;
            background: linear-gradient(135deg, #2d3748 0%, #4a5568 100%);
            color: #e2e8f0;
            text-decoration: none;
            border-radius: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.12);
            font-size: clamp(0.95rem, 3.5vw, 1rem);
        }

        .link-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: left 0.5s;
        }

        .link-item:hover::before {
            left: 100%;
        }

        .link-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #4a5568 0%, #718096 100%);
            border-color: rgba(255,255,255,0.25);
            color: #f7fafc;
        }

        .link-icon {
            width: 24px;
            margin-right: 15px;
            font-size: 1.2rem;
            color: #a0aec0;
        }

        .link-item:hover .link-icon {
            color: #f7fafc;
        }

        .link-text {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .link-arrow {
            font-size: 1rem;
            opacity: 0.85;
            transition: all 0.3s ease;
        }

        .link-item:hover .link-arrow {
            transform: translateX(5px);
        }

        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: clamp(0.8rem, 2.5vw, 0.9rem);
            margin-top: auto;
            padding: 25px 20px;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 480px) {
            .container { margin: 10px; border-radius: 20px; }
            .profile-section { padding: 35px 25px 25px; }
            .links-section { padding: 25px 20px; }
            .link-item { padding: 18px 22px; }
        }

        @media (max-width: 360px) {
            .profile-section { padding: 30px 20px 20px; }
            .links-section { padding: 20px 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-section">
            <div class="profile-avatar" id="profileAvatar">
                <!-- Profil resmi buraya yüklenecek -->
            </div>
            <h1 class="profile-name">Cemal Evli</h1>
            <div class="profile-bio" id="profileBio">
                <div style="text-align:center;color:#a0aec0;font-size:0.8rem;padding:10px;">
                    <i class="fas fa-spinner fa-spin"></i> Biography yükleniyor...
                </div>
            </div>
        </div>
        <div class="links-section">
            <a href="https://www.instagram.com/imcemalevli/" class="link-item" target="_blank">
                <div class="link-text">
                    <span><i class="fab fa-instagram link-icon"></i>Instagram</span>
                    <i class="fas fa-arrow-right link-arrow"></i>
                </div>
            </a>
            <a href="https://www.facebook.com/profile.php?id=100076601840154" class="link-item" target="_blank">
                <div class="link-text">
                    <span><i class="fab fa-facebook link-icon"></i>Facebook</span>
                    <i class="fas fa-arrow-right link-arrow"></i>
                </div>
            </a>
            <a href="https://github.com/cemal201138" class="link-item" target="_blank">
                <div class="link-text">
                    <span><i class="fab fa-github link-icon"></i>GitHub</span>
                    <i class="fas fa-arrow-right link-arrow"></i>
                </div>
            </a>
            <a href="https://cemalevli.qzz.io/Portfolio_Site/" class="link-item" target="_blank">
                <div class="link-text">
                    <span><i class="fas fa-globe link-icon"></i>Portfolio</span>
                    <i class="fas fa-arrow-right link-arrow"></i>
                </div>
            </a>
        </div>
    </div>

    <div class="footer">
        <p>💙 Cemal Evli</p>
    </div>

    <script>
        // 1. PROFİL RESMİ - YAMUK SORUNU ÇÖZÜLDÜ
        function loadProfileImage() {
            const avatar = document.getElementById('profileAvatar');
            const img = document.createElement('img');
            
            img.src = 'https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/My_Social_Media/profile.png';
            img.alt = 'Cemal Evli';
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'cover';
            img.style.borderRadius = '50%';
            img.style.display = 'block';
            
            img.onload = () => {
                // Eski içeriği temizle
                avatar.innerHTML = '';
                // Resmi ekle
                avatar.appendChild(img);
                // has-image class'ını ekle (ikonu gizler)
                avatar.classList.add('has-image');
            };
            
            img.onerror = () => {
                // Hata durumunda ikon kalır, class eklenmez
                console.log('Profil resmi yüklenemedi, varsayılan ikon kullanılıyor');
            };
        }

        // 2. BIYOGRAFI - DÜZELTİLDİ
        async function loadBiography() {
            const bioElement = document.getElementById('profileBio');
            try {
                const response = await fetch('https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/My_Social_Media/biography');
                const data = await response.json();
                
                if (data.bio && Array.isArray(data.bio)) {
                    const parsedHtml = parseBiographyLines(data.bio);
                    bioElement.innerHTML = parsedHtml;
                } else {
                    bioElement.innerHTML = '<span style="color:#a0aec0;font-size:0.85rem;">Biyografi verisi bulunamadı</span>';
                }
            } catch (error) {
                console.error('Biyografi yükleme hatası:', error);
                bioElement.innerHTML = '<span style="color:#a0aec0;font-size:0.85rem;">Biography yüklenemedi</span>';
            }
        }

        // BIYOGRAFI PARSE FONKSİYONU - DÜZELTİLDİ
        function parseBiographyLines(lines) {
            return lines.map(line => {
                // @kullanici$(link$) formatını bul ve link yap
                let parsed = line.replace(/@(\w+)\$\$(https?:\/\/[^\$]+)\$\$/g, '<a href="$2" target="_blank" class="bio-link">@$1</a>')
                                // #hashtag$(link$) formatını bul ve link yap
                                .replace(/#(\w+)\$\$(https?:\/\/[^\$]+)\$\$/g, '<a href="$2" target="_blank" class="bio-link">#$1</a>');
                return parsed;
            }).join('<br>');
        }

        // Sayfa yüklendiğinde
        window.addEventListener('load', () => {
            loadProfileImage();
            loadBiography();
            
            // Animasyon
            const container = document.querySelector('.container');
            container.style.opacity = '0';
            container.style.transform = 'translateY(20px)';
            setTimeout(() => {
                container.style.transition = 'all 0.6s ease';
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 300);
        });

        // Link hover efektleri
        document.querySelectorAll('.link-item').forEach(link => {
            link.addEventListener('mouseenter', () => {
                link.style.transform = 'translateY(-3px) scale(1.02)';
            });
            link.addEventListener('mouseleave', () => {
                link.style.transform = 'translateY(0) scale(1)';
            });
        });
    </script>
</body>
</html>
