<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oyun Kütüphanesi</title>
    <link rel="icon" type="image/x-icon" href="gamesite.ico">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Yan Menü (Oyun Listesi ve Arama) */
        #sidebar {
            width: 320px;
            background-color: var(--card-bg);
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: all 0.3s ease;
        }

        /* Tam ekrandayken yan menüyü gizle */
        body.fullscreen-mode #sidebar {
            width: 0;
            border-right: none;
            overflow: hidden;
        }

        .search-container {
            padding: 20px;
            border-bottom: 1px solid #334155;
        }

        .search-container h2 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: var(--accent-color);
        }

        #search-input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #475569;
            background-color: var(--bg-color);
            color: var(--text-color);
            outline: none;
        }

        #search-input:focus {
            border-color: var(--accent-color);
        }

        #games-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            padding: 10px;
        }

        .game-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
        }

        .game-item:hover {
            background-color: rgba(59, 130, 246, 0.1);
            border-color: var(--accent-color);
        }

        .game-item.active {
            background-color: var(--accent-color);
            color: white;
        }

        .game-item .game-name {
            font-weight: 600;
            display: block;
            text-transform: capitalize;
        }

        /* Ana İçerik Alanı (Oyun Ekranı / iframe) */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: #020617;
            position: relative;
        }

        #game-header {
            padding: 15px 20px;
            background-color: var(--card-bg);
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Tam Ekran Buton Stili */
        #fullscreen-btn {
            background-color: #334155;
            color: var(--text-color);
            border: 1px solid #475569;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: background 0.2s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #fullscreen-btn:hover {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }

        #game-frame {
            width: 100%;
            flex: 1;
            border: none;
            background-color: #000;
        }

        .placeholder-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-muted);
        }

        .placeholder-text h3 {
            margin-bottom: 10px;
            color: var(--text-color);
        }

        #loading {
            padding: 20px;
            text-align: center;
            color: var(--text-muted);
        }

        /* Kaydırma Çubuğu Özelleştirme */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="search-container">
            <h2>Oyun Arşivi</h2>
            <input type="text" id="search-input" placeholder="Oyun ara...">
        </div>
        <div id="loading">Oyunlar yükleniyor...</div>
        <ul id="games-list"></ul>
    </div>

    <div id="main-content">
        <div id="game-placeholder" class="placeholder-text">
            <h3>Kütüphaneye Hoş Geldiniz</h3>
            <p>Oynamak istediğiniz oyunu sol taraftaki listeden seçin.</p>
        </div>
        <div id="game-header" style="display: none;">
            <h2 id="current-game-title">Oyun Adı</h2>
            <div class="header-controls">
                <span id="game-status" style="font-size: 0.85rem; color: var(--text-muted);">Yükleniyor...</span>
                <button id="fullscreen-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                    <span>Tam Ekran</span>
                </button>
            </div>
        </div>
        <iframe id="game-frame" style="display: none;" allowfullscreen></iframe>
    </div>

    <script>
        // GitHub API ve Repository Bilgileri
        const owner = "cemal201138";
        const repo = "My_Netlify_SitesApps";
        const path = "htmlgames/htmlgamesfolder";
        
        const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

        let allGames = [];

        // GitHub API'den klasör/dosya yapısını çekme
        async function fetchGames() {
            const loadingEl = document.getElementById('loading');
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('API isteği başarısız oldu.');
                
                const data = await response.json();
                
                // .html uzantılı dosyaları veya doğrudan alt klasörleri listele
                allGames = data.filter(item => item.type === 'dir' || item.name.endsWith('.html')).map(item => {
                    let cleanName = item.name.replace('.html', '').replace(/[-_]/g, ' ');
                    
                    // Eğer bir klasörse, içerisindeki index.html dosyasının indirileceği GitHub API URL'sini kurgula
                    let downloadUrl = item.download_url;
                    if (item.type === 'dir') {
                        downloadUrl = `https://raw.githubusercontent.com/${owner}/${repo}/main/${path}/${item.name}/index.html`;
                    }

                    return {
                        name: cleanName,
                        url: downloadUrl
                    };
                });

                loadingEl.style.display = 'none';
                renderGames(allGames);

            } catch (error) {
                console.error('Hata:', error);
                loadingEl.innerText = "Oyun listesi yüklenemedi. API limiti dolmuş olabilir.";
            }
        }

        // Oyunları Yan Menüye Listeleme
        function renderGames(games) {
            const gamesListEl = document.getElementById('games-list');
            gamesListEl.innerHTML = '';

            if(games.length === 0) {
                gamesListEl.innerHTML = '<li style="padding:10px; color:var(--text-muted);">Oyun bulunamadı.</li>';
                return;
            }

            games.forEach((game) => {
                const li = document.createElement('li');
                li.className = 'game-item';
                li.innerHTML = `<span class="game-name">${game.name}</span>`;
                li.addEventListener('click', () => selectGame(game, li));
                gamesListEl.appendChild(li);
            });
        }

        // Oyuna Tıklanınca HTML Kodunu Çekip iframe'e Gömme Fonksiyonu
        async function selectGame(game, element) {
            // Aktif menü tasarımı değişimi
            document.querySelectorAll('.game-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            // Görünüm alanlarını ayarlama
            document.getElementById('game-placeholder').style.display = 'none';
            document.getElementById('game-header').style.display = 'flex';
            document.getElementById('current-game-title').innerText = game.name;
            
            const statusEl = document.getElementById('game-status');
            const iframe = document.getElementById('game-frame');
            
            statusEl.innerText = "Kaynak kodlar çekiliyor...";
            statusEl.style.color = "var(--text-muted)";
            iframe.style.display = 'none';

            try {
                // HTML kodunu doğrudan text olarak fetch ile talep ediyoruz
                const response = await fetch(game.url);
                if (!response.ok) throw new Error("Oyun kodları indirilemedi.");
                
                const htmlContent = await response.text();
                
                // Çekilen HTML içeriğini srcdoc özelliğini kullanarak iframe içine enjekte ediyoruz
                iframe.srcdoc = htmlContent;
                iframe.style.display = 'block';
                statusEl.innerText = "Hazır";
                statusEl.style.color = "#22c55e"; // Yeşil renk

                // Klavye odağını otomatik olarak iframe'e ver (Oyun tuşlarının çalışması için)
                iframe.onload = () => {
                    iframe.contentWindow.focus();
                };

            } catch (error) {
                console.error("Oyun yükleme hatası:", error);
                statusEl.innerText = "Oyun yüklenirken hata oluştu!";
                statusEl.style.color = "#ef4444"; // Kırmızı renk
            }
        }

        // Canlı Arama Fonksiyonu
        document.getElementById('search-input').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredGames = allGames.filter(game => game.name.toLowerCase().includes(searchTerm));
            renderGames(filteredGames);
        });

        // --- TAM EKRAN FONKSİYONLARI ---
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const mainContent = document.getElementById('main-content');

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                // Tam ekrana geçiş (Farklı tarayıcı destekleri ile)
                if (mainContent.requestFullscreen) {
                    mainContent.requestFullscreen();
                } else if (mainContent.webkitRequestFullscreen) { /* Safari */
                    mainContent.webkitRequestFullscreen();
                } else if (mainContent.msRequestFullscreen) { /* IE11 */
                    mainContent.msRequestFullscreen();
                }
            } else {
                // Tam ekrandan çıkış
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
            }
        });

        // Tarayıcının tam ekran değişim durumunu izleme (ESC tuşu dahil)
        document.addEventListener('fullscreenchange', handleFullscreenChange);
        document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
        document.addEventListener('msfullscreenchange', handleFullscreenChange);

        function handleFullscreenChange() {
            const btnText = fullscreenBtn.querySelector('span');
            const btnIcon = fullscreenBtn.querySelector('svg');

            if (document.fullscreenElement) {
                // Tam ekrana girildiğinde
                document.body.classList.add('fullscreen-mode');
                btnText.innerText = "Normal Ekran";
                btnIcon.innerHTML = '<path d="M4 14h6v6m10-6h-6v6M4 10h6V4m10 6h-6V4"></path>'; // Çıkış ikonu
                
                // Oyunun klavye kontrollerini kaçırmamak için iframe odağını tazele
                const iframe = document.getElementById('game-frame');
                if(iframe) iframe.contentWindow.focus();
            } else {
                // Tam ekrandan çıkıldığında
                document.body.classList.remove('fullscreen-mode');
                btnText.innerText = "Tam Ekran";
                btnIcon.innerHTML = '<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>'; // Giriş ikonu
            }
        }

        // Sayfa hazır olduğunda çalıştır
        window.addEventListener('DOMContentLoaded', fetchGames);
    </script>
</body>
</html>
