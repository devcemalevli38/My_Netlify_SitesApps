<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemal Evli | Raw Link Dönüştürücü</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --success-color: #10b981;
            --success-hover: #059669;
            --border-color: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(15, 23, 42, 0.6);
            --error-color: #f43f5e;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            backdrop-filter: blur(20px);
        }

        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            width: 90%;
            max-width: 550px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        h2 {
            margin-top: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
            margin-top: 10px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            box-sizing: border-box;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25), inset 0 2px 4px rgba(0,0,0,0.2);
        }

        input[type="text"]::placeholder {
            color: #475569;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .result-container {
            margin-top: 24px;
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-box {
            display: flex;
            align-items: center;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 14px;
            margin-top: 8px;
        }

        .result-url {
            flex-grow: 1;
            font-family: 'Fira Code', ui-monospace, monospace;
            font-size: 13px;
            color: #cbd5e1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 12px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background-color: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .open-btn {
            color: #60a5fa;
        }

        .open-btn:hover {
            background-color: rgba(96, 165, 250, 0.15);
            border-color: rgba(96, 165, 250, 0.3);
        }

        .copy-btn.success {
            background-color: var(--success-color);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.4);
        }

        .copy-btn.success:hover {
            background-color: var(--success-hover);
        }

        .error-msg {
            color: var(--error-color);
            font-size: 13px;
            font-weight: 500;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>GitHub Raw Link Dönüştürücü</h2>
    
    <div class="input-group">
        <label for="githubUrl">GitHub Dosya Linki</label>
        <input type="text" id="githubUrl" placeholder="https://github.com/kullanici/repo/blob/main/dosya.txt" autocomplete="off">
        <div id="errorMsg" class="error-msg">Lütfen geçerli bir GitHub dosya linki girin (blob içermelidir).</div>
    </div>
    
    <button class="btn" onclick="convertLink()">Raw Linke Dönüştür</button>

    <div id="resultContainer" class="result-container">
        <label>Oluşturulan Raw Link</label>
        <div class="result-box">
            <span id="rawUrl" class="result-url"></span>
            <div class="action-buttons">
                <a id="openBtn" class="action-btn open-btn" target="_blank" rel="noopener noreferrer">Aç</a>
                <button id="copyBtn" class="action-btn copy-btn" onclick="copyToClipboard()">Kopyala</button>
            </div>
        </div>
    </div>
</div>

<script>
    function convertLink() {
        const inputUrl = document.getElementById('githubUrl').value.trim();
        const errorMsg = document.getElementById('errorMsg');
        const resultContainer = document.getElementById('resultContainer');
        const rawUrlSpan = document.getElementById('rawUrl');
        const openBtn = document.getElementById('openBtn');
        const copyBtn = document.getElementById('copyBtn');

        // Varsayılan buton durumunu sıfırla
        copyBtn.innerText = "Kopyala";
        copyBtn.classList.remove('success');

        if (inputUrl.includes('github.com/') && inputUrl.includes('/blob/')) {
            errorMsg.style.display = 'none';
            
            let rawUrl = inputUrl
                .replace('github.com', 'raw.githubusercontent.com')
                .replace('/blob/', '/');

            rawUrlSpan.innerText = rawUrl;
            rawUrlSpan.title = rawUrl; 
            
            openBtn.href = rawUrl;
            
            resultContainer.style.display = 'block';
        } else {
            errorMsg.style.display = 'block';
            resultContainer.style.display = 'none';
        }
    }

    function copyToClipboard() {
        const rawUrl = document.getElementById('rawUrl').innerText;
        const copyBtn = document.getElementById('copyBtn');

        navigator.clipboard.writeText(rawUrl).then(() => {
            copyBtn.innerText = "Kopyalandı!";
            copyBtn.classList.add('success');
            
            setTimeout(() => {
                copyBtn.innerText = "Kopyala";
                copyBtn.classList.remove('success');
            }, 2000);
        }).catch(err => {
            console.error('Kopyalama başarısız oldu: ', err);
            alert('Kopyalanamadı, lütfen manuel olarak seçip kopyalayın.');
        });
    }

    document.getElementById('githubUrl').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            convertLink();
        }
    });
</script>

</body>
</html>
