<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextDNS Denylist Ekleme Aracı</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:900px;
    margin:40px auto;
    padding:20px;
}

input,textarea{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    box-sizing:border-box;
}

button{
    padding:12px 20px;
    background:#0078d7;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#005fa3;
}

#log{
    margin-top:20px;
    background:#f4f4f4;
    padding:15px;
    height:400px;
    overflow:auto;
    white-space:pre-wrap;
    border:1px solid #ddd;
}

.success{
    color:green;
}

.error{
    color:red;
}
</style>
</head>
<body>

<h2>NextDNS Toplu Denylist Ekleme</h2>

<label>Profile ID</label>
<input id="profileId" placeholder="57c9df">

<label>API Key</label>
<input id="apiKey" type="password">

<label>Domainler (her satıra bir tane)</label>
<textarea id="domains" rows="15">
ads.linkedin.com
analytics.pointdrive.linkedin.com
ads.pinterest.com
log.pinterest.com
trk.pinterest.com
events.reddit.com
events.redditmedia.com
ads.youtube.com
ads.tiktok.com
analytics.tiktok.com
</textarea>

<button onclick="startImport()">Denylist'e Ekle</button>

<div id="log"></div>

<script>

function sleep(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
}

function log(message,color="black"){
    const div=document.createElement("div");
    div.textContent=message;
    div.style.color=color;
    document.getElementById("log").appendChild(div);
    document.getElementById("log").scrollTop=
        document.getElementById("log").scrollHeight;
}

async function startImport(){

    const profileId=document.getElementById("profileId").value.trim();
    const apiKey=document.getElementById("apiKey").value.trim();

    const domains=document
        .getElementById("domains")
        .value
        .split("\n")
        .map(x=>x.trim())
        .filter(Boolean);

    if(!profileId){
        alert("Profile ID giriniz");
        return;
    }

    if(!apiKey){
        alert("API Key giriniz");
        return;
    }

    document.getElementById("log").innerHTML="";

    let success=0;
    let failed=0;

    for(const domain of domains){

        try{

            const response=await fetch(
                `https://api.nextdns.io/profiles/${profileId}/denylist`,
                {
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json",
                        "X-Api-Key":apiKey
                    },
                    body:JSON.stringify({
                        id:domain
                    })
                }
            );

            if(response.ok){

                success++;
                log(`✓ ${domain} başarıyla eklendi`,`green`);

            }else{

                const text=await response.text();

                failed++;
                log(
                    `✗ ${domain} hata: ${text}`,
                    `red`
                );
            }

        }catch(err){

            failed++;
            log(
                `✗ ${domain} hata: ${err.message}`,
                `red`
            );

        }

        await sleep(1000);
    }

    log("");
    log(`Tamamlandı. Başarılı: ${success} | Hatalı: ${failed}`,"blue");

    alert("İşlem tamamlandı.");
}

</script>

</body>
</html>
