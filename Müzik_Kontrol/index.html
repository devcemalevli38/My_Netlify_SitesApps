<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medya Kontrol Pro</title>
    
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/M%C3%BCzik_Kontrol/app_icon.ico">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/M%C3%BCzik_Kontrol/app_icon.ico">

    <style>
        :root {
            --bg: #0b0f14;
            --panel: #121a25;
            --accent: #243449;
            --accent-hover: #2c3e56;
            --text: #f1f1f1;
            --muted: #9aa4b2;
        }

        * { 
            box-sizing: border-box; 
            -webkit-touch-callout: none;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, #1b2735, #0b0f14);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
            color: var(--text);
            overflow: hidden; 
            user-select: none;
            -webkit-user-select: none;
        }

        .card {
            background: linear-gradient(180deg, #141e2b, #0f1621);
            border-radius: 26px;
            box-shadow: 0 30px 80px rgba(0,0,0,.7);
            padding: 30px;
            width: 360px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 26px;
        }

        .player, .volume-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: #1a2635;
            color: var(--text);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all .15s ease;
            display: flex; 
            align-items: center; 
            justify-content: center;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .player button { width: 60px; height: 60px; font-size: 22px; }
        
        .play { 
            width: 85px !important; 
            height: 85px !important; 
            background: #243449 !important; 
            color: var(--text) !important; 
            font-size: 32px !important;
            border: 1px solid #2c3e56 !important;
        }

        .volume-controls button { width: 60px; height: 60px; font-size: 22px; background: #1a2635; }
        
        .mute-btn { 
            width: 110px !important; 
            border-radius: 20px !important; 
            font-size: 14px !important; 
            font-weight: bold;
            background: #243449 !important;
        }

        button:active { 
            transform: scale(.9); 
            background: #2c3e56 !important;
        }

        .volume-section-title {
            text-align: center;
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .settings { 
            display: none; 
            padding-top: 15px; 
            border-top: 1px solid #333; 
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .settings input { 
            width: 100%; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            margin-bottom: 10px; 
            background: #000; 
            color: #fff; 
            outline: none;
        }

        .settings button { 
            width: 100%; 
            border-radius: 8px; 
            padding: 12px; 
            background: #243449; 
            color: white; 
            font-weight: bold;
            height: auto; 
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 style="font-weight: 500; font-size: 1.2rem;">Medya Kontrol</h2>
        <button style="background:none; box-shadow:none; font-size: 20px;" onclick="toggleSettings()">⚙️</button>
    </div>

    <div class="player">
        <button onclick="sendCommand('media', 'prev')">⏮</button>
        <button class="play" onclick="sendCommand('media', 'play')">⏯</button>
        <button onclick="sendCommand('media', 'next')">⏭</button>
    </div>

    <div class="volume-section-title">Sistem Sesi</div>
    
    <div class="volume-controls">
        <button onclick="sendCommand('media', 'voldown')" title="Sesi Kıs">🔉</button>
        <button class="mute-btn" onclick="sendCommand('media', 'mute')">SESSİZ</button>
        <button onclick="sendCommand('media', 'volup')" title="Sesi Aç">🔊</button>
    </div>

    <div class="settings" id="settings">
        <input id="serverInput" placeholder="Sunucu URL">
        <button onclick="saveServer()">Kaydet</button>
    </div>
</div>

<script>
    let serverUrl = localStorage.getItem("serverUrl") || "";
    document.getElementById("serverInput").value = serverUrl;

    function toggleSettings() {
        const s = document.getElementById("settings");
        s.style.display = s.style.display === "block" ? "none" : "block";
    }

    function saveServer() {
        const val = document.getElementById("serverInput").value.trim();
        serverUrl = val;
        localStorage.setItem("serverUrl", serverUrl);
        alert("Ayarlar Kaydedildi!");
        toggleSettings();
    }

    function sendCommand(title, body) {
        if (!serverUrl) {
            alert("Lütfen sunucu adresini girin!");
            toggleSettings();
            return;
        }
        let baseUrl = serverUrl.endsWith('/') ? serverUrl.slice(0, -1) : serverUrl;
        fetch(`${baseUrl}/komut?title=${title}&body=${body}`, {
            mode: 'no-cors',
            cache: 'no-cache'
        }).catch(e => console.error("Hata:", e));
    }
</script>

</body>
</html>
