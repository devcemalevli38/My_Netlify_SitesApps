<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medya Kontrol Pro</title>
    
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/M%C3%BCzik_Kontrol/app_icon.ico">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/M%C3%BCzik_Kontrol/app_icon.ico">

    <style>
        :root {
            --bg: #0b0f14;
            --panel: #121a25;
            --accent: #243449;
            --text: #f1f1f1;
            --muted: #9aa4b2;
            --success: #2e7d32;
            --error: #b71c1c;
            --link-accent: #38bdf8;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
            transition: all 0.2s ease;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, #1b2735, #0b0f14);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
            color: var(--text);
            overflow-x: hidden;
            padding: 20px;
        }

        .card {
            background: linear-gradient(180deg, #141e2b, #0f1621);
            border-radius: 26px;
            box-shadow: 0 30px 80px rgba(0,0,0,.7);
            padding: 30px;
            width: 100%;
            max-width: 360px;
            border: 1px solid rgba(255,255,255,0.05);
            z-index: 2;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 26px;
        }

        .connection-status {
            text-align: center;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 12px;
            margin-bottom: 20px;
            color: var(--muted);
            border: 1px solid rgba(255,255,255,0.02);
        }

        .connection-status span {
            font-weight: bold;
        }

        .status-online { color: #4caf50; }
        .status-offline { color: #f44336; }

        .player, .volume-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: #1a2635;
            color: var(--text);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: flex; 
            align-items: center; 
            justify-content: center;
            position: relative;
        }

        button * { pointer-events: none; }

        .player button { width: 60px; height: 60px; font-size: 22px; }
        
        .play { 
            width: 85px !important; 
            height: 85px !important; 
            background: #243449 !important; 
            font-size: 32px !important;
            border: 1px solid #2c3e56 !important;
        }

        .volume-controls button { width: 60px; height: 60px; font-size: 22px; }
        
        .mute-btn { 
            width: 110px !important; 
            border-radius: 20px !important; 
            font-size: 14px !important; 
            font-weight: bold;
            background: #243449 !important;
        }

        .url-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .url-input {
            flex: 1;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #000;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .url-input:focus { border-color: var(--muted); }

        .url-send-btn {
            width: 55px !important;
            height: 55px !important;
            border-radius: 15px !important;
            background: var(--accent) !important;
            font-size: 18px !important;
        }

        button:active { transform: scale(0.90) !important; }

        /* Düzeltme 11: Disabled buton stili */
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .volume-section-title {
            text-align: center;
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .settings { 
            display: none; 
            padding-top: 15px; 
            border-top: 1px solid #333; 
        }

        .settings input { 
            width: 100%; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            margin-bottom: 10px; 
            background: #000; 
            color: #fff; 
            font-size: 16px;
        }

        .disconnect-btn {
            background: var(--error) !important;
            color: #fff !important;
            border-radius: 6px !important;
            padding: 2px 8px;
            font-size: 10px !important;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: none !important;
            cursor: pointer;
            display: inline-block;
        }

        .device-list {
            margin-top: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 5px;
            max-height: 150px;
            overflow-y: auto;
        }

        .device-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
        }

        .device-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .device-item.active {
            background: var(--accent);
            border-left: 3px solid var(--link-accent);
        }

        /* Düzeltme 13: Cihaz silme butonu stili */
        .device-delete-btn {
            background: transparent !important;
            border: none !important;
            color: var(--error) !important;
            font-size: 14px !important;
            width: 28px !important;
            height: 28px !important;
            border-radius: 6px !important;
            box-shadow: none !important;
            cursor: pointer;
            flex-shrink: 0;
            padding: 0;
        }

        .device-delete-btn:hover {
            background: rgba(183, 28, 28, 0.2) !important;
        }

        /* Düzeltme 14: Toast bildirimi stili */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1e2d3d;
            color: var(--text);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: 0;
            z-index: 999;
            white-space: nowrap;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        #toast.success { border-color: #2e7d32; }
        #toast.error   { border-color: #b71c1c; }
        #toast.info    { border-color: var(--link-accent); }

        footer {
            margin-top: 40px;
            padding: 20px 0;
            width: 100%;
            max-width: 360px;
            text-align: center;
            font-size: 0.85rem;
            opacity: 0.8;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        footer b { color: var(--link-accent); }
        
        footer a {
            text-decoration: none;
            color: inherit;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: var(--link-accent);
        }
    </style>
</head>
<body>

<!-- Düzeltme 14: Toast bildirim kutusu -->
<div id="toast"></div>

<div class="card">
    <div class="header">
        <h2 style="font-weight: 500; font-size: 1.2rem; margin: 0;">Medya Kontrol Pro</h2>
        <div style="display: flex; gap: 5px;">
            <button style="background:none; box-shadow:none; font-size: 20px; width: 40px; height: 40px;" onclick="window.location.reload()" title="Bağlantıyı Yenile">🔄</button>
            <button style="background:none; box-shadow:none; font-size: 20px; width: 40px; height: 40px;" onclick="toggleSettings()" title="Cihaz Bağlantı Ayarları">📱</button>
        </div>
    </div>

    <div class="connection-status" id="connectionStatus">
        Bağlı Cihaz: <span id="activeDeviceName" class="status-offline">Seçilmedi</span>
    </div>

    <div class="player">
        <button onclick="sendCommand(this, 'media', 'prev')">⏮</button>
        <button class="play" onclick="sendCommand(this, 'media', 'play')">⏯</button>
        <button onclick="sendCommand(this, 'media', 'next')">⏭</button>
    </div>

    <div class="volume-section-title">Sistem Sesi</div>
    
    <div class="volume-controls">
        <button onclick="sendCommand(this, 'media', 'voldown')">🔉</button>
        <button class="mute-btn" onclick="sendCommand(this, 'media', 'mute')">SESSİZ</button>
        <button onclick="sendCommand(this, 'media', 'volup')">🔊</button>
    </div>

    <div class="volume-section-title">Tarayıcıda Aç</div>
    <div class="url-section">
        <input id="urlInput" class="url-input" type="text" placeholder="google.com veya link..." 
               onkeypress="handleKeyPress(event)">
        <button id="urlSendBtn" class="url-send-btn" onclick="handleUrlSend()">🚀</button>
    </div>

    <div class="settings" id="settings">
        <div class="volume-section-title" style="text-align:left; margin-bottom: 8px;">Yeni Cihaz Ekle</div>
        <input id="serverInput" type="text" placeholder="Örn: 192.168.1.49:5000">
        <button onclick="addNewDevice()" style="width:100%; border-radius:8px; height:40px; background:var(--accent); font-weight: bold; margin-bottom: 15px;">CİHAZI LİSTEYE EKLE</button>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <div class="volume-section-title" style="text-align:left; margin: 0;">Kullanılabilir Cihazlar</div>
            <button id="disconnectBtn" class="disconnect-btn" onclick="disconnectDevice()" style="display: none;">Bağlantıyı Kes</button>
        </div>
        <div class="device-list" id="deviceList"></div>
    </div>
</div>

<footer>
    <p>Tüm hakları saklıdır. &copy; 2026 <a href="https://github.com/cemal201138" target="_blank"><b>Cemal Evli</b></a></p>
</footer>

<script>
    let serverUrl = localStorage.getItem("serverUrl") || "";
    let devices = JSON.parse(localStorage.getItem("devices")) || [];

    // Düzeltme 10: Periyodik bağlantı kontrolü için interval ID
    let statusIntervalId = null;

    document.getElementById("serverInput").value = serverUrl ? serverUrl.replace(/^https?:\/\//, '') : "";
    
    finalizeUI();

    // --------------------------------------------------
    // Düzeltme 14: Toast bildirim fonksiyonu
    // --------------------------------------------------
    let toastTimer = null;
    function showToast(msg, type = "info", duration = 2500) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.className = "show " + type;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
            toast.className = "";
        }, duration);
    }

    // --------------------------------------------------
    // Düzeltme 8: AbortController ile fetch timeout yardımcı fonksiyonu
    // --------------------------------------------------
    function fetchWithTimeout(url, options = {}, timeoutMs = 5000) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        return fetch(url, { ...options, signal: controller.signal })
            .finally(() => clearTimeout(timer));
    }

    function toggleSettings() {
        const s = document.getElementById("settings");
        s.style.display = (s.style.display === "block") ? "none" : "block";
    }

    function finalizeUI() {
        renderDevices();
        checkDeviceStatus();
        startPeriodicStatusCheck(); // Düzeltme 10
    }

    // --------------------------------------------------
    // Düzeltme 10: Periyodik bağlantı kontrolü (30 sn)
    // --------------------------------------------------
    function startPeriodicStatusCheck() {
        if (statusIntervalId) clearInterval(statusIntervalId);
        statusIntervalId = setInterval(() => {
            if (!document.hidden) {  // Sekme gizliyse atla
                checkDeviceStatus();
            }
        }, 30000);

        // Sekme tekrar görünür olduğunda hemen kontrol et
        document.addEventListener("visibilitychange", () => {
            if (!document.hidden) checkDeviceStatus();
        });
    }

    // --------------------------------------------------
    // Düzeltme 9: XSS – cihaz adı güvenli şekilde gösterilir
    // --------------------------------------------------
    function safeText(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
    }

    function addNewDevice() {
        let val = document.getElementById("serverInput").value.trim();
        if (!val) { showToast("Lütfen geçerli bir IP ve Port girin!", "error"); return; }
        if (!val.startsWith('http')) val = 'http://' + val;

        // Düzeltme 8: Timeout ile fetch
        fetchWithTimeout(`${val}/cihaz-bilgisi`)
        .then(res => res.json())
        .then(data => {
            const targetUrl = `http://${data.yerel_ip}:${data.port}`;

            // Düzeltme 9: XSS engeli – cihaz adı güvenli şekilde işlenir
            const safeName = String(data.cihaz_adi || "").replace(/[<>"'&]/g, c =>
                ({ '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;', '&': '&amp;' }[c])
            );
            const safeIp = String(data.yerel_ip || "").replace(/[<>"'&]/g, c =>
                ({ '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;', '&': '&amp;' }[c])
            );

            const newDevice = { name: data.cihaz_adi, url: targetUrl };
            devices = devices.filter(d => d.url !== targetUrl);
            devices.push(newDevice);
            localStorage.setItem("devices", JSON.stringify(devices));
            
            selectDevice(targetUrl, data.cihaz_adi);
            // Düzeltme 9 + 14: alert() yerine güvenli toast kullan
            showToast(`✅ Eklendi: ${safeName} (${safeIp})`, "success", 3000);
        })
        .catch(err => {
            // Düzeltme 8: Timeout hatası ayrıca bildirilir
            if (err.name === "AbortError") {
                showToast("⏱ Bağlantı zaman aşımı!", "error");
            } else {
                showToast("❌ Cihaza bağlanılamadı! Flask çalışıyor mu?", "error", 3500);
            }
        });
    }

    // --------------------------------------------------
    // Düzeltme 13: Cihaz silme desteği eklendi
    // --------------------------------------------------
    function deleteDevice(url, e) {
        e.stopPropagation(); // Üst tıklama olayını engelle
        const wasActive = serverUrl && url.replace(/\/+$/, "") === serverUrl.replace(/\/+$/, "");
        devices = devices.filter(d => d.url !== url);
        localStorage.setItem("devices", JSON.stringify(devices));
        if (wasActive) {
            serverUrl = "";
            localStorage.removeItem("serverUrl");
            checkDeviceStatus();
        }
        renderDevices();
        showToast("🗑 Cihaz listeden silindi.", "info");
    }

    function renderDevices() {
        const listDiv = document.getElementById("deviceList");
        listDiv.innerHTML = "";
        
        if (devices.length === 0) {
            listDiv.innerHTML = `<div style="padding:10px; font-size:12px; color:var(--muted); text-align:center;">Kayıtlı cihaz yok.</div>`;
            document.getElementById("disconnectBtn").style.display = "none";
            return;
        }

        devices.forEach(d => {
            const isActive = serverUrl && d.url.replace(/\/+$/, "") === serverUrl.replace(/\/+$/, "");
            const item = document.createElement("div");
            item.className = `device-item ${isActive ? 'active' : ''}`;
            
            // Düzeltme 9: innerHTML yerine textContent kullanıldı (XSS güvenliği)
            const infoSpan = document.createElement("span");
            const nameEl = document.createElement("b");
            nameEl.textContent = d.name;
            const addrEl = document.createElement("small");
            addrEl.style.color = "var(--muted)";
            addrEl.textContent = d.url.replace(/^https?:\/\//, '');
            infoSpan.appendChild(document.createTextNode("💻 "));
            infoSpan.appendChild(nameEl);
            infoSpan.appendChild(document.createElement("br"));
            infoSpan.appendChild(addrEl);

            // Düzeltme 13: Silme butonu
            const delBtn = document.createElement("button");
            delBtn.className = "device-delete-btn";
            delBtn.title = "Cihazı Sil";
            delBtn.textContent = "🗑";
            delBtn.onclick = (e) => deleteDevice(d.url, e);

            const rightSide = document.createElement("div");
            rightSide.style.display = "flex";
            rightSide.style.alignItems = "center";
            rightSide.style.gap = "6px";
            if (isActive) rightSide.appendChild(document.createTextNode("🟢"));
            rightSide.appendChild(delBtn);

            item.appendChild(infoSpan);
            item.appendChild(rightSide);
            item.onclick = () => selectDevice(d.url, d.name);
            listDiv.appendChild(item);
        });

        const disBtn = document.getElementById("disconnectBtn");
        disBtn.style.display = serverUrl ? "inline-block" : "none";
    }

    function selectDevice(url, name) {
        serverUrl = url;
        localStorage.setItem("serverUrl", serverUrl);
        renderDevices();
        checkDeviceStatus();
        showToast(`📡 Bağlanılıyor: ${name}`, "info");
    }

    function disconnectDevice() {
        serverUrl = "";
        localStorage.removeItem("serverUrl");
        renderDevices();
        checkDeviceStatus();
        showToast("🔌 Bağlantı kesildi.", "info");
    }

    function checkDeviceStatus() {
        const nameSpan = document.getElementById("activeDeviceName");
        if (!serverUrl) {
            nameSpan.textContent = "Seçilmedi";
            nameSpan.className = "status-offline";
            return;
        }

        // Düzeltme 8: Timeout ile fetch
        fetchWithTimeout(`${serverUrl}/cihaz-bilgisi`)
        .then(res => res.json())
        .then(data => {
            // Düzeltme 9: textContent kullanıldı (XSS güvenliği)
            nameSpan.textContent = `${data.cihaz_adi} (Çevrimiçi)`;
            nameSpan.className = "status-online";
        })
        .catch(() => {
            nameSpan.textContent = "Bağlantı Kopuk / Çevrimdışı";
            nameSpan.className = "status-offline";
        });
    }

    // --------------------------------------------------
    // Düzeltme 12: URL sanitizasyon ve şema kontrolü
    // --------------------------------------------------
    function isValidUrl(str) {
        try {
            const url = new URL(str.startsWith("http") ? str : "https://" + str);
            return ["http:", "https:"].includes(url.protocol);
        } catch {
            return false;
        }
    }

    function handleUrlSend() {
        const urlInput = document.getElementById("urlInput");
        const btn = document.getElementById("urlSendBtn");
        const urlValue = urlInput.value.trim();

        if (!urlValue) {
            showToast("Lütfen bir URL girin!", "error");
            return;
        }

        // Düzeltme 12: Tehlikeli şemaları engelle
        if (!isValidUrl(urlValue)) {
            showToast("⚠️ Geçersiz veya tehlikeli URL!", "error");
            return;
        }

        sendCommand(btn, 'open_url', urlValue);
    }

    function handleKeyPress(e) {
        if (e.key === "Enter") {
            handleUrlSend();
        }
    }

    // --------------------------------------------------
    // Düzeltme 11: Debounce ile buton spam koruması
    // Düzeltme 8: AbortController ile timeout
    // --------------------------------------------------
    function sendCommand(thisBtn, title, body) {
        if (!serverUrl) {
            showToast("Lütfen önce bir cihaz seçin!", "error");
            toggleSettings();
            return;
        }

        // Düzeltme 11: Buton zaten disabled ise işlemi durdur
        if (thisBtn.disabled) return;
        thisBtn.disabled = true;  // Spam koruması: 300ms boyunca kilitle

        let baseUrl = serverUrl.replace(/\/+$/, "");
        const finalUrl = `${baseUrl}/komut?title=${encodeURIComponent(title)}&body=${encodeURIComponent(body)}`;

        // Düzeltme 8: 5 saniyelik timeout ile fetch
        fetchWithTimeout(finalUrl, {
            method: 'GET',
            mode: 'cors',
            cache: 'no-cache',
            keepalive: true
        }, 5000)
        .then(res => {
            if (res.ok) {
                thisBtn.style.setProperty('background', 'var(--success)', 'important');
                setTimeout(() => {
                    thisBtn.style.background = "";
                    thisBtn.style.removeProperty('background');
                    thisBtn.disabled = false;  // Düzeltme 11: Kilidi kaldır
                }, 300);
            } else {
                throw new Error("server_error");
            }
        })
        .catch(err => {
            // Düzeltme 8: Timeout hatası özel mesajla bildirilir
            if (err.name === "AbortError") {
                showToast("⏱ Bağlantı zaman aşımı!", "error");
            }
            thisBtn.style.setProperty('background', 'var(--error)', 'important');
            setTimeout(() => {
                thisBtn.style.background = "";
                thisBtn.style.removeProperty('background');
                thisBtn.disabled = false;  // Düzeltme 11: Hata durumunda da kilidi kaldır
            }, 300);
        });
    }
</script>

</body>
</html>
