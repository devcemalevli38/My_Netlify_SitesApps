<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemo38 - Linklerim</title>
    <link id="favicon" rel="icon" type="image/png" href="https://wsrv.nl/?url=https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/imcemo38/profile.png&w=64&h=64&mask=circle&output=png&n=1">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 70%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: rgba(20, 20, 35, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            margin-bottom: 20px;
            transform: translateY(20px);
        }
        .profile-section {
            text-align: center;
            padding: 40px 30px 25px;
            background: linear-gradient(135deg, #1e1b4b 0%, #2a1d5c 50%, #3b1f72 100%);
            color: #f7fafc;
            position: relative;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .profile-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
            z-index: 0;
        }
        .profile-section > * { position: relative; z-index: 1; }
        .profile-avatar {
            width: 100px; height: 100px; border-radius: 50%;
            margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.12); overflow: hidden;
            border: 4px solid rgba(255,255,255,0.25); transition: all 0.3s ease;
            backdrop-filter: blur(10px); position: relative;
        }
        .profile-avatar img {
            width: 100%; height: 100%; object-fit: cover;
            border-radius: 50%; display: block;
        }
        .profile-name {
            font-size: clamp(1.4rem, 4vw, 1.8rem); font-weight: 700; margin-bottom: 8px;
            text-shadow: 0 2px 15px rgba(0,0,0,0.9);
            background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; line-height: 1.2;
        }
        .profile-bio {
            font-size: clamp(0.8rem, 2.5vw, 0.9rem); font-weight: 400;
            color: #e2e8f0; text-shadow: 0 1px 8px rgba(0,0,0,0.9);
            line-height: 1.8; opacity: 1; max-width: 95%; margin: 0 auto;
            word-break: break-word;
            min-height: 50px;
        }
        .bio-line {
            display: block;
            padding: 2px 0;
            white-space: nowrap; /* Satırın kırılmasını engeller, sığmazsa taşar */
        }
        @media (max-width: 400px) {
            .bio-line { white-space: normal; } /* Çok küçük ekranlarda okunabilirlik için kırılsın */
        }
        .bio-link {
            color: #a0a0ff; text-decoration: none; font-weight: 600;
            transition: all 0.2s ease; border-radius: 4px; padding: 1px 3px;
        }
        .bio-link:hover { color: #c0c0ff; text-shadow: 0 0 8px rgba(160, 160, 255, 0.6); }
        
        .links-section { padding: 30px; }
        .link-item {
            display: block; margin-bottom: 15px; padding: 20px 25px;
            background: linear-gradient(135deg, #2d3748 0%, #4a5568 100%);
            color: #e2e8f0; text-decoration: none; border-radius: 15px;
            font-weight: 500; transition: all 0.3s ease; position: relative;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.12);
            font-size: clamp(0.95rem, 3.5vw, 1rem);
        }
        .link-item:hover {
            transform: translateY(-3px); box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #4a5568 0%, #718096 100%);
            border-color: rgba(255,255,255,0.25); color: #f7fafc;
        }
        .link-icon { width: 24px; margin-right: 15px; font-size: 1.2rem; color: #a0aec0; }
        .link-text { display: flex; align-items: center; justify-content: space-between; }
        .link-arrow { font-size: 1rem; opacity: 0.85; transition: all 0.3s ease; }
        .link-item:hover .link-arrow { transform: translateX(5px); }

        .footer {
            text-align: center; color: rgba(255,255,255,0.7);
            font-size: clamp(0.8rem, 2.5vw, 0.9rem); margin-top: auto;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #f7fafc;
            transform: scale(1.05);
        }
        .rotating { animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container" id="mainContainer" style="opacity: 0;">
        <div class="profile-section">
            <div class="profile-avatar" id="profileAvatar">
                <i class="fas fa-user" style="font-size: 2.5rem;"></i>
            </div>
            <h1 class="profile-name">Cemal Evli</h1>
            <div class="profile-bio" id="profileBio">
                <div style="text-align:center;color:#a0aec0;font-size:0.8rem;padding:10px;">
                    <i class="fas fa-spinner fa-spin"></i> Biyografi yükleniyor...
                </div>
            </div>
        </div>
        <div class="links-section">
    <a href="https://cemalevli.qzz.io/imcemalevli/" class="link-item" target="_blank">
        <div class="link-text">
            <span><i class="fas fa-user-circle link-icon"></i>Ana Hesaplarım</span>
            <i class="fas fa-arrow-right link-arrow"></i>
        </div>
    </a>

    <a href="https://www.instagram.com/imcemo38" class="link-item" target="_blank">
        <div class="link-text">
            <span><i class="fab fa-instagram link-icon"></i>Instagram</span>
            <i class="fas fa-arrow-right link-arrow"></i>
        </div>
    </a>

    <a href="https://ngl.link/wp_cemo38" class="link-item" target="_blank">
        <div class="link-text">
            <span><i class="fas fa-envelope-open-text link-icon"></i>NGL (Bana Soru Sor)</span>
            <i class="fas fa-arrow-right link-arrow"></i>
        </div>
    </a>

    <a href="https://open.spotify.com/playlist/5JvymC1x37givaahDxA29V?si=f51645df39d249ce&pt=d19b91e6a7afce7fa82f4f54b4d917b7" class="link-item" target="_blank">
        <div class="link-text">
            <span><i class="fab fa-spotify link-icon"></i>Spotify Çalma Listesi</span>
            <i class="fas fa-arrow-right link-arrow"></i>
        </div>
    </a>

    <a href="https://www.youtube.com/watch?v=RelX5Me_HU0&list=PLEtp_vy-92W9agbwt2IJ9l9GaFJJ2ZpsQ&index=2" class="link-item" target="_blank">
        <div class="link-text">
            <span><i class="fab fa-youtube link-icon"></i>YouTube Çalma Listem</span>
            <i class="fas fa-arrow-right link-arrow"></i>
        </div>
    </a>
</div>
    </div>
    
    <div class="footer">
        <p>💙 Cemal Evli</p>
        <button class="refresh-btn" onclick="refreshData()" id="refreshBtn">
            <i class="fas fa-sync-alt" id="refreshIcon"></i> Verileri Yenile
        </button>
    </div>

    <script>
        async function loadProfileImage() {
            const avatar = document.getElementById('profileAvatar');
            const imgUrl = 'https://wsrv.nl/?url=https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/imcemo38/profile.png&w=200&h=200&mask=circle&t=' + new Date().getTime();
            
            return new Promise((resolve) => {
                const img = new Image();
                img.src = imgUrl;
                img.onload = () => {
                    avatar.innerHTML = '';
                    avatar.appendChild(img);
                    img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%;';
                    resolve();
                };
                img.onerror = () => {
                    avatar.innerHTML = '<i class="fas fa-user" style="font-size: 2.5rem;"></i>';
                    resolve();
                };
            });
        }

        async function loadBiography() {
            const bioElement = document.getElementById('profileBio');
            try {
                const response = await fetch('https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/imcemo38/biography?t=' + new Date().getTime());
                const data = await response.json();
                
                if (data.bio && Array.isArray(data.bio)) {
                    // Her bir bio satırını bir span içinde döndürüyoruz
                    bioElement.innerHTML = data.bio.map(line => `<span class="bio-line">${parseLine(line)}</span>`).join('');
                }
            } catch (error) {
                bioElement.innerHTML = '<span class="bio-line">Small wins lead to a big victory: @bunyanfen</span><span class="bio-line">🖤@besiktas🤍 | 726051🙃</span><span class="bio-line">#egitimdesiddetehayir</span>';
                console.error("Biyografi yükleme hatası:", error);
            }
        }

        function parseLine(line) {
            // @mention ve #hashtag için regex, $$(url)$$ formatını linke dönüştürür
            line = line.replace(/@([a-zA-Z0-9_]+)\$+\((https?:\/\/[^\$)]+)\)\$+/g, 
                '<a href="$2" target="_blank" class="bio-link">@$1</a>');
            line = line.replace(/#([a-zA-Z0-9_]+)\$+\((https?:\/\/[^\$)]+)\)\$+/g, 
                '<a href="$2" target="_blank" class="bio-link">#$1</a>');
            return line;
        }

        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            const icon = document.getElementById('refreshIcon');
            const bioElement = document.getElementById('profileBio');
            const avatar = document.getElementById('profileAvatar');

            btn.disabled = true;
            icon.classList.add('rotating');
            bioElement.innerHTML = '<div style="text-align:center;color:#a0aec0;font-size:0.8rem;padding:10px;"><i class="fas fa-spinner fa-spin"></i> Yenileniyor...</div>';
            avatar.innerHTML = '<i class="fas fa-circle-notch fa-spin" style="font-size: 2rem; color: rgba(255,255,255,0.3);"></i>';

            await Promise.all([loadProfileImage(), loadBiography()]);

            setTimeout(() => {
                icon.classList.remove('rotating');
                btn.disabled = false;
            }, 500);
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadProfileImage();
            loadBiography();
            
            const container = document.getElementById('mainContainer');
            setTimeout(() => {
                container.style.transition = 'all 0.8s ease-out';
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body>
</html>
