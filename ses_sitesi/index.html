<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Ses Paneli</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🔊</text></svg>">

    <style>
        :root {
            --bg-color: #0a0e17;
            --panel-bg: rgba(20, 26, 39, 0.95);
            --button-bg: #1e293b;
            --text-primary: #ffffff;
            --neon-blue: #00f2fe;
            --neon-blue-glow: rgba(0, 242, 254, 0.4);
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body { 
            background-color: var(--bg-color); 
            font-family: 'Segoe UI', sans-serif; 
            color: var(--text-primary); 
            margin: 0; 
            padding-top: 100px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .sticky-header { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            padding: 15px 0; 
            background: rgba(10, 14, 23, 0.9); 
            backdrop-filter: blur(12px); 
            z-index: 1000; 
            display: flex; 
            justify-content: center; 
            border-bottom: 2px solid var(--border-color); 
        }

        .header-controls { display: flex; gap: 15px; }

        .stop-button, .refresh-button { 
            background: #000; 
            color: #fff; 
            padding: 12px 24px; 
            border-radius: 12px; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: 0.3s;
            border: 2px solid;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stop-button { border-color: var(--neon-red); }
        .stop-button:hover { background: var(--neon-red); box-shadow: 0 0 15px var(--neon-red); }

        .refresh-button { border-color: var(--neon-blue); }
        .refresh-button:hover { background: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }

        .sound-board { 
            max-width: 800px; 
            width: 90%; 
            padding: 35px; 
            background: var(--panel-bg); 
            border-radius: 24px; 
            border: 1px solid var(--border-color); 
            text-align: center; 
            margin-bottom: 40px; 
        }

        .board-title { margin-bottom: 25px; font-weight: 900; font-size: 2.2rem; }
        
        #searchInput { 
            width: 100%; 
            padding: 18px 22px; 
            border-radius: 14px; 
            border: 2px solid var(--border-color); 
            background: #000; 
            color: #fff; 
            margin-bottom: 30px; 
            font-size: 16px;
        }

        .button-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 15px; justify-items: center; }
        
        .gui-button { 
            background: var(--button-bg); 
            border: 2px solid var(--border-color); 
            width: 170px; 
            min-height: 160px; 
            border-radius: 20px; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            transition: 0.3s; 
            padding: 15px 10px;
            position: relative;
        }

        .gui-button span { 
            font-weight: 900; 
            font-size: 13px; 
            color: #ffffff !important; 
            text-transform: uppercase; 
            letter-spacing: 0.8px; 
            text-shadow: 1px 1px 3px rgba(0,0,0,1); 
            text-align: center;
            line-height: 1.2;
            margin-bottom: 5px;
        }

        .gui-button:hover {
            transform: translateY(-5px);
            border-color: var(--neon-blue);
            box-shadow: 0 5px 15px var(--neon-blue-glow);
        }

        .download-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--neon-blue);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            text-decoration: none;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .download-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 10px var(--neon-blue-glow);
        }

        .playing { 
            border-color: var(--neon-green) !important; 
            background: rgba(57, 255, 20, 0.1) !important; 
        }

        .playing span { color: var(--neon-green) !important; }

        .site-footer {
            width: 100%;
            padding: 20px 0;
            margin-top: auto; 
            text-align: center;
            border-top: 1px solid var(--border-color);
            background: rgba(10, 14, 23, 0.5);
        }

        .site-footer p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.5px;
        }

        .site-footer a {
            color: var(--neon-blue);
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .site-footer a:hover {
            text-shadow: 0 0 8px var(--neon-blue-glow);
            text-decoration: underline;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="audio-container"></div> 

<div class="sticky-header">
  <div class="header-controls">
    <button onclick="stopAllSounds()" class="stop-button">
      <span class="stop-icon">🛑</span> DURDUR
    </button>
    <button onclick="loadSounds()" class="refresh-button">
      <span class="refresh-icon">🔄</span> YENİLE
    </button>
  </div>
</div>

<div class="sound-board">
  <h2 class="board-title">Ses Paneli</h2>
  
  <div class="search-container">
    <input type="text" id="searchInput" onkeyup="filterSounds()" placeholder="Ses ismi yazın..." autocomplete="off">
  </div>
  
  <div class="button-grid" id="buttonGrid">
  </div>
</div>

<footer class="site-footer">
  <p>Ses içerikleri için <a href="https://www.myinstants.com" target="_blank">myinstants.com</a> kaynaklarından faydalanılmıştır.</p>
</footer>

<script>
  const JSON_URL = 'https://raw.githubusercontent.com/cemal201138/My_Netlify_SitesApps/main/ses_sitesi/sounds.json';
  const DEFAULT_TITLE = "Ses Paneli";

  async function loadSounds() {
    const buttonGrid = document.getElementById('buttonGrid');
    const audioContainer = document.getElementById('audio-container');
    
    buttonGrid.innerHTML = '<p style="color:var(--neon-blue); font-weight:bold;">Sesler yükleniyor...</p>';
    audioContainer.innerHTML = '';
    
    try {
      const response = await fetch(JSON_URL);
      const sounds = await response.json();
      
      buttonGrid.innerHTML = ''; 

      sounds.forEach(sound => {
        const audio = document.createElement('audio');
        audio.id = sound.id;
        audio.src = sound.url;
        audio.preload = "auto";
        audioContainer.appendChild(audio);

        const button = document.createElement('button');
        button.className = 'gui-button';
        button.setAttribute('data-name', sound.searchName.toLowerCase());
        
        // Ses çalma tetikleyicisi
        button.onclick = (event) => {
            // Eğer tıklanan şey indir butonu değilse sesi çal
            if (!event.target.closest('.download-btn')) {
                playSound(sound.id, event);
            }
        };
        
        button.innerHTML = `
          <div class="icon-circle">🔊</div>
          <span>${sound.name}</span>
          <a href="${sound.url}" 
             download="${sound.name}.mp3" 
             class="download-btn" 
             target="_blank" 
             onclick="event.stopPropagation();">
             📥 İNDİR
          </a>
        `;
        buttonGrid.appendChild(button);
      });
    } catch (error) {
      buttonGrid.innerHTML = '<p style="color:red; font-weight:bold;">Hata! JSON çekilemedi.</p>';
    }
  }

  function stopAllSounds() {
    document.querySelectorAll('audio').forEach(a => {
      a.pause();
      a.currentTime = 0;
    });
    document.querySelectorAll('.gui-button').forEach(b => b.classList.remove('playing'));
    document.title = DEFAULT_TITLE;
  }

  function playSound(audioId, event) {
    stopAllSounds();
    const target = document.getElementById(audioId);
    const btn = event.currentTarget;
    const soundName = btn.querySelector('span').innerText;

    if (target) {
      target.play();
      btn.classList.add('playing');
      document.title = "▶️ " + soundName;
      
      target.onended = () => {
          btn.classList.remove('playing');
          document.title = DEFAULT_TITLE;
      };
    }
  }

  function filterSounds() {
    const input = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('.gui-button').forEach(button => {
      const name = button.getAttribute('data-name');
      button.classList.toggle('hidden', !name.includes(input));
    });
  }

  window.onload = loadSounds;
</script>

</body>
</html>
