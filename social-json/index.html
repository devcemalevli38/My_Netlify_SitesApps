<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Link Oluşturucu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --info-color: #e67e22;
            --purple-color: #8e44ad;
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 20px;
            font-weight: 600;
            color: #2c3e50;
        }

        .container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            align-items: flex-start;
            flex: 1;
        }

        .panel {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            flex: 1;
            min-width: 300px;
        }

        /* Form Alanı */
        .link-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: flex-end;
            background: #fafafa;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #eee;
            cursor: grab;
            transition: transform 0.2s, background-color 0.2s;
            user-select: none;
        }

        .link-row:active {
            cursor: grabbing;
        }

        .link-row.dragging {
            opacity: 0.5;
            background: #e2e8f0;
            border: 1px dashed #cbd5e0;
        }

        .drag-handle {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 35px;
            padding: 0 5px;
            color: #a0aec0;
            font-size: 18px;
            cursor: grab;
        }

        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-group label {
            font-size: 12px;
            font-weight: bold;
            color: #7f8c8d;
        }

        input, textarea {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
            width: 100%;
        }

        input:focus, textarea:focus {
            border-color: var(--primary-color);
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .btn-add {
            background-color: var(--primary-color);
            color: white;
            padding: 10px 15px;
            flex: 2;
            font-size: 15px;
        }

        .btn-add:hover { background-color: #357abd; }

        .btn-upload-trigger {
            background-color: var(--info-color);
            color: white;
            padding: 10px 15px;
            flex: 1;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-upload-trigger:hover { background-color: #d35400; }

        .btn-text-import {
            background-color: var(--purple-color);
            color: white;
            padding: 10px 15px;
            flex: 1;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-text-import:hover { background-color: #712688; }

        #file-input {
            display: none;
        }

        .btn-delete {
            background-color: var(--danger-color);
            color: white;
            padding: 9px 12px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-delete:hover { background-color: #c0392b; }

        /* JSON Önizleme Alanı */
        .json-header {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-action {
            flex: 1;
            padding: 10px;
            color: white;
            font-size: 14px;
        }

        .btn-copy { background-color: #9b59b6; }
        .btn-copy:hover { background-color: #8e44ad; }

        .btn-download { background-color: var(--success-color); }
        .btn-download:hover { background-color: #27ae60; }

        pre {
            background: #2d3748;
            color: #f7fafc;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            max-height: 600px;
            overflow-y: auto;
            white-space: pre;
        }

        /* JSON Metin Giriş Alanı (Pencere/Section) */
        .json-input-section {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border: 1px dashed var(--purple-color);
            border-radius: 6px;
            display: none;
        }

        .json-input-section.active {
            display: block;
        }

        .json-input-section textarea {
            min-height: 120px;
            font-family: monospace;
            margin-bottom: 10px;
            resize: vertical;
        }

        .json-input-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-apply-text {
            background-color: var(--success-color);
            color: white;
            padding: 8px 15px;
        }

        .btn-apply-text:hover { background-color: #27ae60; }

        .btn-cancel-text {
            background-color: #95a5a6;
            color: white;
            padding: 8px 15px;
        }

        .btn-cancel-text:hover { background-color: #7f8c8d; }

        /* Alt Bilgi (Footer) Alanı */
        footer {
            margin-top: 30px;
            padding: 15px;
            text-align: center;
            font-size: 14px;
            color: #7f8c8d;
            width: 100%;
            border-top: 1px solid #e2e8f0;
        }

        footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        footer a:hover {
            color: #357abd;
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .panel {
                width: 100%;
            }
            .link-row {
                flex-direction: column;
                align-items: stretch;
            }
            .drag-handle {
                height: auto;
                padding: 5px 0;
            }
            .btn-delete {
                margin-top: 5px;
                width: 100%;
                height: auto;
                padding: 10px;
            }
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <h1>Social Links JSON Oluşturucu</h1>

    <div class="container">
        <div class="panel">
            <div id="form-container"></div>
            
            <div class="action-buttons">
                <button class="btn-add" onclick="addRow()"><i class="fas fa-plus"></i> Yeni Link Ekle</button>
                <button class="btn-text-import" onclick="toggleJsonTextInput()"><i class="fas fa-code"></i> JSON Yaz/Yapıştır</button>
                <button class="btn-upload-trigger" onclick="triggerFileInput()"><i class="fas fa-upload"></i> JSON Yükle</button>
                <input type="file" id="file-input" accept=".json" onchange="loadJSONFile(event)">
            </div>

            <!-- JSON Metin Yapıştırma/Yazma Alanı -->
            <div id="json-input-section" class="json-input-section">
                <div class="input-group">
                    <label>JSON Formatındaki Metni Buraya Yapıştırın veya Yazın:</label>
                    <textarea id="json-textarea" placeholder='[{"icon": "fab fa-github", "url": "https://...", "title": "GitHub"}]'></textarea>
                </div>
                <div class="json-input-actions">
                    <button class="btn-cancel-text" onclick="toggleJsonTextInput()">İptal</button>
                    <button class="btn-apply-text" onclick="applyTextJSON()"><i class="fas fa-check"></i> Uygula</button>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="json-header">
                <button class="btn-action btn-copy" onclick="copyJSON()"><i class="fas fa-copy"></i> Kopyala</button>
                <button class="btn-action btn-download" onclick="downloadJSON()"><i class="fas fa-download"></i> İndir</button>
            </div>
            <pre id="json-output">[]</pre>
        </div>
    </div>

    <footer>
        <i class="fas fa-info-circle"></i> İkon isimlerini bulmak için <a href="https://www.w3schools.com/icons/icons_reference.asp" target="_blank" rel="noopener noreferrer">W3Schools Font Awesome Referans</a> sitesini kullanabilirsiniz.
    </footer>

    <script>
        const formContainer = document.getElementById('form-container');

        // Form alanındaki değişiklikleri dinle ve JSON'ı güncelle
        formContainer.addEventListener('input', updateJSON);

        // Drag & Drop event listener'ları kapsayıcıya ekliyoruz (Event Delegation)
        formContainer.addEventListener('dragstart', (e) => {
            if (e.target.classList.contains('link-row')) {
                e.target.classList.add('dragging');
            }
        });

        formContainer.addEventListener('dragend', (e) => {
            if (e.target.classList.contains('link-row')) {
                e.target.classList.remove('dragging');
                updateJSON(); // Sıralama bitince JSON çıktısını güncelle
            }
        });

        formContainer.addEventListener('dragover', (e) => {
            e.preventDefault();
            const draggingItem = document.querySelector('.link-row.dragging');
            if (!draggingItem) return;

            // Sürüklenen öğe haricindeki diğer satırları alıyoruz
            const siblings = [...formContainer.querySelectorAll('.link-row:not(.dragging)')];

            // Fare pozisyonuna göre en yakın kardeşi buluyoruz
            const nextSibling = siblings.find(sibling => {
                const box = sibling.getBoundingClientRect();
                const offset = e.clientY - box.top - box.height / 2;
                return offset < 0;
            });

            // Sürüklenen satırı uygun konuma yerleştiriyoruz
            if (nextSibling) {
                formContainer.insertBefore(draggingItem, nextSibling);
            } else {
                formContainer.appendChild(draggingItem);
            }
        });

        // Belirli verilerle veya tamamen boş satır oluşturan fonksiyon
        function createRowHTML(iconValue = "", urlValue = "", titleValue = "") {
            const div = document.createElement('div');
            div.className = 'link-row';
            div.setAttribute('draggable', 'true'); // Sürüklenebilir yaptık
            div.innerHTML = `
                <div class="drag-handle">
                    <i class="fas fa-bars"></i>
                </div>
                <div class="input-group">
                    <label>İkon (Class)</label>
                    <input type="text" class="input-icon" value="${iconValue}" placeholder="örn: fab fa-github">
                </div>
                <div class="input-group">
                    <label>URL</label>
                    <input type="text" class="input-url" value="${urlValue}" placeholder="https://...">
                </div>
                <div class="input-group">
                    <label>Başlık</label>
                    <input type="text" class="input-title" value="${titleValue}" placeholder="örn: GitHub">
                </div>
                <button class="btn-delete" onclick="removeRow(this)"><i class="fas fa-trash"></i></button>
            `;
            return div;
        }

        // Kullanıcı manuel artı butonuna bastığında çalışır
        function addRow() {
            formContainer.appendChild(createRowHTML());
            updateJSON();
        }

        function removeRow(button) {
            const row = button.parentElement;
            row.remove();
            updateJSON();
        }

        // Gizli dosya inputunu tetikler
        function triggerFileInput() {
            document.getElementById('file-input').click();
        }

        // JSON metin yazma alanını açar/kapatır
        function toggleJsonTextInput() {
            const section = document.getElementById('json-input-section');
            section.classList.toggle('active');
        }

        // Metin kutusuna yazılan JSON verisini çözüp forma aktarır
        function applyTextJSON() {
            const text = document.getElementById('json-textarea').value.trim();
            if (!text) {
                alert("Lütfen önce geçerli bir JSON metni girin.");
                return;
            }

            try {
                const parsedData = JSON.parse(text);
                renderDataToForm(parsedData);
                document.getElementById('json-textarea').value = ""; // Temizle
                toggleJsonTextInput(); // Paneli kapat
                alert("JSON başarıyla forma aktarıldı!");
            } catch (error) {
                alert("Hata: Yazdığınız JSON formatı geçersiz! Lütfen kontrol edin.");
            }
        }

        // Dosyadan yüklenen veya import edilen veriyi forma basan fonksiyon
        function renderDataToForm(dataArray) {
            formContainer.innerHTML = ""; // Mevcut form elemanlarını temizle

            if (!Array.isArray(dataArray) || dataArray.length === 0) {
                formContainer.appendChild(createRowHTML());
            } else {
                dataArray.forEach(item => {
                    formContainer.appendChild(createRowHTML(item.icon || "", item.url || "", item.title || ""));
                });
            }
            updateJSON();
        }

        // Dosya seçildiğinde tetiklenen yükleme fonksiyonu
        function loadJSONFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsedData = JSON.parse(e.target.result);
                    renderDataToForm(parsedData);
                    alert("JSON başarıyla yüklendi ve forma aktarıldı!");
                } catch (error) {
                    alert("Hata: Geçersiz bir JSON dosyası seçtiniz.");
                }
                // Aynı dosyayı tekrar seçebilmek için inputu sıfırla
                event.target.value = "";
            };
            reader.readAsText(file);
        }

        // Her bir objeyi tek satırda yan yana tutan özel formatlama fonksiyonu
        function formatCustomJSON(arr) {
            if (arr.length === 0) return "[]";
            
            const lines = arr.map(item => {
                return `  {"icon": "${item.icon}", "url": "${item.url}", "title": "${item.title}"}`;
            });
            
            return `[\n${lines.join(",\n")}\n]`;
        }

        function updateJSON() {
            const rows = document.querySelectorAll('.link-row');
            const data = [];

            rows.forEach(row => {
                const icon = row.querySelector('.input-icon').value;
                const url = row.querySelector('.input-url').value;
                const title = row.querySelector('.input-title').value;

                // Sadece alanlardan en az biri doluysa listeye ekle
                if (icon || url || title) {
                    data.push({ icon, url, title });
                }
            });

            // Özel formatlama fonksiyonunu kullanarak önizleme alanını güncelle
            document.getElementById('json-output').textContent = formatCustomJSON(data);
        }

        function copyJSON() {
            const jsonText = document.getElementById('json-output').textContent;
            navigator.clipboard.writeText(jsonText).then(() => {
                alert('JSON panoya kopyalandı!');
            }).catch(err => {
                alert('Kopyalama başarısız: ', err);
            });
        }

        function downloadJSON() {
            const jsonText = document.getElementById('json-output').textContent;
            const blob = new Blob([jsonText], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'social-links.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Sayfa ilk yüklendiğinde temiz, tek bir boş satır basar
        function initializeForm() {
            formContainer.appendChild(createRowHTML());
            updateJSON();
        }

        // Uygulamayı başlat
        initializeForm();
    </script>
</body>
</html>
